    then: "THEN 즉시 실행보다 실행, 보류, 축소, 정리 중 하나로 행동을 좁혀 안내한다."
    because: "BECAUSE 현명역학원 Brain은 길흉 설명에서 끝나지 않고 고객의 현실 행동으로 결론을 내려야 하기 때문이다."
