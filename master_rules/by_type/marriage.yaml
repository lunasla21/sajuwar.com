    if: "IF 고객 질문이 배우자궁과 관계 지속성 문제이고 핵심 신호가 식상견관/관성로 잡힌다."
    then: "THEN 상담은 사건명 확인, 핵심 신호 번역, 현실 선택지 정리, 행동 기준 제시 순서로 진행한다."
    because: "BECAUSE 고객은 명리 용어보다 왜 이 결론이 나왔고 무엇을 해야 하는지를 먼저 이해해야 한다."
    exceptions:
      - "고객이 이미 결정을 내린 경우에는 설득보다 위험 조건과 보완 행동을 먼저 제시한다."
    priority: 4
    related_cases:
