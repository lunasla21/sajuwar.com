<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>프리미엄 사주 리포트</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
      background: #0f0f0f;
      color: #f7f1df;
      padding: 24px;
    }

    .app {
      max-width: 760px;
      margin: auto;
    }

    .hero, .form-card, .card {
      background: #1c1c1c;
      border: 1px solid rgba(212,175,55,0.35);
      border-radius: 18px;
      padding: 20px;
      margin-top: 16px;
    }

    .hero {
      text-align: center;
    }

    .hero h1, .section-title {
      color: #d4af37;
    }

    input, select, button {
      width: 100%;
      padding: 13px;
      margin: 7px 0;
      border-radius: 12px;
      border: 1px solid rgba(212,175,55,0.25);
      box-sizing: border-box;
      font-size: 15px;
    }

    input, select {
      background: #111;
      color: #f7f1df;
    }

    button {
      background: linear-gradient(135deg, #d4af37, #f4dc8a);
      color: #111;
      font-weight: 800;
      cursor: pointer;
      border: none;
    }

    button.secondary {
      background: #2c2c2c;
      color: #d4af37;
      border: 1px solid rgba(212,175,55,0.45);
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .card {
      margin-top: 16px;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="hero">
      <h1>프리미엄 사주 리포트</h1>
    </div>

    <div class="form-card">
      <input id="name" placeholder="이름">

      <div class="row">
        <select id="year"></select>
        <select id="month"></select>
        <select id="day"></select>
      </div>

      <div class="row">
        <select id="hour"></select>
        <select id="minute"></select>
      </div>

      <select id="gender">
        <option value="">성별 선택</option>
        <option value="남자">남자</option>
        <option value="여자">여자</option>
      </select>

      <button onclick="analyze()">사주 리포트 보기</button>
      <button class="secondary" onclick="unlock()">결제하고 전체보기</button>
      <button class="secondary" onclick="downloadPDF()">PDF 저장</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    let isPaid = false;
    let lastFullResult = "";

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function fillOptions() {
      const yearSelect = document.getElementById("year");
      const monthSelect = document.getElementById("month");
      const daySelect = document.getElementById("day");
      const hourSelect = document.getElementById("hour");
      const minuteSelect = document.getElementById("minute");

      for (let y = 1950; y <= 2026; y++) {
        yearSelect.innerHTML += `<option value="${y}">${y}</option>`;
      }

      for (let m = 1; m <= 12; m++) {
        monthSelect.innerHTML += `<option value="${pad(m)}">${m}</option>`;
      }

      for (let d = 1; d <= 31; d++) {
        daySelect.innerHTML += `<option value="${pad(d)}">${d}</option>`;
      }

      for (let h = 0; h <= 23; h++) {
        hourSelect.innerHTML += `<option value="${pad(h)}">${h}</option>`;
      }

      for (let m = 0; m < 60; m += 10) {
        minuteSelect.innerHTML += `<option value="${pad(m)}">${m}</option>`;
      }
    }

    fillOptions();

    function unlock() {
      isPaid = true;
      alert("결제 완료 테스트");
      document.getElementById("result").innerHTML = lastFullResult;
    }

    async function analyze() {
      const name = document.getElementById("name").value;
      const year = document.getElementById("year").value;
      const month = document.getElementById("month").value;
      const day = document.getElementById("day").value;
      const hour = document.getElementById("hour").value;
      const minute = document.getElementById("minute").value;
      const gender = document.getElementById("gender").value;

      const resultBox = document.getElementById("result");

      resultBox.innerHTML = "분석 중...";

      try {
        // 🔥 핵심 수정 (localhost 제거)
        const res = await fetch("/analyze", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            name,
            birth: `${year}-${month}-${day}`,
            time: `${hour}:${minute}`,
            gender
          })
        });

        const data = await res.json();

        lastFullResult = data.result;

        const preview = data.result.slice(0, 300);

        resultBox.innerHTML = isPaid
          ? `<div class="card">${data.result}</div>`
          : `<div class="card">${preview}...<br><br>🔒 결제 후 전체보기 가능</div>`;

      } catch (err) {
        resultBox.innerHTML = "연결 오류 발생";
      }
    }

    function downloadPDF() {
      if (!isPaid) {
        alert("결제 후 사용 가능");
        return;
      }
      window.print();
    }
  </script>
</body>
</html>
