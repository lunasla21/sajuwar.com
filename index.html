<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>사주전쟁</title>
  <style>
    body{margin:0;background:#0b0b0b;color:#f7f1df;font-family:Arial,sans-serif;padding:24px}
    .app{max-width:850px;margin:auto}
    .box{background:#171717;border:1px solid #8a6a18;border-radius:18px;padding:24px;margin:18px 0}
    h1,h2,h3{color:#d4af37}
    input,select,button{width:100%;padding:14px;margin:7px 0;border-radius:12px;border:1px solid #8a6a18;box-sizing:border-box}
    input,select{background:#0e0e0e;color:#fff}
    button{background:linear-gradient(135deg,#d4af37,#f4dc8a);font-weight:800;cursor:pointer}
    button.secondary{background:#2a2a2a;color:#d4af37}
    .row{display:flex;gap:10px}
    .report{white-space:pre-wrap;line-height:1.9}
    .lock{text-align:center;color:#f4dc8a;font-weight:800}
    .manse{width:100%;border-collapse:collapse;text-align:center}
    .manse td,.manse th{border:1px solid #8a6a18;padding:12px}
    .big{font-size:30px;font-weight:900;color:#f4dc8a}
    @media(max-width:700px){.row{flex-direction:column}}
  </style>
</head>
<body>
<div class="app">
  <div class="box" style="text-align:center">
    <h1>⚔️ 사주전쟁</h1>
    <p>내 사주 전쟁터 · 병력 구성 · 아이템 해금 시기</p>
  </div>

  <div class="box">
    <input id="name" placeholder="이름" />
    <div class="row">
      <select id="year"></select>
      <select id="month"></select>
      <select id="day"></select>
    </div>
    <div class="row">
      <select id="hour"></select>
      <select id="minute"></select>
    </div>
    <select id="gender">
      <option value="">성별 선택</option>
      <option value="남자">남자</option>
      <option value="여자">여자</option>
    </select>
    <button onclick="analyze()">전투 분석 시작하기</button>
    <button class="secondary" onclick="unlock()">결제하고 전체보기</button>
    <button class="secondary" onclick="downloadPDF()">PDF 저장</button>
  </div>

  <div id="result"></div>
</div>

<script>
let isPaid = false;
let lastFullResult = "";

function pad(n){ return String(n).padStart(2,"0"); }

function fillOptions(){
  const year=document.getElementById("year");
  const month=document.getElementById("month");
  const day=document.getElementById("day");
  const hour=document.getElementById("hour");
  const minute=document.getElementById("minute");

  year.innerHTML='<option value="">출생연도</option>';
  month.innerHTML='<option value="">월</option>';
  day.innerHTML='<option value="">일</option>';
  hour.innerHTML='<option value="">시</option>';
  minute.innerHTML='<option value="">분</option>';

  for(let y=1950;y<=2026;y++) year.innerHTML+=`<option value="${y}">${y}년</option>`;
  for(let m=1;m<=12;m++) month.innerHTML+=`<option value="${pad(m)}">${m}월</option>`;
  for(let d=1;d<=31;d++) day.innerHTML+=`<option value="${pad(d)}">${d}일</option>`;
  for(let h=0;h<=23;h++) hour.innerHTML+=`<option value="${pad(h)}">${h}시</option>`;
  for(let m=0;m<60;m+=10) minute.innerHTML+=`<option value="${pad(m)}">${m}분</option>`;
}
fillOptions();

function renderPillars(p){
  if(!p) return "";
  return `
  <div class="box">
    <h2>1. 사주팔자 원국표</h2>
    <table class="manse">
      <tr><th></th><th>년</th><th>월</th><th>일</th><th>시</th></tr>
      <tr><td>간지</td>
        <td class="big">${p.year || "-"}</td>
        <td class="big">${p.month || "-"}</td>
        <td class="big">${p.day || "-"}</td>
        <td class="big">${p.hour || "-"}</td>
      </tr>
    </table>
  </div>`;
}

function renderDaewoon(d){
  if(!d || !d.list) return "";
  return `
  <div class="box">
    <h2>2. 대운 흐름</h2>
    <div class="report">${d.startInfo || ""}
${d.list.map(x=>`${x.startAge}세~${x.endAge}세: ${x.ganji}대운 (${x.startYear}년~${x.endYear}년)`).join("\n")}</div>
  </div>`;
}

function cleanText(t){
  return (t || "결과가 비어 있습니다.")
    .replace(/\*\*/g,"")
    .replace(/###/g,"")
    .replace(/(\d+\.\s)/g,"\n\n$1")
    .trim();
}

function unlock(){
  isPaid=true;
  alert("결제 완료 테스트: 전체 리포트가 열렸습니다.");
  if(lastFullResult) document.getElementById("result").innerHTML=lastFullResult;
}

async function analyze(){
  const name=document.getElementById("name").value.trim();
  const year=document.getElementById("year").value;
  const month=document.getElementById("month").value;
  const day=document.getElementById("day").value;
  const hour=document.getElementById("hour").value;
  const minute=document.getElementById("minute").value;
  const gender=document.getElementById("gender").value;
  const result=document.getElementById("result");

  if(!name || !year || !month || !day || !hour || !minute || !gender){
    result.innerHTML='<div class="box">입력 정보를 모두 선택해주세요.</div>';
    return;
  }

  result.innerHTML='<div class="box">⚔️ 전투 분석 중입니다...</div>';

  try{
    const res=await fetch("/analyze",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        name,
        birth:`${year}-${month}-${day}`,
        time:`${hour}:${minute}`,
        gender
      })
    });

    const data=await res.json();

    if(!res.ok){
      result.innerHTML=`<div class="box">서버 오류: ${data.result || data.error || "응답 오류"}</div>`;
      return;
    }

    const report=cleanText(data.result);
    const preview=report.slice(0,700);

    const fullHTML=`
      ${renderPillars(data.pillars)}
      ${renderDaewoon(data.daewoon)}
      <div class="box">
        <h2>3. 프리미엄 전투 해석</h2>
        <div class="report">${report}</div>
      </div>`;

    const previewHTML=`
      ${renderPillars(data.pillars)}
      ${renderDaewoon(data.daewoon)}
      <div class="box">
        <h2>무료 미리보기</h2>
        <div class="report">${preview}...</div>
      </div>
      <div class="box lock">🔒 숨겨진 아이템과 전체 전투 전략은 결제 후 확인 가능합니다.</div>`;

    lastFullResult=fullHTML;
    result.innerHTML=isPaid ? fullHTML : previewHTML;

  }catch(e){
    result.innerHTML=`<div class="box">연결 오류 발생: ${e.message}</div>`;
  }
}

function downloadPDF(){
  if(!isPaid){
    alert("PDF 저장은 결제 후 가능합니다.");
    return;
  }
  window.print();
}
</script>
</body>
</html>
