<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>사주전쟁 | SAJUWAR</title>
  <style>
    *{box-sizing:border-box}
    body{
      margin:0;
      background:
        radial-gradient(circle at top,#2a2112,#070707 58%),
        linear-gradient(180deg,#050505,#101010);
      color:#f8f0d8;
      font-family:Arial,"Noto Sans KR",sans-serif;
      padding:24px;
    }
    .app{max-width:1320px;margin:auto}
    .top{
      display:flex;justify-content:space-between;align-items:center;
      border:1px solid rgba(212,175,55,.55);
      border-radius:22px;padding:22px 28px;margin-bottom:20px;
      background:linear-gradient(145deg,#151515,#080808);
      box-shadow:0 0 38px rgba(212,175,55,.1)
    }
    .logo h1{margin:0;color:#d4af37;font-size:36px}
    .logo p{margin:8px 0 0;color:#e9dca9}
    .nav span{margin-left:20px;color:#e6d194;font-weight:800}

    .box{
      background:linear-gradient(145deg,#181818,#0c0c0c);
      border:1px solid rgba(212,175,55,.45);
      border-radius:20px;
      padding:22px;
      box-shadow:0 0 28px rgba(212,175,55,.06)
    }
    .layout{display:grid;grid-template-columns:330px 1fr;gap:20px}
    .form input,.form select,.form button{
      width:100%;padding:15px;margin:7px 0;border-radius:13px;
      border:1px solid rgba(212,175,55,.45);font-size:16px
    }
    .form input,.form select{background:#090909;color:#fff}
    button{
      background:linear-gradient(135deg,#d4af37,#f6de8a);
      color:#111;font-weight:900;cursor:pointer;border:none
    }
    button.secondary{
      background:#242424;color:#d4af37;border:1px solid rgba(212,175,55,.55)
    }
    .row{display:flex;gap:10px}
    .section-title{
      color:#f3d36b;font-size:24px;margin:0 0 16px;
      border-bottom:1px solid rgba(212,175,55,.25);padding-bottom:12px
    }
    .small{color:#cbbb87;font-size:14px;line-height:1.7}
    .status{
      display:flex;align-items:center;gap:14px;margin-top:16px;
      border-top:1px solid rgba(212,175,55,.2);padding-top:18px
    }
    .circle{
      width:70px;height:70px;border-radius:50%;
      border:7px solid #d4af37;
      display:flex;align-items:center;justify-content:center;
      font-weight:900;color:#ffe48a
    }
    .menu-card{
      padding:16px;border-radius:15px;margin:10px 0;
      border:1px solid rgba(212,175,55,.25);
      background:rgba(212,175,55,.06)
    }
    .menu-card strong{color:#f5d46d}

    .hero{
      min-height:230px;
      background:
        linear-gradient(90deg,rgba(0,0,0,.88),rgba(0,0,0,.25)),
        radial-gradient(circle at right,#6b4d17,#161616 60%);
      display:flex;align-items:center;
    }
    .hero h2{font-size:36px;color:#f4d36b;margin:0 0 18px}
    .hero p{line-height:1.9;font-size:17px;margin:0;color:#f3ead2}

    .dashboard{display:grid;grid-template-columns:1.15fr .85fr;gap:18px;margin-top:18px}
    .grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
    .grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
    .card{
      border:1px solid rgba(212,175,55,.38);
      border-radius:18px;padding:18px;
      background:rgba(255,255,255,.025)
    }
    .card h3{margin:0 0 12px;color:#f1cf64}
    .badge{
      display:inline-block;padding:7px 11px;margin:4px;
      border-radius:999px;background:#2a2412;color:#ffe48a;
      border:1px solid rgba(212,175,55,.4);font-size:13px
    }

    .manse{width:100%;border-collapse:separate;border-spacing:0;table-layout:fixed;text-align:center;overflow:hidden;border-radius:16px;border:1px solid rgba(212,175,55,.55)}
    .manse th,.manse td{border-right:1px solid rgba(212,175,55,.35);border-bottom:1px solid rgba(212,175,55,.25);padding:14px 8px}
    .manse th:last-child,.manse td:last-child{border-right:none}
    .manse tr:last-child td{border-bottom:none}
    .label{width:78px;color:#c8b98a;background:rgba(212,175,55,.08);font-weight:800}
    .gan{font-size:38px;font-weight:900;color:#ffe48a}
    .ji{font-size:36px;font-weight:900;color:#e4c764}
    .hidden{font-size:15px;line-height:1.6;color:#d8c48a;letter-spacing:1px}

    .bar{height:10px;background:#242424;border-radius:99px;overflow:hidden;margin-top:8px}
    .bar i{display:block;height:100%;background:linear-gradient(90deg,#d4af37,#f5e29b)}
    .report{
      white-space:pre-wrap;line-height:2.05;font-size:16px;color:#f7efd9
    }
    .lock{
      text-align:center;color:#f4dc8a;font-weight:900;line-height:1.9;
      background:linear-gradient(135deg,rgba(212,175,55,.18),rgba(255,255,255,.03))
    }
    .loading{
      padding:40px;text-align:center;color:#f4dc8a;font-size:20px;
      border:1px solid rgba(212,175,55,.45);border-radius:20px;
      background:rgba(0,0,0,.35)
    }
    @media(max-width:950px){
      .layout,.dashboard,.grid2{grid-template-columns:1fr}
      .grid3{grid-template-columns:1fr}
      .row{flex-direction:column}
      .top{display:block}
      .nav{margin-top:15px}
      .nav span{display:inline-block;margin:8px 12px 0 0}
    }
  </style>
</head>

<body>
<div class="app">
  <div class="top">
    <div class="logo">
      <h1>⚔️ 사주전쟁 <span style="font-size:16px">SAJU WAR</span></h1>
      <p>원국은 전쟁터, 지장간은 아이템, 대운은 스위치입니다.</p>
    </div>
    <div class="nav">
      <span>전쟁지도</span>
      <span>아이템 분석</span>
      <span>대운 스위치</span>
      <span>전략 리포트</span>
    </div>
  </div>

  <div class="layout">
    <aside>
      <div class="box form">
        <h2 class="section-title">전투 정보 입력</h2>
        <input id="name" placeholder="이름" />
        <div class="row">
          <select id="year"></select>
          <select id="month"></select>
          <select id="day"></select>
        </div>
        <div class="row">
          <select id="hour"></select>
          <select id="minute"></select>
        </div>
        <select id="gender">
          <option value="">성별 선택</option>
          <option value="남자">남자</option>
          <option value="여자">여자</option>
        </select>
        <button onclick="analyze()">전투 분석 시작하기</button>
        <button class="secondary" onclick="unlock()">결제하고 전체보기</button>
        <button class="secondary" onclick="downloadPDF()">PDF 저장</button>

        <div class="status">
          <div class="circle">85%</div>
          <div>
            <strong style="color:#f4d36b">분석 진행률</strong>
            <div class="small">무료 결과는 핵심 전장만 공개됩니다.</div>
          </div>
        </div>
      </div>

      <div class="box" style="margin-top:18px">
        <h2 class="section-title">전쟁 요약</h2>
        <div class="menu-card"><strong>⚔️ 원국</strong><br><span class="small">타고난 전장 구조</span></div>
        <div class="menu-card"><strong>🎒 지장간</strong><br><span class="small">숨겨진 아이템</span></div>
        <div class="menu-card"><strong>🔘 대운</strong><br><span class="small">인생 스위치</span></div>
        <div class="menu-card"><strong>⏱️ 세운</strong><br><span class="small">사용 타이밍</span></div>
      </div>
    </aside>

    <main>
      <div id="result">
        <div class="box hero">
          <div>
            <h2>당신의 전쟁지도는 아직 열리지 않았습니다.</h2>
            <p>
              생년월일과 출생시간을 입력하면 원국의 세력, 지장간 아이템,<br>
              대운 스위치와 세운 타이밍을 사주전쟁 방식으로 분석합니다.
            </p>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<script>
let isPaid=false;
let lastFullResult="";

function pad(n){return String(n).padStart(2,"0")}

function fillOptions(){
  const year=document.getElementById("year");
  const month=document.getElementById("month");
  const day=document.getElementById("day");
  const hour=document.getElementById("hour");
  const minute=document.getElementById("minute");

  year.innerHTML='<option value="">출생연도</option>';
  month.innerHTML='<option value="">월</option>';
  day.innerHTML='<option value="">일</option>';
  hour.innerHTML='<option value="">시</option>';
  minute.innerHTML='<option value="">분</option>';

  for(let y=1950;y<=2026;y++) year.innerHTML+=`<option value="${y}">${y}년</option>`;
  for(let m=1;m<=12;m++) month.innerHTML+=`<option value="${pad(m)}">${m}월</option>`;
  for(let d=1;d<=31;d++) day.innerHTML+=`<option value="${pad(d)}">${d}일</option>`;
  for(let h=0;h<=23;h++) hour.innerHTML+=`<option value="${pad(h)}">${h}시</option>`;
  for(let m=0;m<60;m+=10) minute.innerHTML+=`<option value="${pad(m)}">${m}분</option>`;
}
fillOptions();

const hiddenGan = {
  "子":"癸", "丑":"己·癸·辛", "寅":"甲·丙·戊", "卯":"乙",
  "辰":"戊·乙·癸", "巳":"丙·戊·庚", "午":"丁·己", "未":"己·丁·乙",
  "申":"庚·壬·戊", "酉":"辛", "戌":"戊·辛·丁", "亥":"壬·甲",
  "자":"계", "축":"기·계·신", "인":"갑·병·무", "묘":"을",
  "진":"무·을·계", "사":"병·무·경", "오":"정·기", "미":"기·정·을",
  "신":"경·임·무", "유":"신", "술":"무·신·정", "해":"임·갑"
};

const elementMap = {
  "甲":"목","乙":"목","丙":"화","丁":"화","戊":"토","己":"토","庚":"금","辛":"금","壬":"수","癸":"수",
  "갑":"목","을":"목","병":"화","정":"화","무":"토","기":"토","경":"금","신":"금","임":"수","계":"수",

  "寅":"목","卯":"목","巳":"화","午":"화","辰":"토","戌":"토","丑":"토","未":"토","申":"금","酉":"금","亥":"수","子":"수",
  "인":"목","묘":"목","사":"화","오":"화","진":"토","술":"토","축":"토","미":"토","신":"금","유":"금","해":"수","자":"수"
};

const itemInfo = {
  "甲": { element:"목", name:"성장 아이템", desc:"시작, 기획, 교육, 확장, 새 판을 여는 힘" },
  "乙": { element:"목", name:"섬세한 성장 아이템", desc:"관계 조율, 감각, 브랜딩, 꾸준한 확장" },
  "丙": { element:"화", name:"태양 아이템", desc:"노출, 인기, 표현, 무대, 사람을 끌어오는 힘" },
  "丁": { element:"화", name:"불씨 아이템", desc:"콘텐츠, 감성, 집중력, 작지만 강한 영향력" },
  "戊": { element:"토", name:"기반 아이템", desc:"신뢰, 관리, 부동산, 조직, 버티는 힘" },
  "己": { element:"토", name:"현실화 아이템", desc:"실무, 돌봄, 설계, 정리, 생활형 수익" },
  "庚": { element:"금", name:"결단 아이템", desc:"판단, 절단, 기술, 규칙, 구조를 세우는 힘" },
  "辛": { element:"금", name:"정교함 아이템", desc:"디자인, 미감, 전문성, 브랜드 고급화" },
  "壬": { element:"수", name:"흐름 아이템", desc:"정보, 유통, 이동, 네트워크, 큰 흐름을 타는 힘" },
  "癸": { element:"수", name:"지혜 아이템", desc:"학습, 분석, 상담, 숨은 지식, 직관" },

  "갑": { element:"목", name:"성장 아이템", desc:"시작, 기획, 교육, 확장, 새 판을 여는 힘" },
  "을": { element:"목", name:"섬세한 성장 아이템", desc:"관계 조율, 감각, 브랜딩, 꾸준한 확장" },
  "병": { element:"화", name:"태양 아이템", desc:"노출, 인기, 표현, 무대, 사람을 끌어오는 힘" },
  "정": { element:"화", name:"불씨 아이템", desc:"콘텐츠, 감성, 집중력, 작지만 강한 영향력" },
  "무": { element:"토", name:"기반 아이템", desc:"신뢰, 관리, 부동산, 조직, 버티는 힘" },
  "기": { element:"토", name:"현실화 아이템", desc:"실무, 돌봄, 설계, 정리, 생활형 수익" },
  "경": { element:"금", name:"결단 아이템", desc:"판단, 절단, 기술, 규칙, 구조를 세우는 힘" },
  "신": { element:"금", name:"정교함 아이템", desc:"디자인, 미감, 전문성, 브랜드 고급화" },
  "임": { element:"수", name:"흐름 아이템", desc:"정보, 유통, 이동, 네트워크, 큰 흐름을 타는 힘" },
  "계": { element:"수", name:"지혜 아이템", desc:"학습, 분석, 상담, 숨은 지식, 직관" }
};

function splitPillar(p){
  return { gan:p ? p[0] : "-", ji:p ? p[1] : "-" };
}

function getElementStats(p){
  const keys=["year","month","day","hour"];
  const count={목:0,화:0,토:0,금:0,수:0};

  keys.forEach(k=>{
    const s=splitPillar(p[k]);

    const ganEl = elementMap[s.gan];
    if(ganEl) count[ganEl] += 1;

    const jiEl = elementMap[s.ji];
    if(jiEl) count[jiEl] += 1;

    const hidden = hiddenGan[s.ji];
    if(hidden){
      hidden.split("·").forEach(h=>{
        const e = elementMap[h];
        if(e) count[e] += 0.5;
      });
    }
  });

  return count;
}

function getHiddenItemsFromPillars(p){
  const keys = ["year","month","day","hour"];
  const items = [];

  keys.forEach(k=>{
    const ji = splitPillar(p[k]).ji;
    const hidden = hiddenGan[ji];

    if(hidden){
      hidden.split("·").forEach(h=>{
        const info = itemInfo[h];
        if(info){
          items.push({
            pillar: k,
            gan: h,
            ji,
            ...info
          });
        }
      });
    }
  });

  return items;
}

function getStrongestElement(stats){
  return Object.entries(stats).sort((a,b)=>b[1]-a[1])[0];
}

function renderPillars(p){
  if(!p) return "";

  const cols = [
    {label:"년주", value:p.year},
    {label:"월주", value:p.month},
    {label:"일주(나)", value:p.day},
    {label:"시주", value:p.hour}
  ];

  const dayGan = splitPillar(p.day).gan;
  const dayElement = elementMap[dayGan] || "-";
  const stats=getElementStats(p);
  const strongest=getStrongestElement(stats);
  const maxVal=Math.max(...Object.values(stats),1);

  return `
  <div class="dashboard">
    <div class="box">
      <h2 class="section-title">사주 원국 구성</h2>
      <table class="manse">
        <tr>
          <th class="label"></th>
          ${cols.map(c=>`<th>${c.label}</th>`).join("")}
        </tr>
        <tr>
          <td class="label">천간</td>
          ${cols.map(c=>`<td class="gan">${splitPillar(c.value).gan}</td>`).join("")}
        </tr>
        <tr>
          <td class="label">지지</td>
          ${cols.map(c=>`<td class="ji">${splitPillar(c.value).ji}</td>`).join("")}
        </tr>
        <tr>
          <td class="label">지장간</td>
          ${cols.map(c=>{
            const ji=splitPillar(c.value).ji;
            return `<td class="hidden">${hiddenGan[ji] || "-"}</td>`;
          }).join("")}
        </tr>
      </table>
    </div>

    <div class="box">
      <h2 class="section-title">전장 상태 분석</h2>
      <div class="card">
        <h3>일간 캐릭터</h3>
        <p>이 사주의 주인공은 <strong>${dayGan}</strong> 일간입니다.</p>
        <p>중심 속성은 <strong>${dayElement}</strong> 기운입니다.</p>
        <span class="badge">주인공 ${dayGan}</span>
        <span class="badge">${dayElement} 전장</span>
        <span class="badge">강세 ${strongest ? strongest[0] : "-"} 기운</span>
      </div>

      <div class="card" style="margin-top:12px">
        <h3>오행 병력</h3>
        <p class="small">천간 1점 + 지지 1점 + 지장간 0.5점으로 계산합니다.</p>
        ${Object.entries(stats).map(([k,v])=>`
          <div style="margin-top:10px">${k} 기운 ${v}</div>
          <div class="bar"><i style="width:${Math.min((v/maxVal)*100,100)}%"></i></div>
        `).join("")}
      </div>
    </div>
  </div>`;
}

function renderItems(p){
  if(!p) return "";

  const items = getHiddenItemsFromPillars(p);
  const pillarName = { year:"년주", month:"월주", day:"일주", hour:"시주" };

  const grouped = {
    목: items.filter(x=>x.element==="목"),
    화: items.filter(x=>x.element==="화"),
    토: items.filter(x=>x.element==="토"),
    금: items.filter(x=>x.element==="금"),
    수: items.filter(x=>x.element==="수")
  };

  const strongest = Object.entries(grouped).sort((a,b)=>b[1].length-a[1].length)[0];

  return `
  <div class="box" style="margin-top:18px">
    <h2 class="section-title">핵심 아이템, 지장간</h2>

    <p class="small">
      지장간은 겉으로 드러난 성격이 아니라 원국 안쪽에 숨어 있는 아이템입니다.
      평소에는 잠들어 있다가 대운과 세운이 맞을 때 현실 능력으로 튀어나옵니다.
    </p>

    <div class="grid3">
      ${items.map(item=>`
        <div class="card">
          <h3>${item.gan} · ${item.name}</h3>
          <p>${item.desc}</p>
          <span class="badge">${item.element} 아이템</span>
          <span class="badge">${pillarName[item.pillar]} ${item.ji} 속</span>
        </div>
      `).join("")}
    </div>

    <div class="card" style="margin-top:14px">
      <h3>아이템 해석 요약</h3>
      <p>
        현재 원국 안에는 총 <strong>${items.length}</strong>개의 지장간 아이템이 숨어 있습니다.
        가장 많이 반복되는 아이템 계열은
        <strong>${strongest ? strongest[0] : "-"}</strong> 기운입니다.
      </p>
      <p>
        이 기운은 단순한 오행 숫자가 아니라 인생에서 반복적으로 꺼내 쓰게 되는 숨은 무기입니다.
        대운이 이 계열을 건드리면 평소에는 생각만 하던 일이 현실 행동으로 바뀌기 쉽습니다.
      </p>
    </div>
  </div>`;
}

function renderDaewoon(d){
  if(!d || !d.list) return "";
  return `
  <div class="box" style="margin-top:18px">
    <h2 class="section-title">대운 스위치</h2>
    <p class="small">${d.startInfo || ""}</p>
    <div class="grid3">
      ${d.list.map(x=>`
        <div class="card">
          <h3>${x.startAge}세~${x.endAge}세</h3>
          <p style="font-size:24px;color:#ffe48a;font-weight:900">${x.ganji}</p>
          <p class="small">${x.startYear}년~${x.endYear}년</p>
        </div>
      `).join("")}
    </div>
  </div>`;
}

function cleanText(t){
  return (t || "결과가 비어 있습니다.")
    .replace(/\*\*/g,"")
    .replace(/###/g,"")
    .replace(/(\d+\.\s)/g,"\n\n$1")
    .trim();
}

function unlock(){
  isPaid=true;
  alert("결제 완료 테스트: 전체 리포트가 열렸습니다.");
  if(lastFullResult) document.getElementById("result").innerHTML=lastFullResult;
}

async function analyze(){
  const name=document.getElementById("name").value.trim();
  const year=document.getElementById("year").value;
  const month=document.getElementById("month").value;
  const day=document.getElementById("day").value;
  const hour=document.getElementById("hour").value;
  const minute=document.getElementById("minute").value;
  const gender=document.getElementById("gender").value;
  const result=document.getElementById("result");

  if(!name || !year || !month || !day || !hour || !minute || !gender){
    result.innerHTML='<div class="box">입력 정보를 모두 선택해주세요.</div>';
    return;
  }

  result.innerHTML='<div class="loading">⚔️ 전쟁지도 분석 중입니다...<br><span class="small">원국, 지장간 아이템, 대운 스위치를 불러오는 중</span></div>';

  try{
    const res=await fetch("/analyze",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        name,
        birth:`${year}-${month}-${day}`,
        time:`${hour}:${minute}`,
        gender
      })
    });

    const data=await res.json();

    if(!res.ok){
      result.innerHTML=`<div class="box">서버 오류: ${data.result || data.error || "응답 오류"}</div>`;
      return;
    }

    const report=cleanText(data.result);
    const preview=report.slice(0,950);

    const fullHTML=`
      <div class="box hero">
        <div>
          <h2>${name}님의 전쟁지도</h2>
          <p>당신의 원국은 고정된 판결문이 아니라 지금부터 읽어야 할 전략 지도입니다.</p>
        </div>
      </div>
      ${renderPillars(data.pillars)}
      ${renderItems(data.pillars)}
      ${renderDaewoon(data.daewoon)}
      <div class="box" style="margin-top:18px">
        <h2 class="section-title">프리미엄 전투 해석</h2>
        <div class="report">${report}</div>
      </div>`;

    const previewHTML=`
      <div class="box hero">
        <div>
          <h2>${name}님의 무료 전쟁지도</h2>
          <p>무료 결과에서는 원국 구성과 일부 전투 해석만 공개됩니다.</p>
        </div>
      </div>
      ${renderPillars(data.pillars)}
      ${renderItems(data.pillars)}
      ${renderDaewoon(data.daewoon)}
      <div class="box" style="margin-top:18px">
        <h2 class="section-title">무료 미리보기</h2>
        <div class="report">${preview}...</div>
      </div>
      <div class="box lock" style="margin-top:18px">
        🔒 숨겨진 아이템의 정확한 사용법, 대운 스위치, 세운 타이밍은 전체 리포트에서 공개됩니다.<br>
        “결제하고 전체보기” 버튼을 누르면 테스트로 전체 내용이 열립니다.
      </div>`;

    lastFullResult=fullHTML;
    result.innerHTML=isPaid ? fullHTML : previewHTML;

  }catch(e){
    result.innerHTML=`<div class="box">연결 오류 발생: ${e.message}</div>`;
  }
}

function downloadPDF(){
  if(!isPaid){
    alert("PDF 저장은 결제 후 가능합니다.");
    return;
  }
  window.print();
}
</script>
</body>
