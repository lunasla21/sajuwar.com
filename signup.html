<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>회원가입 | 쭈쌤의 사주 전쟁</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #fff8e9; color: #2b1b12; font-family: "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif; }
    main { width: min(460px, calc(100% - 32px)); padding: 26px; border: 1px solid rgba(113,80,44,.18); background: rgba(255,250,239,.9); box-shadow: 0 24px 80px rgba(126,82,35,.16); }
    h1 { margin-top: 0; }
    label { display: grid; gap: 7px; margin-top: 12px; font-weight: 900; color: #705642; }
    input { min-height: 46px; border: 1px solid rgba(113,80,44,.22); padding: 0 12px; font: inherit; background: #fff; }
    button, a { min-height: 46px; display: grid; place-items: center; width: 100%; margin-top: 14px; border: 0; color: #2b1b12; background: linear-gradient(135deg,#ffe6a3,#d99b2e); font: inherit; font-weight: 900; text-decoration: none; cursor: pointer; }
    a { color: #6d4310; border: 1px solid rgba(137,91,31,.28); background: #fffaf0; }
  </style>
</head>
<body>
  <main>
    <h1>회원가입</h1>
    <label>이름<input id="name" autocomplete="name" /></label>
    <label>이메일<input id="email" type="email" autocomplete="email" /></label>
    <label>연락처<input id="phone" autocomplete="tel" /></label>
    <label>비밀번호<input id="password" type="password" autocomplete="new-password" /></label>
    <button type="button" onclick="signup()">가입하기</button>
    <a href="/login.html">이미 계정이 있어요</a>
  </main>
  <script>
    async function signup() {
      const payload = {
        name: document.getElementById("name").value.trim(),
        email: document.getElementById("email").value.trim(),
        phone: document.getElementById("phone").value.trim(),
        password: document.getElementById("password").value,
      };
      const response = await fetch("/api/auth/signup", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
      const data = await response.json();
      if (!response.ok) {
        alert(data.error || "회원가입에 실패했습니다.");
        return;
      }
      localStorage.setItem("sajuwar_auth_token", data.token);
      localStorage.setItem("sajuwar_user", JSON.stringify(data.user));
      location.href = "/payment.html";
    }
  </script>
</body>
</html>
