<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>접수 완료 | 사주전쟁</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #f6efdd;
      background: #080807;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      text-align: center;
    }
    .panel {
      width: min(480px, calc(100% - 32px));
      padding: 34px;
      border: 1px solid rgba(242, 219, 141, 0.28);
      background: rgba(18, 17, 14, 0.86);
    }
    h1 { color: #f2db8d; }
    p { color: #c8bfa9; line-height: 1.7; }
    a {
      min-height: 48px;
      display: grid;
      place-items: center;
      margin-top: 12px;
      color: #17110a;
      background: linear-gradient(135deg, #f2db8d, #d8ad4f);
      font-weight: 900;
      text-decoration: none;
    }
    a.secondary {
      color: #f2db8d;
      border: 1px solid rgba(242,219,141,.32);
      background: rgba(8,8,7,.56);
    }
  </style>
</head>
<body>
  <main class="panel">
    <h1>접수가 완료되었습니다</h1>
    <p>무통장입금은 관리자 입금 확인 후 이용 가능합니다. 확인완료가 되면 구매내역에서 리포트 또는 강의 버튼이 표시됩니다.</p>
    <a href="/mypage.html">구매내역 확인</a>
    <a class="secondary" href="/">메인으로</a>
  </main>
</body>
</html>
