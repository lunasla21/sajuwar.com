<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 완료 | 사주전쟁</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #f6efdd;
      background: #080807;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      text-align: center;
    }
    .panel {
      width: min(480px, calc(100% - 32px));
      padding: 34px;
      border: 1px solid rgba(242, 219, 141, 0.28);
      background: rgba(18, 17, 14, 0.86);
    }
    h1 { color: #f2db8d; }
    p { color: #c8bfa9; }
  </style>
</head>
<body>
  <main class="panel">
    <h1>결제가 완료되었습니다</h1>
    <p>프리미엄 리포트를 열 수 있도록 이동합니다.</p>
  </main>
  <script>
    localStorage.setItem("sajuwar_paid", "true");
    setTimeout(() => {
      window.location.href = "/";
    }, 1000);
  </script>
</body>
</html>
