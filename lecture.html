<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>강의실 | 쭈쌤의 사주 전쟁</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      color: #2b1b12;
      background: #fff8e9;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      line-height: 1.65;
    }
    main { width: min(920px, calc(100% - 32px)); margin: 0 auto; padding: 42px 0; }
    .panel {
      padding: 26px;
      border: 1px solid rgba(113,80,44,.18);
      background: rgba(255,250,239,.86);
      box-shadow: 0 24px 80px rgba(126,82,35,.16);
    }
    h1 { margin-top: 0; }
    a {
      min-height: 46px;
      display: inline-grid;
      place-items: center;
      margin-top: 12px;
      padding: 0 16px;
      color: #2b1b12;
      background: linear-gradient(135deg, #ffe6a3, #d99b2e);
      font-weight: 900;
      text-decoration: none;
    }
    .secondary { border: 1px solid rgba(137,91,31,.28); color: #6d4310; background: #fffaf0; }
  </style>
</head>
<body>
  <main>
    <section class="panel" id="content">
      <h1>권한을 확인하고 있습니다</h1>
      <p>잠시만 기다려주세요.</p>
    </section>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const authToken = params.get("token") || localStorage.getItem("sajuwar_auth_token") || "";

    async function checkAccess() {
      const content = document.getElementById("content");
      const query = new URLSearchParams({ product_id: "saju_lecture" });
      const response = await fetch(`/api/purchases/check?${query.toString()}`, {
        headers: { Authorization: `Bearer ${authToken}` }
      });
      const data = await response.json();
      if (!data.active) {
        content.innerHTML = `
          <h1>구매가 완료되지 않았습니다.</h1>
          <p>관리자 입금 확인 후 이용 가능합니다.</p>
          <a href="/mypage.html">구매내역 확인</a>
          <a class="secondary" href="/payment.html">무통장입금 신청</a>
        `;
        return;
      }
      localStorage.setItem("sajuwar_auth_token", authToken);
      content.innerHTML = `
        <h1>사주전쟁 강의실</h1>
        <p>구매권한이 확인되었습니다. 이 영역에 강의 영상, 자료 다운로드, 커리큘럼을 연결하면 됩니다.</p>
        <a href="/mypage.html">구매내역으로</a>
      `;
    }

    checkAccess();
  </script>
</body>
</html>
