brain:
  decision_rule: |
    이 사례의 결론은 '회사를 퇴사하고 사업한 이유'이다.
    직장 판단은 세운이 관성, 식상, 일지와 어떻게 부딪히는지를 먼저 본다. 관성이 식상에 손상되거나 충을 받으면 직장 자리, 승진, 부서 안정성이 흔들린다는 결론을 낸다.
    이 사례의 판단 근거는 식상견관, 사해충, 사유합, 금국, 관성, 식상, 인성, 일지, 월간, 세운 지지, 합, 충, 형, 극의 작용이다.
    원문 판단 근거: 식상견관(食傷見官)의 흐름으로 인해 상사나 조직에 대한 강한 거부감이 발생했다.
    원문 판단 근거: 이때 내면의 안정을 상징하는 일지의 해수(亥水)가 사해충(巳亥)沖)을 일으키며 합(合)으로 묶여 있던 상황을 강하게 흔들어 깨뜨린다.
    원문 판단 근거: 정유년(丁酉年)의 유금(酉金)은 사주의 사화(巳,火)와 사유합(巳酉合) 금국(金局)을 이룬다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '회사를 퇴사하고 사업한 이유' 결론을 세운다.
  priority_rule:
