    - "가장 먼저 확인할 신호는 식상견관이다."
    - "그 다음 사해충 흐름이 현실 사건을 강화하거나 완화하는지 본다."
    - "관성의 안정성"
    - "식상견관 여부"
    - "세운 지지의 충합"
    - "마지막에 '회사를 퇴사하고 사업한 이유' 결론이 무리한 단정인지, 조절 가능한 선택인지 구분한다."
  consultation_strategy:
    - "먼저 고객 질문을 '회사를 퇴사하고 사업한 이유' 흐름으로 정리한다."
    - "그 다음 식상견관(食傷見官)의 흐름으로 인해 상사나 조직에 대한 강한 거부감이 발생했다. 라는 명리 근거를 설명한다."
    - "이어 이때 내면의 안정을 상징하는 일지의 해수(亥水)가 사해충(巳亥)沖)을 일으키며 합(合)으로 묶여 있던 상황을 강하게 흔들어 깨뜨린다. 흐름을 현실 사건으로 번역한다."
    - "왜 결론이 '회사를 퇴사하고 사업한 이유' 쪽으로 좁혀지는지 고객이 납득할 수 있게 말한다."
    - "마지막에는 불안을 키우지 않고 조절 가능한 행동을 제시한다."
  hidden_pattern: |
    겉 질문의 표현은 '회사를 퇴사하고 사업한 이유'이다. 실제 핵심은 식상견관(食傷見官)의 흐름으로 인해 상사나 조직에 대한 강한 거부감이 발생했다. 특히 식상견관 신호를 표면 사건보다 먼저 읽는다.
