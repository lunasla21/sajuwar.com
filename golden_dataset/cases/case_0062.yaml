    - "甲午: 갑오년(甲午年) 시 일 월 년 丙 庚 庚 乙 戌 午 辰 亥 진월(辰月)의 경금(庚金) 일간으로 태어나, 시간에 찬란한 태양인 병화(丙火) 관성을 두고 있어 머리가 명석하고 재능이 뛰어나 전교 상위권의 성적을 유지하는 수재형 사주다."
    - "癸巳: 계사년(癸巳年)에 식상인 계수(癸水)는 노력과 열정을 뜻하지만, 목표 대학을 상징하는 시간의 병화(丙,火)가 극(剋)을 당하는 형국이 되었다."
    - "乙未: 목표를 달성하고 대학교 1학년이 되는 을미년(乙未年)은 매우 평온 하고 즐거운 해가 되는데, 이는 지지의 인성인 미토(未土)가 일지의 관성인 오화(午火)와 만나 오미합(午未合)을 이루기 때문이다."
