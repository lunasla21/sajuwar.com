    이 사례의 판단 근거는 관성, 인성, 비겁, 세운 천간, 세운 지지, 합, 충, 극, 생, 甲午, 丁未, 乙未, 丙申의 작용이다.
    원문 판단 근거: 시(時)의 해수 (亥水) 관성이 유일하게 대지를 적셔주고 있으며, 시간의 신금(辛金)은 일간의 활동 결과물을 의미한다.
    원문 판단 근거: 세운 천간으로 들어오는 목(木)의 기운, 즉 갑목 (甲木)과 을목(乙木)은 인성으로 신용, 약속, 그리고 계약을 상징한다
    원문 판단 근거: 이어지는 병신년(丙申年)도 비겁 병화(丙火)는 신금(辛金)과 합(合)을 한다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '사업의 어려움' 결론을 세운다.
