    갑오년(甲午年): 사업의 어려움 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 불길이 걷잡을 수 없이 치솟아 사주 내의 유일한 수기(水氣)인 해수(亥水)를 증발시키고 재물 신금(辛金)을 녹여버리니, 매출은 바닥을 치고 빚만 늘어가는 악순환이 계속된다. 이어지는 병신년(丙申年)도 비겁 병화(丙火)는 신금(辛金)과 합(合)을 한다. 재물이 비겁과 합(合)을 하는 현상은, 실속이 별로 없어 재물로 극심한 고생을 겪게 되는 해다.
