    사업 판단은 재성, 식상, 월주와 세운의 충합을 함께 본다. 돈이 생기는 모양보다 돈이 머무는 구조와 가게 자리, 계약 흐름이 살아 있는지를 우선 판단한다.
    이 사례의 판단 근거는 식상, 인성, 월간, 연간, 세운 천간, 극, 생, 癸巳, 甲子, 乙丑의 작용이다.
    원문 판단 근거: 문서가 비에 젖어 꿈틀거리니, 그 파동이 월간의 업무 에너지인 식상 경금(庚金)에 전달된다.
    원문 판단 근거: 이 비는 연간에 있는 소중한 문서이자 지혜인 정화(丁,火) 인성을 정면으로 적신다.
    원문 판단 근거: 계사년(癸巳年)에 먼저 하늘의 기운을 살피면, 세운 천간에서 계수 (癸水)라는 시원한 빗줄기가 내려온다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '가게를 폐업했다' 결론을 세운다.
