    - "이어 이 비는 연간에 있는 소중한 문서이자 지혜인 정화(丁,火) 인성을 정면으로 적신다. 흐름을 현실 사건으로 번역한다."
    - "왜 결론이 '가게를 폐업했다' 쪽으로 좁혀지는지 고객이 납득할 수 있게 말한다."
