reasoning:
  source_interpretation: |
    60. 계사년(癸巳年) : 가게를 폐업했다. 시 일 월 년(여) 己 己 庚 丁 巳 巳 戌 未 가을의 풍요를 거두어들여 갈무리하고 겨울 휴식을 준비하는 늦가을, 만물의 생명력을 땅속 깊이 품은 술월(戌月)의 단단한 대지 위에서 태어난 기토(己土)이다. 사주를 가만히 들여다보니, 땅 밑에는 뜨거운 열기인 사화(巳火)가 가득하고 하늘에는 결실의 기운인 경금(庚金)이 빛나고 있어 강인하고도 열정적인 기상이 느껴진다. 하지만 계사년 (癸巳年)은 평온한 대지에 비가 내리고 지각 변동이 일어나는 시기다. 계사년(癸巳年)에 먼저 하늘의 기운을 살피면, 세운 천간에서 계수 (癸水)라는 시원한 빗줄기가 내려온다. 이 비는 연간에 있는 소중한 문서이자 지혜인 정화(丁,火) 인성을 정면으로 적신다. 문서가 비에 젖어 꿈틀거리니, 그 파동이 월간의 업무 에너지인 식상 경금(庚金)에 전달된다. 이 가게를 계속 지켜야 하나, 아니면 과감히 다른 곳으로 옮겨야 하나라는 번민이 밤마다 그대의 베갯머리를 적시는 시기다. 특히 시간의 기토(己土)는 그대가 운영하는 가게 자리를 뜻하는데, 운세의 재물인 계수(癸水)를 보고 토극수(土剋水)로 부딪치니 이는 곧 손님의 돈과 내 가게의 인연이 다했음을 알리는 종소리와 같다. 지금의 가게와는 이미 인연을 다 써버렸으니 미련 없이 손을 놓아야 한다. 다행히 계약의 소식은 찬 바람이 부는 겨울, 갑자월(甲子月)이나 해를 넘긴 을축월(乙丑月)에 들려온다. 비록 지루한 기다림이겠지만, 이때 비로소 무거운 짐을 내려놓게 될 터다.
consultation:
  practical_guidance: |
    써버렸으니 미련 없이 손을 놓아야 한다. 다행히 계약의 소식은 찬 바람이 부는 겨울, 갑자월(甲子月)이나 해를 넘긴 을축월(乙丑月)에 들려온다. 비록 지루한 기다림이겠지만, 이때 비로소 무거운 짐을 내려놓게 될 터다.
golden_answer:
  answer: |
    계사년(癸巳年): 가게를 폐업했다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 써버렸으니 미련 없이 손을 놓아야 한다. 다행히 계약의 소식은 찬 바람이 부는 겨울, 갑자월(甲子月)이나 해를 넘긴 을축월(乙丑月)에 들려온다. 비록 지루한 기다림이겠지만, 이때 비로소 무거운 짐을 내려놓게 될 터다.
brain:
  decision_rule: |
    IF 계사년에 식상이 사업장, 계약, 운영 지속성을 직접 건드리고, 인성이 같은 방향으로 압력을 보태면 THEN 결론은 '가게를 폐업했다' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 사업장, 계약, 운영 지속성 문제로 보이더라도 THEN 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 매출 욕심보다 자리, 계약, 비용 누수가 먼저 문제 된다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 식상이 실제 사건의 문을 여는지 본다."
    - "2순위: 인성이 식상을 강화하는지, 완화하는지 본다."
    - "3순위: 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 식상과 인성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 사업장, 계약, 운영 지속성에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '가게를 폐업했다' 사례지만 숨은 판단 구조는 식상 하나가 아니라 식상과 인성의 결합이다.
    IF 이 결합이 사업장, 계약, 운영 지속성의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 재성은 보이나 자리나 계약궁이 흔들리면 THEN 확장보다 고정비, 계약 조건, 회수 가능 금액을 먼저 줄이게 한다.
    THEN 새 투자보다 손실 한도, 철수 기준, 계약 문구를 먼저 정하게 한다.
    BECAUSE 식상이 사업 사건으로 드러날 때는 돈을 버는 힘보다 돈이 새는 통로가 더 먼저 현실화되기 때문이다.
  forbidden_advice:
    - "대박, 무조건 확장, 반드시 계약 성사처럼 욕망을 키우는 표현을 하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
