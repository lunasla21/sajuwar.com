reasoning:
  source_interpretation: |
    " 사춘기가 심하다. 70. 계사년(癸巳年) : 중2 학생 시 일 월 년(남) 癸 壬 己 己 卯 午 巳 卯 초여름의 뜨거운 기운을 머금은 사월(巳月)의 강물, 임수(壬水)로 태어났다. 계사년(癸巳年)에 천간은 계수(癸水)라는 비겁의 기운이 들어왔다는 건, 혼자 흐르던 강물(壬水)에 또 다른 물줄기가 합쳐진 것과 같다. 혼자 있을 때는 주변 눈치도 보고 조심스러웠는데, 나랑 똑같은 기운(癸水)이 내 뒤를 든든하게 받쳐주니 갑자기 나도 할 수 있어 하는 반발심과 자신감이 동시에 고개를 들기 시작한다. 이 같은 마음이 생기면서 주장이 강해지고 고집이 세지며, 남에게 굽히기 싫어한다. 특히 중학교 2학년 소년에게 이런 기운이 들어오면, 부모님이나 선생님의 훈계가 나를 억압하는 구속으로 느껴지게 된다. 내 인생은 내 거야. 라고 외치며 반항하는 에너지가 바로 이 비겁의 기운에서 나온다. 풍선에 바람이 들어가서 빵빵해진 것처럼, 누가 살짝 건드려도 터질 것 같은 강한 자아(自我)가 형성된 상태라고 보면 된다. 남들이 보기에는 왜 저렇게도 고집을 피우지? 하겠지만, 본인에게는 그게 자아를 지키는 방식이다. 강물이 비가 내려 불어나면 물살이 거세지듯이, 계수(癸水)라는 비겁이 들어와 임수(壬水) 학생의 마음 거대한 파도로 만들어버린 것이다. 그래서 주변의 통제를 거부하고 마음이 가는 대로 움직이고 싶어 하는 심리적인 상태가 된 것이다. 누구의 말도 듣지 않고 내 멋대로 하고 싶은 마음이 최고조에 달한다. 고부보다 친구를 더 중요하게 여기며, 노는 쪽으로 기운이 쏠린다. " 그리고 세운 지지의 사화(巳火) 속에 있는 경금(庚金)이 연지의 묘목 (卯木)과 을경합(乙庚合)을 한다. 묘목(卯木)은 신경을 의미하는데, 이 기운이 합(合)으로 묶이면서 집중력이 흐트러지고 예민함이 극도로 높아진다. 수학의 복잡한 문제는 부담으로 느껴지고, 영어 단어 암기 역시 쉽지 않게 다가온다. 이미 알고 있는 것만 대충 하려는 마음이 강해지며, 부에 대한 집중력과 효율은 자연스럽게 떨어진다. 책상에 앉아 있는 시간 자체가 버겁게 느껴지는 흐름이다. 여기에 학교를 상징하는 연간과 월간의 관성 기토(己土)가 세운 계수(癸水)와 충돌하면서, 어른들의 조언과 산소리는 마음에 들어오지 않고, 오히려 거부감으로 이어지기 쉽다. 친구들과 관계에서도 작은 갈등이 생기며 학교생활이 부담스럽게 느껴질 수 있다. 이처럼 내면에서는 반항심과 갈등이 커지며 사춘기의 기운이 강하게 드러나는 시기다. 이어지는 갑오년(甲午年), 이제 좀 정신을 차려볼까 하는 찰나다. 하늘에서 식상 갑목(甲木)이 내려와 나도 이제 공부 좀 해볼까? 라는 기특한 마음을 품게 한다. 이 갑목(甲木)이 학교를 상징하는 관성인 기토(己土)와 만나 갑기합(甲己合)을 하니, 겉으로 보기에는 책상에 앉아 펜을 굴리는 모습이 제법 진지해 보인다. 하지만 문제는 지지의 오오형(午午刑)과 오묘파(午卯破)라는 불협화음이 울려 퍼진다. 이는 엔진은 돌아가는데 바퀴가 헛도는 자동차와 같다. 나름대로 노력은 하지만, 성적표에 찍히는 숫자는 야속하게도 일간의 노력을 외면한다. 공부는 역시 나랑 안 맞아. 라는 핑계를 대기에 딱 좋은 해다. 노력에 비하여 성적 향상이 더디니, 일간은 다시금 세상을 향해 삐딱한 시선을 던지며 방황의 길로 고개를 돌리게 된다. 스스로에 대한 확신마저 흔들리며 방향을 잃기 쉬운 시기라 할 수 있다. - 145 _
consultation:
  practical_guidance: |
    친구를 더 중요하게 여기며, 노는 쪽으로 기운이 쏠린다. 여기에 학교를 상징하는 연간과 월간의 관성 기토(己土)가 세운 계수(癸水)와 충돌하면서, 어른들의 조언과 산소리는 마음에 들어오지 않고, 오히려 거부감으로 이어지기 쉽다.
golden_answer:
  answer: |
    계사년(癸巳年): 중2 학생, 사춘기가 심하다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 친구를 더 중요하게 여기며, 노는 쪽으로 기운이 쏠린다. 여기에 학교를 상징하는 연간과 월간의 관성 기토(己土)가 세운 계수(癸水)와 충돌하면서, 어른들의 조언과 산소리는 마음에 들어오지 않고, 오히려 거부감으로 이어지기 쉽다.
brain:
  decision_rule: |
    IF 계사년에 관성이 학업 지속력과 시험/진로 선택을 직접 건드리고, 식상이 같은 방향으로 압력을 보태면 THEN 결론은 '중2 학생, 사춘기가 심하다' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 학업 지속력과 시험/진로 선택 문제로 보이더라도 THEN 인성의 보호, 식상의 산만함, 관성의 규칙성을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 능력 부족보다 리듬 붕괴와 방향 혼선이 먼저 문제 된다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 관성이 실제 사건의 문을 여는지 본다."
    - "2순위: 식상이 관성을 강화하는지, 완화하는지 본다."
    - "3순위: 인성의 보호, 식상의 산만함, 관성의 규칙성 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 관성과 식상을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 학업 지속력과 시험/진로 선택에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '중2 학생, 사춘기가 심하다' 사례지만 숨은 판단 구조는 관성 하나가 아니라 관성과 식상의 결합이다.
    IF 이 결합이 학업 지속력과 시험/진로 선택의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 인성의 보호보다 식상/충의 산만함이 강하면 THEN 목표를 키우기보다 공부 장소, 시간표, 시험 전략을 좁히게 한다.
    THEN 진로 결정은 감정 상태가 아니라 유지 가능한 루틴을 기준으로 판단하게 한다.
    BECAUSE 관성이 학업에 작동하면 재능보다 지속 리듬이 성패를 가른다.
  forbidden_advice:
    - "합격/불합격을 단정하거나 학생의 가능성을 꺾는 표현을 하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 癸 壬 己 己 / 지지: 卯 午 巳 卯"
    - "세운: 계사년 癸巳年"
    - "핵심 신호 1: 관성"
    - "핵심 신호 2: 식상"
    - "판단 영역: 학업 지속력과 시험/진로 선택"
    - "우선 판단축: 인성의 보호, 식상의 산만함, 관성의 규칙성"
    - "결론 방식: 능력 부족보다 리듬 붕괴와 방향 혼선이 먼저 문제 된다"
    - "보조 신호: 비겁"
    - "보조 신호: 월간"
    - "보조 신호: 연간"
    - "보조 신호: 세운 지지"
    - "보조 신호: 합"
    - "보조 신호: 충"
