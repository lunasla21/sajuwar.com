reasoning:
  source_interpretation: |
    " 76. 경오년(庚午年) . 미혼 . 결혼이 늦어진다. 시 일 월 년(남) 壬 癸 甲 乙 子 丑 申 未 결실의 계절인 신월(申月)의 기운을 머금고 태어난 계수(癸水)다 사주를 가만히 들여다보니, 천간은 풍성한 나무들이 가득하나 땅에는 뿌리 내릴 곳을 찾지 못한 외로운 나무와 거대한 바위산의 이야기가 이어진다. 일간의 인연은 어디에 숨어 있는가? 배우자 기운은 자 멀리 연지의 뜨거운 미토(未土) 속에 촛불인 정화(丁,火)로 고이 간직되어 있지만, 이 사랑스러운 불꽃을 만나러 가는 길이 너무나 험난하다. 이는 HH우자 자리인 일지의 축토(丑土)와 저 멀리 있는 미토(未土)가 서로 충(沖)을 하며 팽팽하게 맞서고 있기 때문이다. 이 충돌 여파로 친구들이 하나둘 청첩장을 돌리며 떠나갈 때, 일간은 홀로 고독한 나 卜으 즈 ~기게 된다. 남들보다 결혼이 늦어지는 것은 운명이 가장 맞는 때를 골라주기 위해 잠시 멈춰 있는 것뿐이다. 여기서 지지는 봉미로운 내용이 있다. 그 속에는 늦지만 깊은 인연이 들어올 여지가 숨겨져 있다. 자녀를 뜻하는 관성인 미토(未土) 속에 여성인 정화(丁,火)가 들어 있으니, 어쩌면 과거의 사연을 품은 여인이거나 자녀가 있는 여인과 인연이 닿는 것이 주인공인 일간의 운명을 부드럽게 다스리는 비책 (秘策)이 될 수 있다. 평범한 인연을 만나 자식이 태어난다면, 축미충 (丑未沖)의 기운이 발동하여 배우자의 건강에 비구름이 낄 수 있으니 각별한 정성으로 보듬어야 한다. 또한, 배우자는 사회활동을 하여야 사이의 금슬이 비단결처럼 고와진다.  " 재물복의 풍경을 살피면, 하늘에는 갑목(甲木)과 을목(乙木)이라는 푸른 나무들이 울창하여 겉보기에는 무척 풍요로워 보인다. 하지만 슬프게도 땅 어디에도 이 나무들이 뿌리를 내릴 깊은 흙이 부족하다. 수확기의 옹달샘인 일간 계수(癸水)가 돈을 벌기 위해 부단히 애를 써도, 재물이 마치 안개처럼 모였다가 흩어지니 큰 재물을 쌓기가 쉽지 않다. 내 주머니는 바람이 머물다 가는 정거장과도 같다. 따라서 무모한 사업(事業)의 거친 파도에 몸을 던지기보다는, 매달 들어오는 월급으로 안정적인 성(城)을 쌓는 직장생활이 가장 좋은 선택이다. 물론 일간의 마음속에는 언제나 불꽃이 튄다. 관성인 미토 (未土)와 축토(丑土)가 끊임없이 충()沖)을 하며 인내심을 시험하기 때문이다. 상사의 잔소리를 들을 때마다 속으로는 내 당장 사표를 던지고 사장님이 되리라는 자영업(自營業)의 꿈을 수만 번도 꾼다. 그것은 그저 가슴 속에 품은 한 권의 시집(言寺集)으로 남겨두는 것이 좋다. 조직의 틀 안에서 일간의 맑은 계수(癸水) 기운을 발휘할 때, 삶은 평온한 강물처럼 흐르게 된다. 요약하면, 결혼에 대해서는 조금 늦더라도 조급해하지 말고, 일지 축토(丑土)를 부드럽게 녹이는 여인을 만날 때, 진정한 행복이 시작된다. 사업 유혹은 환상일 뿐이다. 안정적인 직장을 기반으로 내실을 다지는 것이 최고의 개운법(開運;去)이다. 축미충(丑未沖)으로 마음이 요동칠 때는 시원한 강가에서 명상을 즐겨라. 일간의 본질인 물줄기가 맑아질 때 인연도 재물도 자연스레 머물 것이다. 경오년(庚午年)의 정적은 더 큰 인연을 맞이하기 위한 숨 고르기일 뿐이다. 비록 손에 잡히는 재물은 적고 옆자리는 허전 할지라도, 옹달샘은 언제나 마르지 않는 생명력을 품고 있다. 고요한 시간 속에서 내면을 다질수록 더 깊은 인연이 찾아오게 된다.
consultation:
  practical_guidance: |
    따라서 무모한 사업(事業)의 거친 파도에 몸을 던지기보다는, 매달 들어오는 월급으로 안정적인 성(城)을 쌓는 직장생활이 가장 좋은 선택이다. 그것은 그저 가슴 속에 품은 한 권의 시집(言寺集)으로 남겨두는 것이 좋다.
golden_answer:
  answer: |
    경오년(庚午年): 미혼, 결혼이 늦어진다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 따라서 무모한 사업(事業)의 거친 파도에 몸을 던지기보다는, 매달 들어오는 월급으로 안정적인 성(城)을 쌓는 직장생활이 가장 좋은 선택이다. 그것은 그저 가슴 속에 품은 한 권의 시집(言寺集)으로 남겨두는 것이 좋다.
brain:
  decision_rule: |
    IF 경오년에 축미충이 배우자궁과 관계 지속성을 직접 건드리고, 관성이 같은 방향으로 압력을 보태면 THEN 결론은 '미혼, 결혼이 늦어진다' 쪽으로 세운다.
    BECAUSE 현명역학원식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 배우자궁과 관계 지속성 문제로 보이더라도 THEN 일지 안정성, 관성의 상태, 식상으로 인한 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 감정의 재결합보다 반복될 생활 압박이 더 크다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 축미충이 실제 사건의 문을 여는지 본다."
    - "2순위: 관성이 축미충을 강화하는지, 완화하는지 본다."
    - "3순위: 일지 안정성, 관성의 상태, 식상으로 인한 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 축미충과 관성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 배우자궁과 관계 지속성에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '미혼, 결혼이 늦어진다' 사례지만 숨은 판단 구조는 축미충 하나가 아니라 축미충과 관성의 결합이다.
    IF 이 결합이 배우자궁과 관계 지속성의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE 현명역학원 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 끌림은 강하지만 일지나 관성이 흔들리면 THEN 관계 결론을 서두르지 말고 반복될 갈등 패턴을 먼저 보게 한다.
    THEN 상대를 바꾸려 하기보다 거리, 책임, 생활 리듬의 조정 가능성을 확인하게 한다.
    BECAUSE 축미충은 감정보다 관계를 담는 구조가 약해질 때 사건으로 나타나기 때문이다.
  forbidden_advice:
    - "헤어져라, 합쳐라, 결혼하라처럼 관계 결정을 대신 내려주지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 壬 癸 甲 乙 / 지지: 子 丑 申 未"
