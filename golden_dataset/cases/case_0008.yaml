    - "판단 영역: 사업장, 계약, 운영 지속성"
    - "우선 판단축: 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합"
    - "결론 방식: 돈이 생기는 통로와 자리의 안정성이 동시에 열린다"
    - "보조 신호: 재성"
    - "보조 신호: 식상"
    - "보조 신호: 월간"
    - "보조 신호: 연간"
    - "보조 신호: 세운 지지"
    - "보조 신호: 충"
