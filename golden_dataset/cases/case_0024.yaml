    - "합: 관성이 비겁과 합(合)을 하여 제 기능을 제대로 하지 못하는 것은 사업가로서의 신용이 하락하거나 일이 뜻대로 풀리지 않아 진퇴양난 (進退兩難)에 빠지는 결과를 초래한다."
    - "충"
    - "형: 세운 지지의 식상인 오화(午,火)는 시(時)의 오화(午,火)와 오오자형 (午午自刑)을 한다."
    - "극: 천간의 흐름을 보면, 비겁 갑목(甲木)이 연간의 재성인 무토 (戊土)를 강하게 목극토(木剋土)를 한다."
    - "생"
    - "甲午"
    - "甲寅: 퇴사와 창업 욕구 시 일 월 년(여) 庚 甲 庚 戊 午 寅 申 申 신월(申月) 초가을의 서늘한 기운 속에 갑인(甲寅) 일주로 태어난 이 사주는 천간과 지지에 경신금(庚申金) 관성의 세력이 매우 완강 하게 자리 잡고 있다."
