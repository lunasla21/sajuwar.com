reasoning:
  source_interpretation: |
    )(제2장 생활 명리 세운 분석" 51. 정유년(丁酉年) • 학원 운영의 어려움 시 일 월 년(남) 癸 丁 甲 庚 卯 丑 申 申 결실의 계절인 신월(申月)에 차가운 대지(丑土)에서 세상을 밝혀주는 정화(丁火)로 태어났다. 학원이라는 배움의 터전을 일구며 살아가는 그대에게 찾아온 정유년(丁酉年)의 풍경을 그리면, 하늘에서는 일간과 똑같은 불꽃인 정화(丁火)를 만난다. 이 불꽃은 반가운 손님인 듯 하나, 연간에 자리 잡은 재물이자 수입원인 경금(庚金)을 사정없이 녹이려 든다. 그 결과 재정적인 부담이 점점 커지는 흐름으로 이어진다. 수입의 통로가 뜨거워지니 재물의 흐름이 불안정해지는 신호탄이다. 학원 안에는 활기 대신 적막함이 감돈다. 학생들은 줄어들고 선생의 마음에는 비가 내리는 형국이다. 또한 세운 지지는 유금(酉金) 재물이 들어와, 계약과 문서를 뜻하는 시(時)의 묘목(卯木) 인성을 사정없이 들이받는다. 금(金)과 목(木)이 서로 부딪히니 학원 문을 닫고 새로운 길로 전환하려는 결심이 굳어지는 흐름이며, 계약을 의뢰한다. 하지만 임자는 나타나지 않고 돈만 물 흐르듯 빠져나가니 그야말로 마음고생의 끝판왕이라 할 만한 운세이다. 지루한 기다림의 터널을 지나 무술년(戊戌年)에 이르면 상황은 급반전된다. 태양 아래 드넓은 대지인 무토(戊土) 식상이 관성 계수(癸水)와 무계합(戊癸合)을 한다. 운명의 시계가 무오월(戊午月)을 가리킬 때, 학원이라는 무거운 짐을 내려놓을 기회가 찾아온 것이다. 계약은 하지만 口卜음속으로 품었던 희망가보다 낮은 금액을 받고 사인을 하게 된다.
consultation:
  practical_guidance: |
    운명의 시계가 무오월(戊午月)을 가리킬 때, 학원이라는 무거운 짐을 내려놓을 기회가 찾아온 것이다. 계약은 하지만 口卜음속으로 품었던 희망가보다 낮은 금액을 받고 사인을 하게 된다.
golden_answer:
  answer: |
    정유년(丁酉年): 학원 운영의 어려움 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 운명의 시계가 무오월(戊午月)을 가리킬 때, 학원이라는 무거운 짐을 내려놓을 기회가 찾아온 것이다. 계약은 하지만 口卜음속으로 품었던 희망가보다 낮은 금액을 받고 사인을 하게 된다.
brain:
  decision_rule: |
    IF 정유년에 관성이 사업장, 계약, 운영 지속성을 직접 건드리고, 식상이 같은 방향으로 압력을 보태면 THEN 결론은 '학원 운영의 어려움' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 사업장, 계약, 운영 지속성 문제로 보이더라도 THEN 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 매출 욕심보다 자리, 계약, 비용 누수가 먼저 문제 된다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 관성이 실제 사건의 문을 여는지 본다."
    - "2순위: 식상이 관성을 강화하는지, 완화하는지 본다."
    - "3순위: 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 관성과 식상을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 사업장, 계약, 운영 지속성에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '학원 운영의 어려움' 사례지만 숨은 판단 구조는 관성 하나가 아니라 관성과 식상의 결합이다.
    IF 이 결합이 사업장, 계약, 운영 지속성의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 재성은 보이나 자리나 계약궁이 흔들리면 THEN 확장보다 고정비, 계약 조건, 회수 가능 금액을 먼저 줄이게 한다.
    THEN 새 투자보다 손실 한도, 철수 기준, 계약 문구를 먼저 정하게 한다.
    BECAUSE 관성이 사업 사건으로 드러날 때는 돈을 버는 힘보다 돈이 새는 통로가 더 먼저 현실화되기 때문이다.
  forbidden_advice:
    - "대박, 무조건 확장, 반드시 계약 성사처럼 욕망을 키우는 표현을 하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 癸 丁 甲 庚 / 지지: 卯 丑 申 申"
