golden_answer:
  answer: |
    갑오년(甲午年): 가게 처분 계약이 성사되는 달 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 따라서 조건을 신중하게 조율해야 안정적인 마무리가 가능하다. -104  매출의 부진이나 고정비 부담으로 인해 돈 때문에 고생하는 흐름이 이어지며, 결국 더는 버티기 힘들다는 결론에 이르러 현재 운영하던 가게를 완전히 정리하고 그만두게 되는 운으로 귀결된다. 받지 못하고 상당 부분 양보해야 하는 불리한 조건에 직면함을 뜻한다. 결국 일부 양보를 통해서라도 전체 흐름을 정리하는 것이 가장 현실적인 선택이 된다. 결론적으로, 갑오년(甲午年)은 가게를 유지하는 것보다는 정리하는 쪽으로 강력한 압박을 가하고 있다.
brain:
  decision_rule: |
    IF 갑오년에 자오충이 사업장, 계약, 운영 지속성을 직접 건드리고, 사유합이 같은 방향으로 압력을 보태면 THEN 결론은 '가게 처분 계약이 성사되는 달' 쪽으로 세운다.
    BECAUSE 현명역학원식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 사업장, 계약, 운영 지속성 문제로 보이더라도 THEN 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 돈이 생기는 통로와 자리의 안정성이 동시에 열린다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 자오충이 실제 사건의 문을 여는지 본다."
    - "2순위: 사유합이 자오충을 강화하는지, 완화하는지 본다."
    - "3순위: 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 자오충과 사유합을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 사업장, 계약, 운영 지속성에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '가게 처분 계약이 성사되는 달' 사례지만 숨은 판단 구조는 자오충 하나가 아니라 자오충과 사유합의 결합이다.
    IF 이 결합이 사업장, 계약, 운영 지속성의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE 현명역학원 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 재성은 보이나 자리나 계약궁이 흔들리면 THEN 확장보다 고정비, 계약 조건, 회수 가능 금액을 먼저 줄이게 한다.
    THEN 새 투자보다 손실 한도, 철수 기준, 계약 문구를 먼저 정하게 한다.
    BECAUSE 자오충이 사업 사건으로 드러날 때는 돈을 버는 힘보다 돈이 새는 통로가 더 먼저 현실화되기 때문이다.
  forbidden_advice:
    - "대박, 무조건 확장, 반드시 계약 성사처럼 욕망을 키우는 표현을 하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
