golden_answer:
  answer: |
    정유년(丁酉年): 세금 문제로 고민이 많다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 및t시2^ 핵심 세운 분석(제1권) 개정증보판 2026. 저즈『권자의 사전 서면 동의 없이 본 도서의 전부 또는 일부를 복제, 전송, 배포, 전재, 편집 또는 상업 적으로 이용하는 행위를 금합니 다. CataIoging in Publication (CIP) 이 도서 의 국립 중앙 도서관 출판예정도서목록(CIP) 정보는 서지정보유통지원시스템(http://seoji.nl.go.kr) 및 국가자료공동목록시스템(http://www.nl.go.kr/kolisnet)에서 확인 하실 수 있습 니 다. SAJUWAR
brain:
  decision_rule: |
    IF 정유년에 묘유충이 돈의 유입과 보존을 직접 건드리고, 사해충이 같은 방향으로 압력을 보태면 THEN 결론은 '세금 문제로 고민이 많다' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 돈의 유입과 보존 문제로 보이더라도 THEN 재성 보호, 비겁의 분탈, 문서 조건을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 돈의 유입과 보존을 바로 단정하지 말고 조건을 분리해 판단한다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 묘유충이 실제 사건의 문을 여는지 본다."
    - "2순위: 사해충이 묘유충을 강화하는지, 완화하는지 본다."
    - "3순위: 재성 보호, 비겁의 분탈, 문서 조건 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 묘유충과 사해충을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 돈의 유입과 보존에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '세금 문제로 고민이 많다' 사례지만 숨은 판단 구조는 묘유충 하나가 아니라 묘유충과 사해충의 결합이다.
    IF 이 결합이 돈의 유입과 보존의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 재성이 충이나 비겁에 노출되면 THEN 받을 돈을 크게 기대하지 말고 지킬 금액과 포기할 금액을 나누게 한다.
    THEN 말 약속보다 계약서, 세금, 분배 조건을 우선 확인하게 한다.
    BECAUSE 묘유충이 재물 문제에 작동하면 총액보다 보존 구조가 핵심이다.
  forbidden_advice:
    - "투자 수익, 처분 금액, 세금 결과를 보장하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
