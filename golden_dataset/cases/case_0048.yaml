  answer: |
    정유년(丁酉年): 가게 처분 금액은 제값을 받지 못한다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 매수자와 기(氣) 싸움에서 하니 공신력이나 협상 주도권이 밀리게 되어, 결국 상대방이 제시하는 낮은 가격에 도장을 찍게 되는 흐름이다. 유금(酉金)이라는 재물이 들어오자마자 열기에 녹아버리는 형국이다. 이는 받기로 한 금액은 어느 정도 형성되었으나, 실제 손에 쥐어지는 금액은 예상보다 훨씬 적었음을 의미한다.
