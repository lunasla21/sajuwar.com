golden_answer:
  answer: |
    계사년(癸巳年): 승진이 되지 않는다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 승진이 아니라고 실망할 필요는 없다. 기토(己土)는 어떠한 씨앗을 심어도 결국 길러내는 힘이 있으니, 바뀐 부서에서 뿌린 씨앗이 훗날 거대한 황금 들판이 될 자양분이 될 터다. 비록 아내의 사회활동을 반대하더라도, 그 마음을 고지식한 고집이 아닌 따뜻한 보호로 느끼게 전달하는 기술이 필요하다.
brain:
