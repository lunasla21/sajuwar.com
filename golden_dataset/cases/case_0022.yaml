reasoning:
  source_interpretation: |
    )(제2장 생활 명리 세운 분석)4 22. 계사년(癸巳年) • 퇴사 고민과 진로 시 일 월 년(남) 戊 甲 乙 丙 辰 午 未 午 미월(未月) 한여름 대지 위에서 갑오(甲午) 일주로 태어났다. 계사년 (癸巳年) 을축월(乙丑月)의 인사발령은 주인공의 마음에 큰 파란을 일으키는 계기가 된다. 천간의 인성인 계수(癸水)는 식상인 병화(丙,火)를 제어한다. 이는 기존에 하던 업무나 환경에 제동이 걸림을 의미한다. 동시에 이 계수(癸水)는 회사에서 받는 봉급과 보상을 뜻하는 시간의 재성인 무토(戊土)와 무계합(戊癸合)을 이룬다. 재성(돈)과 인성(문서/권리)이 합(合)을 한다는 것은 직장인에게는 인사이동(人事移動)이나 보직 변경의 신호다. 내가 원지 않는 부서로 발령이 나거나 업무 환경이 바뀌면서, 이 부서에서 억지로 버텨야 할지 아니면 사표를 던지고 나가야 할지에 대한 깊은 고민에 직면하게 된 것이다. 직장을 그만두고 갑오년(甲午年)에 새로운 구직 전선에 뛰어든다면, 상황은 더욱 힘들어질 소지가 크다. 갑오년(甲午年)에 세운 천간의 비겁 갑목(甲木)이 시간의 재성 무토 (戊土)를 강하게 억제한다. 이는 내 수입원이 끊기거나 경제적인 탈재 (奪財)가 일어남을 뜻하므로, 퇴사 후 공백기가 길어지며 제대로 된 직장을 구하기가 매우 힘들어질 것을 암시한다. 또한 세운 지지의 오화(午火)는 연지와 일지에 있는 오화(午,火)와 오오자형(午午自刑)을 형성한다. 화(,火) 기운이 증폭되어 자신을 볶는 형국이 되니, 설령 취업이 되어도 적응하지 못해 극심한 스트레스를 받게 된다.  )(제2장 생활 명리 세운 분석)4 갑오년(甲午年)의 방황은 을미년(乙未年)까지 고스란히 이어진다. 불안정한 상태에서 들어간 직장의 환경은 일간을 지켜주지 못하며, 을목(乙木)의 영향으로 또다시 충동적인 퇴사를 반복할 위험이 크다. 결국 계사년(癸巳年) 을축월(乙丑月)에 퇴사하게 되면 제대로 자리를 잡지 못한 채, 경력은 꼬이고 정신적인 마음고생과 경제적 궁핍함만 가중되는 악순환에 빠지기 쉬우며, 자신감마저 흔들린다. 따라서 발령받은 부서가 마음에 들지 않고 업무가 낯설어 당장은 직장을 그만두고 싶은 마음이 굴뚝같을 것이다. 그러나 다가오는 갑오년(甲午年)과 을미년(乙未年)의 운세를 고려할 때, 지금 사표를 내는 것은 스스로 가시밭길을 자초하는 격이다. 현재 회사에서 겪는 인사이동의 불편함은 다가올 구직난과 이직 실패의 고통에 비하면 가벼운 수준이며, 훗날 더 큰 손실을 막는 현명한 판단이 된다. 자존심이 상하더라도 당분간은 마음을 내려놓고 현재의 회사에서 계속 근무하며 자리를 지키는 것이 가장 현명한 선택이다. 소나기는 잠시 피해 가듯, 직장 내부에서 내실(內實)을 다지며 운세의 흐름이 부드러워질 때를 기다리는 지혜가 절실히 필요한 시점이다. 따라서 이 시기에는 외부로 나가기보다 내부에서 실력을 축적하는 것이 훨씬 유리하다. 낯선 업무도 결국 경험이 쌓이면 새로운 무기가 된다. 지금의 불편함은 미래의 선택지를 넓혀주는 과정이라 볼 수 있다. 조급한 결정은 돌이킬 수 없는 손실로 이어질 수 있으니, 한 박자 여유가 필요하며, 감정에 치우친 판단보다 현실적인 계산이 중요한 시기다. 버티는 힘이 곧 경쟁력이 되는 구간이니 쉽게 포기 하지 않는 것이 핵심이다. 결국 지금의 인내는 훗날 더욱더 안정된 자리로 이어지는 디딤돌이 될 것이다. - 66
consultation:
  practical_guidance: |
    낯선 업무도 결국 경험이 쌓이면 새로운 무기가 된다. 지금의 불편함은 미래의 선택지를 넓혀주는 과정이라 볼 수 있다. 조급한 결정은 돌이킬 수 없는 손실로 이어질 수 있으니, 한 박자 여유가 필요하며, 감정에 치우친 판단보다 현실적인 계산이 중요한 시기다. 버티는 힘이 곧 경쟁력이 되는 구간이니 쉽게 포기 하지 않는 것이 핵심이다. 결국 지금의 인내는 훗날 더욱더 안정된 자리로 이어지는 디딤돌이 될 것이다.
golden_answer:
  answer: |
    계사년(癸巳年): 퇴사 고민과 진로 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 낯선 업무도 결국 경험이 쌓이면 새로운 무기가 된다. 지금의 불편함은 미래의 선택지를 넓혀주는 과정이라 볼 수 있다. 조급한 결정은 돌이킬 수 없는 손실로 이어질 수 있으니, 한 박자 여유가 필요하며, 감정에 치우친 판단보다 현실적인 계산이 중요한 시기다. 버티는 힘이 곧 경쟁력이 되는 구간이니 쉽게 포기 하지 않는 것이 핵심이다. 결국 지금의 인내는 훗날 더욱더 안정된 자리로 이어지는 디딤돌이 될 것이다.
brain:
  decision_rule: |
    IF 계사년에 오오자형이 직장 자리와 조직 적응을 직접 건드리고, 재성이 같은 방향으로 압력을 보태면 THEN 결론은 '퇴사 고민과 진로' 쪽으로 세운다.
    BECAUSE 현명역학원식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 직장 자리와 조직 적응 문제로 보이더라도 THEN 관성의 안정성, 식상의 반발, 부서/상사의 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 직장 자리와 조직 적응을 바로 단정하지 말고 조건을 분리해 판단한다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 오오자형이 실제 사건의 문을 여는지 본다."
    - "2순위: 재성이 오오자형을 강화하는지, 완화하는지 본다."
    - "3순위: 관성의 안정성, 식상의 반발, 부서/상사의 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 오오자형과 재성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 직장 자리와 조직 적응에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '퇴사 고민과 진로' 사례지만 숨은 판단 구조는 오오자형 하나가 아니라 오오자형과 재성의 결합이다.
    IF 이 결합이 직장 자리와 조직 적응의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE 현명역학원 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 이동 욕구가 강해도 다음 운에서 적응 구조가 약하면 THEN 즉시 결정보다 부서, 사람, 업무량을 분리해 검토하게 한다.
    THEN 퇴사/이직은 감정의 출구가 아니라 다음 자리의 관성 안정성이 확인될 때 실행하게 한다.
    BECAUSE 오오자형은 자리 변화 자체보다 변화 후 버틸 구조를 먼저 묻는 신호다.
  forbidden_advice:
    - "무조건 퇴사하라, 무조건 버텨라, 반드시 승진한다처럼 조직 선택을 단정하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 戊 甲 乙 丙 / 지지: 辰 午 未 午"
