golden_answer:
  answer: |
    정유년(丁酉年): 부부 사이를 좋게 하는 방법 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 부부 사이를 좋게 하는 방법 시 일 월 년(여) 丁 甲 庚 辛 卯 申 寅 亥 일지 신금(申金)이 배우자 자리인데, 정유년(丁酉年)에 유금(酉金)이 더해지면서 금(金)의 기운이 과도하게 강조된다. 곧 기운의 름을 바꾸는 중요한 계기가 된다. 시간이 지나 돌아다보면, 그때의 선택과 변화가 오히려 가장 잘한 결정이었다는 것을 알게 된다. 결국 삶은 격정적인 소설처럼, 때로는 잔잔한 낭만처럼 흘러간다.
brain:
  decision_rule: |
    IF 정유년에 관성이 배우자궁과 관계 지속성을 직접 건드리고, 일지가 같은 방향으로 압력을 보태면 THEN 결론은 '부부 사이를 좋게 하는 방법' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 배우자궁과 관계 지속성 문제로 보이더라도 THEN 일지 안정성, 관성의 상태, 식상으로 인한 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 배우자궁과 관계 지속성을 바로 단정하지 말고 조건을 분리해 판단한다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 관성이 실제 사건의 문을 여는지 본다."
    - "2순위: 일지가 관성을 강화하는지, 완화하는지 본다."
    - "3순위: 일지 안정성, 관성의 상태, 식상으로 인한 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 관성과 일지를 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 배우자궁과 관계 지속성에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '부부 사이를 좋게 하는 방법' 사례지만 숨은 판단 구조는 관성 하나가 아니라 관성과 일지의 결합이다.
    IF 이 결합이 배우자궁과 관계 지속성의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 끌림은 강하지만 일지나 관성이 흔들리면 THEN 관계 결론을 서두르지 말고 반복될 갈등 패턴을 먼저 보게 한다.
    THEN 상대를 바꾸려 하기보다 거리, 책임, 생활 리듬의 조정 가능성을 확인하게 한다.
    BECAUSE 관성은 감정보다 관계를 담는 구조가 약해질 때 사건으로 나타나기 때문이다.
  forbidden_advice:
    - "헤어져라, 합쳐라, 결혼하라처럼 관계 결정을 대신 내려주지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 丁 甲 庚 辛 / 지지: 卯 申 寅 亥"
    - "세운: 정유년 丁酉年"
    - "핵심 신호 1: 관성"
    - "핵심 신호 2: 일지"
    - "판단 영역: 배우자궁과 관계 지속성"
    - "우선 판단축: 일지 안정성, 관성의 상태, 식상으로 인한 압박"
    - "결론 방식: 배우자궁과 관계 지속성을 바로 단정하지 말고 조건을 분리해 판단한다"
    - "보조 신호: 세운 지지"
    - "보조 신호: 충"
    - "보조 신호: 형"
    - "보조 신호: 생"
    - "보조 신호: 丁酉"
