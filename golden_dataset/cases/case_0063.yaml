golden_answer:
  answer: |
    계사년(癸巳年): 휴학 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 천간의 식상인 계수(癸水)는 생각과 표현, 진로 선택을 의미하는데, 이 기운이 월간의 관성인 정화(丁火)를 정면으로 통제한다. 결국 이 시기는 휴학을 선택 하고, 동료들과 합숙하며 훈련에 집중하는 모습으로 나타난다. 이 과정에서 동료들과의 경생에서 밀리는 허 시 으 체감하게 되고, 결국 더 이상 버티기 어렵다는 판단에 이르게 되며, 다시 출발점을 찾게 되는 전환의 시기로 이어진다. 연습생 생활을 내려놓고 다시 학업으로 돌아가는 복학의 길을 선택 하게 된다.
brain:
  decision_rule: |
    IF 계사년에 관성이 학업 지속력과 시험/진로 선택을 직접 건드리고, 식상이 같은 방향으로 압력을 보태면 THEN 결론은 '휴학' 쪽으로 세운다.
    BECAUSE 현명역학원식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 학업 지속력과 시험/진로 선택 문제로 보이더라도 THEN 인성의 보호, 식상의 산만함, 관성의 규칙성을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 능력 부족보다 리듬 붕괴와 방향 혼선이 먼저 문제 된다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 관성이 실제 사건의 문을 여는지 본다."
    - "2순위: 식상이 관성을 강화하는지, 완화하는지 본다."
    - "3순위: 인성의 보호, 식상의 산만함, 관성의 규칙성 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 관성과 식상을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 학업 지속력과 시험/진로 선택에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '휴학' 사례지만 숨은 판단 구조는 관성 하나가 아니라 관성과 식상의 결합이다.
    IF 이 결합이 학업 지속력과 시험/진로 선택의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE 현명역학원 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 인성의 보호보다 식상/충의 산만함이 강하면 THEN 목표를 키우기보다 공부 장소, 시간표, 시험 전략을 좁히게 한다.
    THEN 진로 결정은 감정 상태가 아니라 유지 가능한 루틴을 기준으로 판단하게 한다.
    BECAUSE 관성이 학업에 작동하면 재능보다 지속 리듬이 성패를 가른다.
  forbidden_advice:
    - "합격/불합격을 단정하거나 학생의 가능성을 꺾는 표현을 하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
