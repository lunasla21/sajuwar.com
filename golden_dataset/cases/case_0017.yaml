reasoning:
  source_interpretation: |
    승진이 되지 않는다. 17. 갑오년(甲午年) 시 일 월 년(남) 壬 甲 甲 丙 申 辰 午 辰 만물이 뜨겁게 달궈지는 여름날, 비옥한 땅(辰土)에 뿌리를 내리고 하늘을 향해 시원하게 뻗어 올라간 갑목(甲木)이다. 갑오년(甲午年), 먼지 천간의 기운을 살피면, 운세의 천간에서 일간과 똑같은 기상을 가진 비겁 갑목(甲木)이 등장한다. 이 갑목(甲木)은 동료처럼 보이지만, 실상은 월간에 있던 또 다른 갑목(甲木)을 건드려 깨우더니 연간의 병화(丙,火) 식상을 가로채려 든다. 일간이 정성껏 키위온 업무의 결실을 옆자리의 동료가 가지고 가는 형국이니, 현재 담당하고 있는 일에 커다란 변화가 생기거나 부서 내에서 역할이 바뀌는 업무 변동이 필연적으로 발생한다. 지지에서의 사정은 더욱 뜨겁고 치열하다. 운세의 지지에서 들어온 정열의 불꽃 오화(午,火)가 월(月)의 오화(午火)와 오오자형(午午自刑)의 불협화음 일으킨다. 불길이 너무 거세지면 땅이 마르는 법이다. 이 뜨거운 열기는 다시 연지와 일지에 자리 잡은 일간의 재산이자 결실인 진토(辰土)들을 자극하여 진진자형(辰辰自刑)의 소용돌이를 만들어낸다. 흙더미가 서로 부딪히며 먼지를 일으키니, 겉으론 업무가 바뀌고 인사이동의 바람이 불어와 무언가 거창한 일이 벌어지는 보이지만, 정작 그대의 계급장이 올라가는 승진(昇進)의 문턱에서는 발걸음이 무겁다. 재성이 형(刑)에 갇혀 제 역할을 못 하니, 화려한 조명은 비치되 실속 있는 면류관은 다음 기회로 미뤄지는 형국이다. - 53 _
consultation:
  practical_guidance: |
    이 뜨거운 열기는 다시 연지와 일지에 자리 잡은 일간의 재산이자 결실인 진토(辰土)들을 자극하여 진진자형(辰辰自刑)의 소용돌이를 만들어낸다. 흙더미가 서로 부딪히며 먼지를 일으키니, 겉으론 업무가 바뀌고 인사이동의 바람이 불어와 무언가 거창한 일이 벌어지는 보이지만, 정작 그대의 계급장이 올라가는 승진(昇進)의 문턱에서는 발걸음이 무겁다. 재성이 형(刑)에 갇혀 제 역할을 못 하니, 화려한 조명은 비치되 실속 있는 면류관은 다음 기회로 미뤄지는 형국이다.
golden_answer:
  answer: |
    갑오년(甲午年): 승진이 되지 않는다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 이 뜨거운 열기는 다시 연지와 일지에 자리 잡은 일간의 재산이자 결실인 진토(辰土)들을 자극하여 진진자형(辰辰自刑)의 소용돌이를 만들어낸다. 흙더미가 서로 부딪히며 먼지를 일으키니, 겉으론 업무가 바뀌고 인사이동의 바람이 불어와 무언가 거창한 일이 벌어지는 보이지만, 정작 그대의 계급장이 올라가는 승진(昇進)의 문턱에서는 발걸음이 무겁다. 재성이 형(刑)에 갇혀 제 역할을 못 하니, 화려한 조명은 비치되 실속 있는 면류관은 다음 기회로 미뤄지는 형국이다.
brain:
  decision_rule: |
    IF 갑오년에 오오자형이 직장 자리와 조직 적응을 직접 건드리고, 재성이 같은 방향으로 압력을 보태면 THEN 결론은 '승진이 되지 않는다' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 직장 자리와 조직 적응 문제로 보이더라도 THEN 관성의 안정성, 식상의 반발, 부서/상사의 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 오오자형이 실제 사건의 문을 여는지 본다."
    - "2순위: 재성이 오오자형을 강화하는지, 완화하는지 본다."
    - "3순위: 관성의 안정성, 식상의 반발, 부서/상사의 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 오오자형과 재성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 직장 자리와 조직 적응에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '승진이 되지 않는다' 사례지만 숨은 판단 구조는 오오자형 하나가 아니라 오오자형과 재성의 결합이다.
    IF 이 결합이 직장 자리와 조직 적응의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 관성이 손상되어 승진 명분이 약하면 THEN 승진 요구보다 현재 역할의 안정성과 평가 자료를 먼저 쌓게 한다.
    IF 식상이 강해 조직과 부딪치면 THEN 말로 설득하기보다 결과물, 보고 체계, 상사 요구사항을 문서화하게 한다.
    BECAUSE 오오자형 신호가 강할수록 능력보다 조직 수용성이 먼저 평가되기 때문이다.
  forbidden_advice:
    - "무조건 퇴사하라, 무조건 버텨라, 반드시 승진한다처럼 조직 선택을 단정하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 壬 甲 甲 丙 / 지지: 申 辰 午 辰"
    - "세운: 갑오년 甲午年"
    - "핵심 신호 1: 오오자형"
    - "핵심 신호 2: 재성"
    - "판단 영역: 직장 자리와 조직 적응"
    - "우선 판단축: 관성의 안정성, 식상의 반발, 부서/상사의 압박"
    - "결론 방식: 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다"
    - "보조 신호: 식상"
    - "보조 신호: 비겁"
    - "보조 신호: 일지"
    - "보조 신호: 월간"
