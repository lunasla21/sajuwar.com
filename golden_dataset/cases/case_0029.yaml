    계사년(癸巳年): 사업체 폐업과 새로운 진로의 모색 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 따라서 가게를 계속 유지해야 할지, 아니면 지금이 라도 그만두어야 할지에 대한 깊은 번민과 갈등이 시작된다. 다른 곳으로 사업장을 이전하거나, 아예 사업을 접고 안정적인 직장에 취업하는 것이 좋다.
