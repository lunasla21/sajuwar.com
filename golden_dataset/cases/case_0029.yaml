reasoning:
  source_interpretation: |
    ,(제2장 생활 명리 세운 분석" 사업체 폐업과 새로운 진로의 모색 29. 계사년(癸巳年) 시 일 월 년(남) 丁 乙 丙 甲 亥 巳 寅 寅 이 사주는 천간에 병정화(丙丁火) 식상을 갖추고 있어 재능을 펼쳐 사업을 운영하는 데 최적화된 사주다. 그러나 계사년(癸巳年)은 시련의 소용돌이에 휘말리게 된다. 천간의 계수(癸水)는 병정화(丙丁,火)를 강하게 압박한다. 이는 활동 수단이자 밥그릇이 일시적으로 엎어지는 현상을 의미한다. 따라서 가게를 계속 유지해야 할지, 아니면 지금이 라도 그만두어야 할지에 대한 깊은 번민과 갈등이 시작된다. 또한 세운 지지의 사화(巳,火)는 해수(亥水) 인성과 충()沖)을 하여, 사화(巳,火) 속의 재물인 무토(戊土)는 극(剋)을 당한다. 매출은 급감 하고 자금 회전은 완전히 막히며, 쌓여가는 빚과 신용도 하락으로 인해 극심한 고생을 겪게 된다. 현재 위치에서 가게를 억지로 붙들고 있기 보다 다른 곳으로 사업장을 이전하거나, 아예 사업을 접고 안정적인 직장에 취업하는 것이 좋다. 사주 해석상 현재 운영하는 가게와는 이미 인연이 완전히 끝났다고 판단하는 것이 옳다. 억지로 버티는 것은 오히려 더 큰 손실을 불러올 뿐이다. 그렇다면 무거운 짐을 내려놓을 수 있는 실질적인 처분 계약은 언제 이루어 지는가. 그 시기는 계사년(癸巳年) 후반기인 임신월(壬申月)이 된다. 월운(月運)의 천간으로 들어오는 인성인 임수(壬水)는 시간의 식상인 정화(丁,火)와 합(合)을 한다. 이는 마침내 나 가게를 가자갈 매수자가 나타나 서류상으로 깔끔하게 도장을 찍게 됨을 의미한다.
consultation:
  practical_guidance: |
    따라서 가게를 계속 유지해야 할지, 아니면 지금이 라도 그만두어야 할지에 대한 깊은 번민과 갈등이 시작된다. 다른 곳으로 사업장을 이전하거나, 아예 사업을 접고 안정적인 직장에 취업하는 것이 좋다.
golden_answer:
  answer: |
    계사년(癸巳年): 사업체 폐업과 새로운 진로의 모색 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 따라서 가게를 계속 유지해야 할지, 아니면 지금이 라도 그만두어야 할지에 대한 깊은 번민과 갈등이 시작된다. 다른 곳으로 사업장을 이전하거나, 아예 사업을 접고 안정적인 직장에 취업하는 것이 좋다.
brain:
  decision_rule: |
    IF 계사년에 식상이 직장 자리와 조직 적응을 직접 건드리고, 인성이 같은 방향으로 압력을 보태면 THEN 결론은 '사업체 폐업과 새로운 진로의 모색' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 직장 자리와 조직 적응 문제로 보이더라도 THEN 관성의 안정성, 식상의 반발, 부서/상사의 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 직장 자리와 조직 적응을 바로 단정하지 말고 조건을 분리해 판단한다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 식상이 실제 사건의 문을 여는지 본다."
    - "2순위: 인성이 식상을 강화하는지, 완화하는지 본다."
    - "3순위: 관성의 안정성, 식상의 반발, 부서/상사의 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 식상과 인성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 직장 자리와 조직 적응에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '사업체 폐업과 새로운 진로의 모색' 사례지만 숨은 판단 구조는 식상 하나가 아니라 식상과 인성의 결합이다.
    IF 이 결합이 직장 자리와 조직 적응의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 세운 자극이 강해도 현실 조건이 받쳐주지 않으면 THEN 바로 움직이지 말고 사건이 어느 궁위에서 나타나는지 확인하게 한다.
    THEN 선택지는 실행, 보류, 축소, 정리로 나누어 말한다.
    BECAUSE 식상은 길흉보다 사용 순서를 정하라는 신호다.
  forbidden_advice:
    - "무조건 퇴사하라, 무조건 버텨라, 반드시 승진한다처럼 조직 선택을 단정하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 丁 乙 丙 甲 / 지지: 亥 巳 寅 寅"
    - "세운: 계사년 癸巳年"
    - "핵심 신호 1: 식상"
    - "핵심 신호 2: 인성"
    - "판단 영역: 직장 자리와 조직 적응"
    - "우선 판단축: 관성의 안정성, 식상의 반발, 부서/상사의 압박"
    - "결론 방식: 직장 자리와 조직 적응을 바로 단정하지 말고 조건을 분리해 판단한다"
    - "보조 신호: 세운 지지"
    - "보조 신호: 합"
    - "보조 신호: 충"
    - "보조 신호: 극"
    - "보조 신호: 생"
