golden_answer:
  answer: |
    병신년(丙申年): 이직 고민 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 따라서 회사를 때려치우고 멋지게 이직하려는 것이 꿈이다. 결론적으로 병신년(丙申年)에 사표는 잠시 서랍 깊숙이 넣어두어야 한다.
brain:
  decision_rule: |
    이 사례의 결론은 '이직 고민'이다.
    직장 판단은 세운이 관성, 식상, 일지와 어떻게 부딪히는지를 먼저 본다. 관성이 식상에 손상되거나 충을 받으면 직장 자리, 승진, 부서 안정성이 흔들린다는 결론을 낸다.
    이 사례의 판단 근거는 관성, 식상, 인성, 일지, 월간, 세운 천간, 세운 지지, 합, 극, 생, 丙申의 작용이다.
    원문 판단 근거: 이 병화 (丙,火)는 직장을 상징하는 시간의 관성 경금(庚金)을 사정없이 극(剋)을 한다.
    원문 판단 근거: 병신년(丙申年)에 먼저 하늘의 기운 살펴보면, 세운 천간에 식상인 병화(丙,火) 태양이 솟아오른다.
    원문 판단 근거: 그리고 세운 지지는 새로운 관성인 신금(申金)이 들어와 일지의 인성인 자수(子水)와 신진합(申辰合)을 한다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '이직 고민' 결론을 세운다.
