golden_answer:
  answer: |
    병신년(丙申年): 이직 고민 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 따라서 회사를 때려치우고 멋지게 이직하려는 것이 꿈이다. 결론적으로 병신년(丙申年)에 사표는 잠시 서랍 깊숙이 넣어두어야 한다.
