  answer: |
    계사년(癸巳年): 가게 처분 금액은 제값을 받지 못한다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 결국 거리를 지기는 균형 감각이 인연을 부드럽게 유지하는 현실적인 해법이다. 결국 마음속에 품었던 가게 권리금은 현실의 벽에 부딪히고, 조금은 낮은 선에서 타협하며 계약서에 도장을 찍게 된다. 이 일을 계속해야 하나, 말아야 하나라는 번민 속에 일지의 인목(寅木)과 인사형(寅巳刑)의 불꽃이 튄다. 특히 배우자 자리인 일지의 인목(寅木)이 형(刑)을 당하니 남편과 불협화음이 가시질 않고 밖에서는 사고 수가 비치니 매사 조심해야 한다. 따라서 계사년(癸巳年)에 가게 정리한 것은 신의 한 수였다. 꼬박꼬박 월급이 나오는 봉급생활에 안주해야 한다.
