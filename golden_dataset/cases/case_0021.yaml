reasoning:
  source_interpretation: |
    )(제2장 생활 명리 세운 분석)4 21. 계사년(癸巳年) : 가게 처분 금액은 제값을 받지 못한다. 시 일 월 년(여) 己 甲 癸 庚 巳 寅 未 戌 하늘을 향해 곧게 뻗은 갑목(甲木)의 기개를 지녔으나, 그 발치에는 화려한 불꽃들이 가득한 식상다자(食傷多者) 사주다. 식상이 많다는 것은 口卜음속에 수천 개의 태양이 떠 있는 것과 같다. 뭐든 하고자 하는 의욕이 넘쳐나기에, 이것저것 배우러 다니느라 발바닥에 땀이 나고, 다양한 업종과 회사를 섭렵하며 인생의 포트폴리오를 화려하게 채운다. 그러나 이성 관계에 있어서는 의외로 낯가림이 있다. 처음에는 철벽을 지며 사귀기 어려운 듯 보이지만, 한 번 마음의 빗장을 열고 정(情)을 주면 그 깊이가 태평양보다 깊어 끝을 알 수 없다. 내가 좋아하면 주변의 반대나 역경 따위는 사랑의 양념일 뿐, 어떠한 어려움도 이겨내는 무시무시한 집념을 발휘한다. 세간에서는 식상이 많으면 남편 복이 박하다고 수군대지만, 이는 모르는 소리다. 남편의 경제적 능력이 조금 부족해도 자식이 있지 않은가. 남편이 경제력이 약해 고생은 좀 할지언정, 자식을 바라보며 풍파를 견뎌내는 정신력은 세계 최강이다. 즉, 결혼은 실패하는 것이 아니라 인내의 미학을 실천하며 가정을 지켜내는 힘이 강하다고 해석함이 옳다. 물론, 사주에 내 자식과 남의 자식이 섞여 있는 형국이니 삶의 반려자가 몇 번 바뀔 수도 있는 역동적인 시나리오도 존재한다. 만약 이별의 아픔을 겪는다면, 시(時)의 사화(巳,火) 속에는 남자를 뜻하는 경금(庚金)이 있으니, 결국 자식이 있는 남자와 재혼의 인연이 있다.   지지의 상황은 조금 긴박하다. 식상끼리 부딪히는 형(刑)의 기운으로 인해 남모를 아픔인 자연유산(自然流産)의 눈물을 흘릴 수도 있다. 특히 연지의 술토(戌土)와 월의 미토(未土)가 형(刑)을 이루어 뜨거운 화(火)의 기운이 강해지고, 그 과정에서 연간의 관성 경금(庚金)이 극(剋)을 당한다. 또한 배우자 자리인 일지 인목(寅木)이 사화(巳火)와 형(刑)을 하면서, 사화(巳火)에 의해 관성 경금(庚金)이 녹는 형국이다. 자식이 태어나면 남편이 심혈관 계통의 문제로 건강이 약해지거나, 그렇지 않으면 남편의 경제적 능력이 흔들리거나 집을 나가 방황하는 기막힌 반전이 일어날 수 있어, 부부 사이에는 늘 긴장감이 흐른다. 이러한 흐름은 구조적인 충돌에서 비롯되므로 감정적으로 대응하기 보다 냉정한 판단이 필요하다. 또한 서로의 역할과 책임을 분명히 하고, 외부 환경의 변화를 통해 기운을 완화하는 노력이 중요하다. 또한 갑목(甲木)이 튼튼하게 자라려면 따스한 태양인 병화(丙,火)가 절실한데, 사주에는 보이지 않고 일지인 인목(寅木) 속에 병화(丙,火)가 숨어 있다. 이는 배우자인 경금(庚金)이 인목(寅木)을 억누르고 있어 남편의 경제적 능력은 신통치 않다고 해석할 수 있다. 게다가 일주가 간여지동(干與地同)이다. 남들이 보기에는 사이좋은 부부라고 할 수 있으나, 실제는 아기자기한 정(情)이 없는 무뚝뚝한 관계가 되기 쉽다. 월간에 있는 계수(癸水)는 일간을 보듬어주는 인성, 즉 부모님이다. 한여름의 비(雨)이니 얼마나 서원하겠는가? 하지만 비가 내리면 구름이 해를 가린다. 부모님은 아낌없이 퍼주시는 사랑의 표본이다. 하지만 수생목(水生木)의 넘치는 기운에 일간은 비를 피하려고 기토(己土)와 합(合)을 해버렸다. 따라서 일간 갑목(甲木)은 곧게 뻗은 낙락장송 (落•落長松)이 아니라, 옆으로 굽어버린 가느다란 나무가 되었다. - 61 )4제2장 생활 영리 세운 분석)4 그리고 일간의 사주 지형도를 살펴보니, 대지(大地)를 상징하는 흙의 기운인 재성이 일간 주위에 가득하다. 하지만 흙들이 서로 부딪치고 엉켜 있어, 재물에 대해서는 마치 밑 빠진 독에 물을 채우는 얄궂은 삶과 같다. 갑목(甲木)은 시간의 기토(己土)와 합(合)을 이루고 있다. 이는 평생 손에서 푼돈이 마르지 않는 다행스러운 운명임을 뜻한다. 하지만 지지의 사정은 조금 복잡하다. 연지의 재성 술토(戌土)와 월(月)의 재성 미토(未土)가 술미형(戌未刑)을 일으키고 있다. 이는 주머니에 돈이 조금만 차오르려 하면, 기다렸다는 듯 사방에서 돈 쓸 일이 화살처럼 날아온다는 뜻이다. 일간의 지갑을 자주 여는 주인공은 다름 아닌 가속이다. 술토(戌土) 속에= 느 남 펴 이 신금(辛金)이, 미토(未土) 속에는 자식인 정화(丁,火)가 있다. 남편과 자식은 일간의 사랑인 동시에 지출의 근원이 되는 것을 뜻한다. 남편이 밖에서 호기롭게 사업을 시작하면, 그대에게 달려와 밑천이 부족하다며 애절한 눈빛을 보낸다. 그러면 돈을 내어주지만, 슬프게도 그 돈은 돌아올 줄 모르는 편지와도 같다. 심지어 남편이 주식으로 재물을 잃어 곤경에 처하면, 대출받아서라도 그 어려움을 해결하려고 한다. 자식도 돈 귀한 줄 모를 수 있으니, 어릴 적부터 돈은 땀방울의 결정체임을 엄격히 가르쳐야 일간의 노후가 평온해진다. 원국(原局)에 재성이 형충(刑)沖)되어 있다는 것은, 일찍 한쪽 부모님을 여의거나 일찍부터 부모와 떨어져 자수성가(自手成家)해야 으 으 암시한다. 그래서일까, 그대에게 부모님과의 기억은 가슴 한구석에 박힌 보석처럼 애틋하다. 함께했었던 짧은 시간이 평생의 자양분이 되니, 기회가 닿을 때마다 돈독한 정을 나누며 따스함을 간직해야 한다. 반면, 재성이 형(刑)을 하고 있으니 고부갈등의 불꽃이 튀기 쉽다. - 62 _ )(제2장 생활 명리 세운 분석)4 시어머니와는 멀리서 보아야 예쁘고, 가끔 보아야 사랑스러운 관계를 유지할 수 있다. 적당한 거리 두기는 일간의 정신 건강과 시댁과의 평화를 지기는 우아한 기술이다. 지나친 개입보다는 서로의 영역을 존중하는 태도가 갈등을 줄이는 핵심이 된다. 때로는 한발 물러서는 지혜가 관계를 더 오래 편안하게 이어주는 힘이 된다. 결국 거리를 지기는 균형 감각이 인연을 부드럽게 유지하는 현실적인 해법이다. 그리고 일간의 직장 생활을 살펴보면 조금 애달픈 그림이 그려진다. 일간 갑목(甲木)과 직장 자리인 시간의 기토(己土)가 갑기합(甲己合)을 하여 꽁꽁 묶여 있다. 이것은 무엇을 뜻하는가? 일간은 회사에 정성을 다하지만, 회사는 그 정성을 당연하게 여기며 합당한 대접을 해주지 않는다. 동료들이 승진의 사다리를 타고 올라갈 때, 그대는 제자리에 묶여 나는 누구인가, 여긴 어디인가를 외치게 된다. 계사년(癸巳年)에 하늘의 기운을 살펴보면, 운세의 천간에 인성인 계수(癸水)라는 시원한 단비가 내려온다. 이 비는 월간에 있던 일간의 지혜이자 문서인 계수(癸水)를 툭 건드려 깨운다. 여기서 밀고 당기는 름을 시작한다. 시간의 기토(己土) 재물이 토극수 감정의 줄다리기를 (土剋水)로 내리는 비를 막아서며, 생각하고 있는 금액이 아니면 도장을 찍어줄 수 없다며 고집을 피워, 시간만 지체되는 국면이 이어진다. 결국 마음속에 품었던 가게 권리금은 현실의 벽에 부딪히고, 조금은 낮은 선에서 타협하며 계약서에 도장을 찍게 된다. 욕심을 부렸다간 계약의 배가 영영 항구를 떠나지 못할 판이니, 마음을 비우는 것이 깨닫는 순간이다. 다행히 연간의 관성 경금(庚金)이 곧 채丁 O 느 | 0 1 으 금생수(金生水)로 비의 기운을 보태주니, 가게 폐업을 결심하고 뜨거운 햇살이 내리쬐는 무오월(戊午月)에 드디어 가게를 정리한다.  )(제2장 생활 명리 세운 분석)4 돈을 뜻하는 무토(戊土)와 계약을 뜻하는 계수(癸水)가 합(合)으로 찰떡같이 붙었으니, 비로소 무거운 짐을 내려놓게 된다. 그리고 세운 지지의 식상인 사화(巳,火)가 시(時)의 사화(巳,火)를 깨우니, 하는 일에 대한 마음의 변화가 폭풍처럼 몰아친다. 이 일을 계속해야 하나, 말아야 하나라는 번민 속에 일지의 인목(寅木)과 인사형(寅巳刑)의 불꽃이 튄다. 그 갈등은 결단을 재촉하듯 마음을 더욱 흔들어 놓는다. 특히 배우자 자리인 일지의 인목(寅木)이 형(刑)을 당하니 남편과 불협화음이 가시질 않고 밖에서는 사고 수가 비치니 매사 조심해야 한다. 또한 자식을 뜻하는 사화(巳,火)가 형(刑)을 당하니 자식 문제로 신경을 곤두세우게 하니, 몸과 마음이 열 개라도 부속하다. 형(刑)의 영향을 받은 연지의 술토(戌土)와 월(月)의 미토(未土)가 술미형(戌未刑)을 일으키니, 현재 가게와 인연이 끝났다는 명확한 이별 통보와 같다. 계사년(癸巳年)부터 향후 몇 년간의 재물 운을 살펴보면, 당분간은 돈이 어딘가에 묶여 흐르지 않는 형국이다. 계사년(癸巳年)은 내리는 비를 피하려다 보니 일간이 기토(己土)에 몸을 숨기려 하다가 지지의 인사형(寅巳刑)으로 재물이 묶이며, 이어진 갑오년(甲午년)과 을미년 (乙未年)은 일간의 비겁 갑목(甲木)과 을목(乙木)이 나타나 일간의 재물을 쳐내니 재물 운의 기압골이 매우 낮다. 따라서 계사년(癸巳年)에 가게 정리한 것은 신의 한 수였다. 억지로 버텼다면 소나기에 온몸이 젖었을 터다. 당분간은 사업을 꿈꾸기보다 꼬박꼬박 월급이 나오는 봉급생활에 안주해야 한다. 남의 돈을 받는 고달픔이 나중에 그대의 사업 운을 더 단단하게 해줄 자양분이 된다. 그리고 인사형(寅巳刑)의 기운은 대화로 녹여야 한다. 가족은 일간의 뿌리를 흔드는 바람이 아니라, 쉴 수 있는 숲임을 잊지 않아야 한다. - 64
