    - "그 다음 여성의 사주에서 남자를 상징하는 관성이 형(刑)을 하고 있다는 것은, 남자가 들어오는 길목에 복잡한 검문소가 설치된 것과 같다. 라는 명리 근거를 설명한다."
    - "이어 먼지 연지의 술토(戌土)와 월(月)의 미토(未土)가 만나 술미형(戌未刑)이라는 지각 변동을 일으키고 있다. 흐름을 현실 사건으로 번역한다."
