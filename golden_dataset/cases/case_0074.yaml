    이 사례의 결론은 '미혼, 결혼이 늦어진다'이다.
    결혼과 부부 판단은 배우자궁, 관성, 식상, 충합을 함께 본다. 관계가 이어질 수 있는 구조인지, 압박과 반발이 커지는 구조인지 먼저 판단한다.
    이 사례의 판단 근거는 관성, 형, 생, 庚午의 작용이다.
    원문 판단 근거: 여성의 사주에서 남자를 상징하는 관성이 형(刑)을 하고 있다는 것은, 남자가 들어오는 길목에 복잡한 검문소가 설치된 것과 같다.
    원문 판단 근거: 먼지 연지의 술토(戌土)와 월(月)의 미토(未土)가 만나 술미형(戌未刑)이라는 지각 변동을 일으키고 있다.
    원문 판단 근거: 이 사주는 뜨겁고 단단한 환경(횱산)에서도 그 사이를 흐르는 샘물처럼 살아가는 한 사람의 파란만장하면서도 의미 있는 인생의 흐름이 보인다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '미혼, 결혼이 늦어진다' 결론을 세운다.
