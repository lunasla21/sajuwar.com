reasoning:
  source_interpretation: |
    " 74. 경오년(庚午年) . 미혼 . 결혼이 늦어진다. 시 일 월 년(여) 丙 癸 己 戊 辰 巳 未 戌 무더운 한여름, 미토(未土)라는 메마른 대지 위에서 영롱한 옹달샘, 계수(癸水)로 태어났다. 이 사주는 뜨겁고 단단한 환경(횱산)에서도 그 사이를 흐르는 샘물처럼 살아가는 한 사람의 파란만장하면서도 의미 있는 인생의 흐름이 보인다. 먼지 연지의 술토(戌土)와 월(月)의 미토(未土)가 만나 술미형(戌未刑)이라는 지각 변동을 일으키고 있다. 윩과 흙이 서로 부딪치고 깎이며 정교하게 다듬어지는 형국이다. 이는 남들이 생각지 못한 곳을 꿰뚫어 보는 비범한 총명함과 예리한 두뇌 회전을 의미한다. 한마디로 하나를 가르치면 열을 아는 똑똑한 여인이다. 하지만 명석함이 때로는 너무 깊어, 웬만한 남자는 그대의 지적 수준을 맞추지 못해 뒷걸음질 칠 수도 있다. 여성의 사주에서 남자를 상징하는 관성이 형(刑)을 하고 있다는 것은, 남자가 들어오는 길목에 복잡한 검문소가 설치된 것과 같다. 내 눈에 자는 남자가 아니면 들여보내지 않고 버티고 있기 때문이다. 결혼이 상대적으로 늦어지는 것은 인연이 없어서가 아니라, 운명의 수레바퀴가 완성된 남자를 고르느라 깐깐하게 심사하고 있기 때문이다. 일간 계수(癸水)는 주변의 뜨거운 횱들로 인해 자칫 메마르기 쉬운 운명이다. 따라서 인연을 서두를 필요는 없다. 술미형(戌未刑)의 거친 흙을 부드럽게 적셔주는 깊은 이해심을 가진 남자가 나타나면, 비로소 사랑을 완성하는 지혜로 승화될 터다.
consultation:
  practical_guidance: |
    따라서 인연을 서두를 필요는 없다. 일간 계수(癸水)는 주변의 뜨거운 횱들로 인해 자칫 메마르기 쉬운 운명이다. 술미형(戌未刑)의 거친 흙을 부드럽게 적셔주는 깊은 이해심을 가진 남자가 나타나면, 비로소 사랑을 완성하는 지혜로 승화될 터다.
golden_answer:
  answer: |
    경오년(庚午年): 미혼, 결혼이 늦어진다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 따라서 인연을 서두를 필요는 없다. 일간 계수(癸水)는 주변의 뜨거운 횱들로 인해 자칫 메마르기 쉬운 운명이다. 술미형(戌未刑)의 거친 흙을 부드럽게 적셔주는 깊은 이해심을 가진 남자가 나타나면, 비로소 사랑을 완성하는 지혜로 승화될 터다.
brain:
  decision_rule: |
    IF 경오년에 관성이 배우자궁과 관계 지속성을 직접 건드리고, 형이 같은 방향으로 압력을 보태면 THEN 결론은 '미혼, 결혼이 늦어진다' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 배우자궁과 관계 지속성 문제로 보이더라도 THEN 일지 안정성, 관성의 상태, 식상으로 인한 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 감정의 재결합보다 반복될 생활 압박이 더 크다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 관성이 실제 사건의 문을 여는지 본다."
    - "2순위: 형이 관성을 강화하는지, 완화하는지 본다."
    - "3순위: 일지 안정성, 관성의 상태, 식상으로 인한 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 관성과 형을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 배우자궁과 관계 지속성에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '미혼, 결혼이 늦어진다' 사례지만 숨은 판단 구조는 관성 하나가 아니라 관성과 형의 결합이다.
    IF 이 결합이 배우자궁과 관계 지속성의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 끌림은 강하지만 일지나 관성이 흔들리면 THEN 관계 결론을 서두르지 말고 반복될 갈등 패턴을 먼저 보게 한다.
    THEN 상대를 바꾸려 하기보다 거리, 책임, 생활 리듬의 조정 가능성을 확인하게 한다.
    BECAUSE 관성은 감정보다 관계를 담는 구조가 약해질 때 사건으로 나타나기 때문이다.
  forbidden_advice:
    - "헤어져라, 합쳐라, 결혼하라처럼 관계 결정을 대신 내려주지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 丙 癸 己 戊 / 지지: 辰 巳 未 戌"
    - "세운: 경오년 庚午年"
