reasoning:
  source_interpretation: |
    " 66. 갑오년(甲午年) . 사무실 이전하면 사업이 번창한다. 시 일 월 년(남) 己 庚 壬 丁 卯 申 子 未 한겨울의 차가운 서릿발 아래 태어나 단단한 원석(原石)의 기개를 품은 경금(庚金)이다. 갑오년(甲午年)에 하늘의 풍경부터 살펴보면, 세운 천간에 갑목(甲木)이라는 푸른 거목(巨木)이자 재물이 웅장하게 등장한다. 이 갑목(甲木)은 들어오자마자 일간의 사무실이자 조직의 틀인 연간의 관성 정화(丁火)에 다가가 따스한 땔감이 되어준다고 속삭이고 정화(丁火)는 기운을 얻는다. 기운을 얻은 정화(丁,火)는 기다렸다는 듯 월간에 있는 일간의 재능, 즉 식상인 임수(壬水)와 정임합(丁壬合)을 한다. 이는 일간의 기술과 조직의 권위가 서로 합쳐져 더 큰 효과를 내는 결과를 만든다는 뜻이다. 하지만 이 화려한 연극의 하이라이트는 따로 있다. 천간의 재물인 갑목(甲木)이 시간에 있는 일간의 문서이자 자격을 뜻하는 인성인 기토(己土)와 만나 갑기합(甲己合)의 포옹을 나누는 장면이다. 이렇게 재물과 인성이 찰떡궁합으로 엮이니, 눈이 번쩍 뜨일 좋은 축복이다. 그러나 이 축복이 저절로 주어지는 것은 아니다. 반드시 수행해야 할 의무가 하나 있다. 바로 사무실 이전이다. 갑오년(甲午年)은 관성인 오화(午,火)가 시의 묘목(卯木)과 오묘파(午卯破)를 하여, 둥지를 이전할 때가 되었다고 속삭인다. 현재 사무실에 그대로 있다면, 정임합 (丁壬合)의 기운은 그저 구름 위의 떡에 불과할 뿐이다. 이때 과감하게 짐을 싸서 옮기는 순간, 막혀 있던 재물의 혈관이 뚫리기 시작한다.
consultation:
  practical_guidance: |
    반드시 수행해야 할 의무가 하나 있다. 갑오년(甲午年)은 관성인 오화(午,火)가 시의 묘목(卯木)과 오묘파(午卯破)를 하여, 둥지를 이전할 때가 되었다고 속삭인다. 현재 사무실에 그대로 있다면, 정임합 (丁壬合)의 기운은 그저 구름 위의 떡에 불과할 뿐이다. 이때 과감하게 짐을 싸서 옮기는 순간, 막혀 있던 재물의 혈관이 뚫리기 시작한다.
golden_answer:
  answer: |
    갑오년(甲午年): 사무실 이전하면 사업이 번창한다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 반드시 수행해야 할 의무가 하나 있다. 갑오년(甲午年)은 관성인 오화(午,火)가 시의 묘목(卯木)과 오묘파(午卯破)를 하여, 둥지를 이전할 때가 되었다고 속삭인다. 현재 사무실에 그대로 있다면, 정임합 (丁壬合)의 기운은 그저 구름 위의 떡에 불과할 뿐이다. 이때 과감하게 짐을 싸서 옮기는 순간, 막혀 있던 재물의 혈관이 뚫리기 시작한다.
brain:
  decision_rule: |
    IF 갑오년에 관성이 사업장, 계약, 운영 지속성을 직접 건드리고, 식상이 같은 방향으로 압력을 보태면 THEN 결론은 '사무실 이전하면 사업이 번창한다' 쪽으로 세운다.
    BECAUSE 현명역학원식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 사업장, 계약, 운영 지속성 문제로 보이더라도 THEN 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 돈이 생기는 통로와 자리의 안정성이 동시에 열린다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 관성이 실제 사건의 문을 여는지 본다."
    - "2순위: 식상이 관성을 강화하는지, 완화하는지 본다."
    - "3순위: 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 관성과 식상을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 사업장, 계약, 운영 지속성에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '사무실 이전하면 사업이 번창한다' 사례지만 숨은 판단 구조는 관성 하나가 아니라 관성과 식상의 결합이다.
    IF 이 결합이 사업장, 계약, 운영 지속성의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE 현명역학원 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 재성은 보이나 자리나 계약궁이 흔들리면 THEN 확장보다 고정비, 계약 조건, 회수 가능 금액을 먼저 줄이게 한다.
    THEN 새 투자보다 손실 한도, 철수 기준, 계약 문구를 먼저 정하게 한다.
    BECAUSE 관성이 사업 사건으로 드러날 때는 돈을 버는 힘보다 돈이 새는 통로가 더 먼저 현실화되기 때문이다.
  forbidden_advice:
    - "대박, 무조건 확장, 반드시 계약 성사처럼 욕망을 키우는 표현을 하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 己 庚 壬 丁 / 지지: 卯 申 子 未"
    - "세운: 갑오년 甲午年"
    - "핵심 신호 1: 관성"
    - "핵심 신호 2: 식상"
    - "판단 영역: 사업장, 계약, 운영 지속성"
    - "우선 판단축: 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합"
    - "결론 방식: 돈이 생기는 통로와 자리의 안정성이 동시에 열린다"
    - "보조 신호: 인성"
    - "보조 신호: 월간"
    - "보조 신호: 연간"
