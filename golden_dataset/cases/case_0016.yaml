golden_answer:
  answer: |
    병신년(丙申年): 승진이 되지 않는다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 자리 이동은 분명히 발생하고 업무량은 많아지는데, 정작 바라던 계급장은 손에 잡힐 듯 잡히지 않아 속이 타들어 가는 희망 고문의 시기다. 무술년(戊戌年)에 이르면 하늘에서는 넓은 대지인 무토(戊土) 재성이 일간을 괴롭히던 계수(癸水)를 합(合)을 하여 방해꾼이 사라 지고 세운 지지의 재성인 술토(戌土)가 연지의 오화(午火)와 오술합 (午戌合)을 이룬다. 재물과 명예가 합(合)을 하면서 가치를 드높이니, 이때야말로 그토록 바라던 승진의 팡파르가 울려 퍼지는 순간이다.
brain:
  decision_rule: |
    이 사례의 결론은 '승진이 되지 않는다'이다.
    직장 판단은 세운이 관성, 식상, 일지와 어떻게 부딪히는지를 먼저 본다. 관성이 식상에 손상되거나 충을 받으면 직장 자리, 승진, 부서 안정성이 흔들린다는 결론을 낸다.
    이 사례의 판단 근거는 관성, 재성, 인성, 일지, 월간, 연간, 세운 지지, 합, 형, 생, 丙申, 戊戌의 작용이다.
    원문 판단 근거: 세운 지지의 관성 신금(申金)이 들어와 일간의 현재 자리인 일지의 신금(申金)을 깨우고, 월(月)의 사화(巳火)와 만나 신사합형(申巳合刑)을 이룬다.
    원문 판단 근거: 무술년(戊戌年)에 이르면 하늘에서는 넓은 대지인 무토(戊土) 재성이 일간을 괴롭히던 계수(癸水)를 합(合)을 하여 방해꾼이 사라 지고 세운 지지의 재성인 술토(戌土)가 연지의 오화(午火)와 오술합 (午戌合)을 이룬다.
    원문 판단 근거: 월간에 떠 있는 문서와 서류의 상징, 계수(癸水) 인성이 이 불꽃을 덮친다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '승진이 되지 않는다' 결론을 세운다.
