golden_answer:
  answer: |
    정유년(丁酉年): 퇴사 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 이를 위해서는 지지에 수분을 머금은 기름진 토양인 진토(辰土)가 있거나 乙木의 뿌리가 되는 인묘목(寅卯木)이 다지지 않고 튼튼해야 노력의 결실이 재물로 이어질 수 있으며, 재물의 성취를 이루는 부명(富命)이 된다. 따라서 평소 건강 관리와 안전에 각별한 주의를 기울이는 것이 필요하다. 감정에 휩쓸린 선택이 반복되지 않도록 더욱 신중한 판단이 요구된다. 결국 한 번의 선택이 이후 삶의 방향을 크게 좌우하게 된다. 따라서 직장에서의 승진보다는 자격을 활용한 교육, 아동 심리, 혹은 상담 분야로 진출하는 것이 능력을 인정받는다.
brain:
  decision_rule: |
    IF 정유년에 관성이 직장 자리와 조직 적응을 직접 건드리고, 재성이 같은 방향으로 압력을 보태면 THEN 결론은 '퇴사' 쪽으로 세운다.
    BECAUSE 현명역학원식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 직장 자리와 조직 적응 문제로 보이더라도 THEN 관성의 안정성, 식상의 반발, 부서/상사의 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 관성이 실제 사건의 문을 여는지 본다."
    - "2순위: 재성이 관성을 강화하는지, 완화하는지 본다."
    - "3순위: 관성의 안정성, 식상의 반발, 부서/상사의 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 관성과 재성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 직장 자리와 조직 적응에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '퇴사' 사례지만 숨은 판단 구조는 관성 하나가 아니라 관성과 재성의 결합이다.
    IF 이 결합이 직장 자리와 조직 적응의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE 현명역학원 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 이동 욕구가 강해도 다음 운에서 적응 구조가 약하면 THEN 즉시 결정보다 부서, 사람, 업무량을 분리해 검토하게 한다.
    THEN 퇴사/이직은 감정의 출구가 아니라 다음 자리의 관성 안정성이 확인될 때 실행하게 한다.
    BECAUSE 관성은 자리 변화 자체보다 변화 후 버틸 구조를 먼저 묻는 신호다.
  forbidden_advice:
    - "무조건 퇴사하라, 무조건 버텨라, 반드시 승진한다처럼 조직 선택을 단정하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 乙 丙 戊 壬 / 지지: 未 戌 申 子"
