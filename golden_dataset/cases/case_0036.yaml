    겉 질문의 표현은 '자녀 있는 남자를 만나야 한다'이다. 실제 핵심은 연지와 일지에 자리한 사화(巳,火) 속에 경금(庚金)이 숨어 있다. 특히 일지 신호를 표면 사건보다 먼저 읽는다.
  action_guide: |
    따라서 남편은 뜻밖의 화상으로 흉터가 생기거나, 화(,火)의 인체에 해당하는 심장과 관련한 질환으로 고생하거나 부부불화의 적신호가 될 수 있다. 자녀가 있는 남자를 만나 그 기운 둘째는 남편이 금(金)을 다루는 직업(금속, 의료, 기계 등)을 갖는 것이다. 을목(乙木)은 태양을 보아야 꽃을 피우지만, 그 태양의 열이 너무 뜨거우면 주변 보석이 녹아내리는 법이다. 적절한 거리와 세심한 배려로 남편의 건강을 보살피며 살아간다면, 이 아슬아슬한 긴장감 또한 그대 인생을 더욱 다채롭게 만드는 묘미가 될 터다.
  forbidden_advice:
    - "무조건 헤어져라, 무조건 다시 합쳐라처럼 관계 결정을 대신하지 않는다. 상대를 악인으로 단정하지 않는다."
    - "'자녀 있는 남자를 만나야 한다'라는 결론을 운명처럼 확정하거나 고객의 선택권을 빼앗는 표현을 쓰지 않는다."
    - "사례 원문을 고객에게 그대로 복사하지 않는다."
    - "불안과 공포를 이용해 결정을 압박하지 않는다."
  evidence:
