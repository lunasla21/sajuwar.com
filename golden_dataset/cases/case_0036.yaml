golden_answer:
  answer: |
    경오년(庚午年): 자녀 있는 남자를 만나야 한다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 따라서 남편은 뜻밖의 화상으로 흉터가 생기거나, 화(,火)의 인체에 해당하는 심장과 관련한 질환으로 고생하거나 부부불화의 적신호가 될 수 있다. 자녀가 있는 남자를 만나 그 기운 둘째는 남편이 금(金)을 다루는 직업(금속, 의료, 기계 등)을 갖는 것이다. 을목(乙木)은 태양을 보아야 꽃을 피우지만, 그 태양의 열이 너무 뜨거우면 주변 보석이 녹아내리는 법이다. 적절한 거리와 세심한 배려로 남편의 건강을 보살피며 살아간다면, 이 아슬아슬한 긴장감 또한 그대 인생을 더욱 다채롭게 만드는 묘미가 될 터다.
brain:
  decision_rule: |
    이 사례의 결론은 '자녀 있는 남자를 만나야 한다'이다.
    결혼과 부부 판단은 배우자궁, 관성, 식상, 충합을 함께 본다. 관계가 이어질 수 있는 구조인지, 압박과 반발이 커지는 구조인지 먼저 판단한다.
    이 사례의 판단 근거는 일지, 생, 庚午의 작용이다.
    원문 판단 근거: 연지와 일지에 자리한 사화(巳,火) 속에 경금(庚金)이 숨어 있다.
    원문 판단 근거: )(제2장 생활 명리 세운 분석)4 자녀 있는 남자를 만나야 한다.
    원문 판단 근거: 경오년(庚午年) 시 일 월 년(여) 癸 乙 戊 乙 未 巳 子 巳 한겨울 차가운 자수(子水)의 계절에 태어나 온기(溫氣)를 갈구하는 가냘픈 을목(乙木)으로 태어났다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '자녀 있는 남자를 만나야 한다' 결론을 세운다.
  priority_rule:
    - "고객 질문의 표면 주제보다 세운이 실제로 건드린 십성/궁위를 먼저 본다."
    - "가장 먼저 확인할 신호는 일지이다."
    - "그 다음 생 흐름이 현실 사건을 강화하거나 완화하는지 본다."
    - "배우자궁 안정성"
    - "관성의 상태"
    - "식상견관과 감정 표출"
    - "마지막에 '자녀 있는 남자를 만나야 한다' 결론이 무리한 단정인지, 조절 가능한 선택인지 구분한다."
  consultation_strategy:
    - "먼저 고객 질문을 '자녀 있는 남자를 만나야 한다' 흐름으로 정리한다."
    - "그 다음 연지와 일지에 자리한 사화(巳,火) 속에 경금(庚金)이 숨어 있다. 라는 명리 근거를 설명한다."
    - "이어 )(제2장 생활 명리 세운 분석)4 자녀 있는 남자를 만나야 한다. 흐름을 현실 사건으로 번역한다."
    - "왜 결론이 '자녀 있는 남자를 만나야 한다' 쪽으로 좁혀지는지 고객이 납득할 수 있게 말한다."
    - "마지막에는 불안을 키우지 않고 조절 가능한 행동을 제시한다."
