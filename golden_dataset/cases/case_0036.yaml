    - "생: )(제2장 생활 명리 세운 분석)4 자녀 있는 남자를 만나야 한다."
    - "庚午: 경오년(庚午年) 시 일 월 년(여) 癸 乙 戊 乙 未 巳 子 巳 한겨울 차가운 자수(子水)의 계절에 태어나 온기(溫氣)를 갈구하는 가냘픈 을목(乙木)으로 태어났다."
