reasoning:
  source_interpretation: |
    " 72. 갑오년(甲午年) : 권고사직 시 일 월 년(남) 己 壬 己 辛 酉 申 亥 丑 겨울의 초입, 해수(亥水)의 계절에 태어나, 단단한 바위(申金) 위에 올라탄 임수(壬水)이다. 이 사주는 금(金)과 수(水)의 기운이 가득하여 냉철하면서도 깊은 지혜가 느껴진다. 갑오년(甲午年), 새로운 시작을 꿈꾸는 생명력인 갑목(甲木) 식상이 나타나 기토(己土) 관성을 보자 마자 갑기합(甲己合)으로 껴안아 버린다. 이는 새로운 일(甲木)이 현재 직장(己土)을 묶는 형국이니, 직장을 떠나게 되는 퇴사의 운명이다. 더욱 얄궂은 것은 연간의 문서인 신금(辛金)이 운세의 갑목(甲木)을 베어버린다는 점이다. 본인의 의지로 멋지게 사표를 던지는 퇴사라면 좋으련만, 문서가 내 마음을 억누르니 이는 본의 아니게 등 떠밀려 나가는 권고사직(勸告辭職)의 아픔을 의미한다. 나는 머물고 싶으나, 회사가 나를 놓아주려 하니 깊은 강물 위로 낙엽만 쓸쓸히 굴러가는 형국이다. 인사발령에 밤잠을 설치는 고단한 한 해가 된다. 이어진 을미년(乙未年)도 기상도가 그리 맑지 않다. 하늘에는 가냘픈 풀잎인 을목(乙木)이 나타나 연간의 신금(辛金)과 을신충(乙辛)沖)을 한다. 문서와 노력이 부딪치니, 새로운 계약서를 손에 쥐기가 여간 까다로운 게 아니다. 지지는 미토(未土)가 들어와 연지의 관성인 축토 (丑土)와 충(沖)을 한다. 대지가 뒤집히고 먼지가 일어나니, 안정적인 일터를 찾기가 힘들다. 여기저기 문을 두드려 보지만, 다음에 함께 하자는 답답한 흐름이 이어지며, 차가운 메아리뿐이다.
consultation:
  practical_guidance: |
    지지는 미토(未土)가 들어와 연지의 관성인 축토 (丑土)와 충(沖)을 한다. 대지가 뒤집히고 먼지가 일어나니, 안정적인 일터를 찾기가 힘들다. 여기저기 문을 두드려 보지만, 다음에 함께 하자는 답답한 흐름이 이어지며, 차가운 메아리뿐이다.
golden_answer:
  answer: |
    갑오년(甲午年): 권고사직 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 지지는 미토(未土)가 들어와 연지의 관성인 축토 (丑土)와 충(沖)을 한다. 대지가 뒤집히고 먼지가 일어나니, 안정적인 일터를 찾기가 힘들다. 여기저기 문을 두드려 보지만, 다음에 함께 하자는 답답한 흐름이 이어지며, 차가운 메아리뿐이다.
brain:
  decision_rule: |
    IF 갑오년에 관성이 직장 자리와 조직 적응을 직접 건드리고, 식상이 같은 방향으로 압력을 보태면 THEN 결론은 '권고사직' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 직장 자리와 조직 적응 문제로 보이더라도 THEN 관성의 안정성, 식상의 반발, 부서/상사의 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 관성이 실제 사건의 문을 여는지 본다."
    - "2순위: 식상이 관성을 강화하는지, 완화하는지 본다."
    - "3순위: 관성의 안정성, 식상의 반발, 부서/상사의 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 관성과 식상을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 직장 자리와 조직 적응에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '권고사직' 사례지만 숨은 판단 구조는 관성 하나가 아니라 관성과 식상의 결합이다.
    IF 이 결합이 직장 자리와 조직 적응의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 이동 욕구가 강해도 다음 운에서 적응 구조가 약하면 THEN 즉시 결정보다 부서, 사람, 업무량을 분리해 검토하게 한다.
    THEN 퇴사/이직은 감정의 출구가 아니라 다음 자리의 관성 안정성이 확인될 때 실행하게 한다.
    BECAUSE 관성은 자리 변화 자체보다 변화 후 버틸 구조를 먼저 묻는 신호다.
  forbidden_advice:
    - "무조건 퇴사하라, 무조건 버텨라, 반드시 승진한다처럼 조직 선택을 단정하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 己 壬 己 辛 / 지지: 酉 申 亥 丑"
    - "세운: 갑오년 甲午年"
    - "핵심 신호 1: 관성"
    - "핵심 신호 2: 식상"
    - "판단 영역: 직장 자리와 조직 적응"
    - "우선 판단축: 관성의 안정성, 식상의 반발, 부서/상사의 압박"
    - "결론 방식: 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다"
    - "보조 신호: 연간"
    - "보조 신호: 합"
    - "보조 신호: 충"
    - "보조 신호: 형"
