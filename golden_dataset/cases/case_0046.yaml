    이 사례의 결론은 '승진이 되지 않는다'이다.
    직장 판단은 세운이 관성, 식상, 일지와 어떻게 부딪히는지를 먼저 본다. 관성이 식상에 손상되거나 충을 받으면 직장 자리, 승진, 부서 안정성이 흔들린다는 결론을 낸다.
    이 사례의 판단 근거는 묘유충, 관성, 인성, 비겁, 월간, 연간, 세운 천간, 세운 지지, 합, 충, 형, 생, 丁酉의 작용이다.
    원문 판단 근거: 세운 지지의 유금(酉金)은 연지의 묘목(卯木)과 묘유충(卯酉)沖)을 일으킨다.
    원문 판단 근거: 관성은 승진의 명예와 직위를 뜻하는데, 경생자가 나타나 이 명예를 흔들어버리는 형국이다.
    원문 판단 근거: 세운의 정화(丁火)가 현재 업무를 상징하는 시간의 기토(己土)와 생(生)을 이루면, 기토 (己土)는 움직이면서 월간의 인성인 갑목(甲木)과 합(合)을 하게 된다
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '승진이 되지 않는다' 결론을 세운다.
