reasoning:
  source_interpretation: |
    )(제2장 생활 명리 세운 분석" 승진이 되지 않는다. 46. 정유년(丁酉年) 시 일 월 년(남) 己 丁 甲 癸 酉 亥 寅 卯 초봄의 생동하는 기운을 머금은 인월(寅月)의 정화(丁火)로 태어났다. 정유년(丁酉年)에 먼저 천간의 흐름을 살펴보면, 세운 천간의 정화 (丁火)는 일간 정화(丁火)의 비겁 역할을 한다. 세운의 정화(丁火)가 현재 업무를 상징하는 시간의 기토(己土)와 생(生)을 이루면, 기토 (己土)는 움직이면서 월간의 인성인 갑목(甲木)과 합(合)을 하게 된다 이는 인사발령으로 인한 업무 변화로 해석할 수 있다. 이때 세운 천간의 정화(丁,火)는 일간의 공을 나누어 가지려 한다. 특히 월간에 인성 갑목(甲木)이 있는데, 세운의 정화(丁,火)가 들어 오면 갑목(甲木)의 생조(生助)가 일간 정화(丁,火)에 집중되지 않고 경쟁자에게 분산된다. 이는 조직의 윗사람이나 결정권자가 보기에 일간과 경생자의 자별점이 크게 느껴지지 않았을 가능성이 있는 것을 뜻한다. 또한 세운의 정화(丁,火)는 연간의 계수(癸水)와 충()沖)을 한다. 관성은 승진의 명예와 직위를 뜻하는데, 경생자가 나타나 이 명예를 흔들어버리는 형국이다. 이는 승진 심사 과정에서 경생자와의 잡음이 생기거나, 윗선에서 예상하지 못한 변심이 일어나 명예가 훼손되는 결과를 초래한다. 지지의 변화는 승진을 뒷받침할 실질적인 환경이 무너졌음을 의미한다. 세운 지지의 유금(酉金)은 연지의 묘목(卯木)과 묘유충(卯酉)沖)을 일으킨다. 인성이 충()沖)을 당한 것은 승진 대상자 명단에서 밀려나거나, 결정적인 순간에 힘을 잃었음을 의미한다.
consultation:
  practical_guidance: |
    지지의 변화는 승진을 뒷받침할 실질적인 환경이 무너졌음을 의미한다. 세운 지지의 유금(酉金)은 연지의 묘목(卯木)과 묘유충(卯酉)沖)을 일으킨다. 인성이 충()沖)을 당한 것은 승진 대상자 명단에서 밀려나거나, 결정적인 순간에 힘을 잃었음을 의미한다.
golden_answer:
  answer: |
    정유년(丁酉年): 승진이 되지 않는다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 지지의 변화는 승진을 뒷받침할 실질적인 환경이 무너졌음을 의미한다. 세운 지지의 유금(酉金)은 연지의 묘목(卯木)과 묘유충(卯酉)沖)을 일으킨다. 인성이 충()沖)을 당한 것은 승진 대상자 명단에서 밀려나거나, 결정적인 순간에 힘을 잃었음을 의미한다.
brain:
  decision_rule: |
    IF 정유년에 묘유충이 직장 자리와 조직 적응을 직접 건드리고, 관성이 같은 방향으로 압력을 보태면 THEN 결론은 '승진이 되지 않는다' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 직장 자리와 조직 적응 문제로 보이더라도 THEN 관성의 안정성, 식상의 반발, 부서/상사의 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 묘유충이 실제 사건의 문을 여는지 본다."
    - "2순위: 관성이 묘유충을 강화하는지, 완화하는지 본다."
    - "3순위: 관성의 안정성, 식상의 반발, 부서/상사의 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 묘유충과 관성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 직장 자리와 조직 적응에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '승진이 되지 않는다' 사례지만 숨은 판단 구조는 묘유충 하나가 아니라 묘유충과 관성의 결합이다.
    IF 이 결합이 직장 자리와 조직 적응의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 관성이 손상되어 승진 명분이 약하면 THEN 승진 요구보다 현재 역할의 안정성과 평가 자료를 먼저 쌓게 한다.
    IF 식상이 강해 조직과 부딪치면 THEN 말로 설득하기보다 결과물, 보고 체계, 상사 요구사항을 문서화하게 한다.
    BECAUSE 묘유충 신호가 강할수록 능력보다 조직 수용성이 먼저 평가되기 때문이다.
  forbidden_advice:
    - "무조건 퇴사하라, 무조건 버텨라, 반드시 승진한다처럼 조직 선택을 단정하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 己 丁 甲 癸 / 지지: 酉 亥 寅 卯"
    - "세운: 정유년 丁酉年"
    - "핵심 신호 1: 묘유충"
    - "핵심 신호 2: 관성"
    - "판단 영역: 직장 자리와 조직 적응"
    - "우선 판단축: 관성의 안정성, 식상의 반발, 부서/상사의 압박"
    - "결론 방식: 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다"
    - "보조 신호: 인성"
    - "보조 신호: 비겁"
    - "보조 신호: 월간"
    - "보조 신호: 연간"
    - "보조 신호: 세운 천간"
    - "보조 신호: 세운 지지"
