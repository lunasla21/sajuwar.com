    - "그 다음 세운 지지의 유금(酉金)은 연지의 묘목(卯木)과 묘유충(卯酉)沖)을 일으킨다. 라는 명리 근거를 설명한다."
    - "이어 관성은 승진의 명예와 직위를 뜻하는데, 경생자가 나타나 이 명예를 흔들어버리는 형국이다. 흐름을 현실 사건으로 번역한다."
