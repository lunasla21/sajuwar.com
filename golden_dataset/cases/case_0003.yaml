    - "그 다음 그리고 지지는 신금 (申金)이 월(月)의 인목(寅木)과 인신충(寅申)沖)을 하며, 생활 기반이 되는 가정환경에 직접적 변화를 요구한다. 라는 명리 근거를 설명한다."
