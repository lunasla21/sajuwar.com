  practical_guidance: |
    이는 개인의 선택 이전에 이미 흐름이 움직이고 있는 상태다. 월(月)의 인목(寅木)은 일간 갑목(甲木)의 뿌리이자 재산과 건강의 근간인데, 신금(申金)에 충(`/沖)을 당하고 있어, 금(金)을 기운을 제어하는 불(,火)의 방향으로 이동해야 균형이 맞춰지며, 흐름을 안정시키는 중요한 열쇠가 된다 따라서 남쪽을 중심으로 동남 방향은 화(,火)의 기운이 살아 있는 자리이므로, 이사 방향으로 가장 적합하다.
golden_answer:
  answer: |
    병신년(丙申年): 이사 방향 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 이는 개인의 선택 이전에 이미 흐름이 움직이고 있는 상태다. 월(月)의 인목(寅木)은 일간 갑목(甲木)의 뿌리이자 재산과 건강의 근간인데, 신금(申金)에 충(`/沖)을 당하고 있어, 금(金)을 기운을 제어하는 불(,火)의 방향으로 이동해야 균형이 맞춰지며, 흐름을 안정시키는 중요한 열쇠가 된다 따라서 남쪽을 중심으로 동남 방향은 화(,火)의 기운이 살아 있는 자리이므로, 이사 방향으로 가장 적합하다.
brain:
  decision_rule: |
    IF 병신년에 인신충이 심리와 생활 리듬을 직접 건드리고, 식상이 같은 방향으로 압력을 보태면 THEN 결론은 '이사 방향' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 심리와 생활 리듬 문제로 보이더라도 THEN 오행 과열/과습, 인성의 회복력, 비겁의 압력을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 심리와 생활 리듬을 바로 단정하지 말고 조건을 분리해 판단한다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 인신충이 실제 사건의 문을 여는지 본다."
    - "2순위: 식상이 인신충을 강화하는지, 완화하는지 본다."
    - "3순위: 오행 과열/과습, 인성의 회복력, 비겁의 압력 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 인신충과 식상을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 심리와 생활 리듬에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '이사 방향' 사례지만 숨은 판단 구조는 인신충 하나가 아니라 인신충과 식상의 결합이다.
    IF 이 결합이 심리와 생활 리듬의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 오행이 한쪽으로 과열되거나 막히면 THEN 병명 단정보다 수면, 수분, 활동량, 관계 자극을 먼저 낮추게 한다.
    THEN 전문 진단이 필요한 영역은 상담 범위를 넘기지 않고 생활 관리와 보호자 관찰로 연결한다.
    BECAUSE 인신충은 몸과 마음이 감당할 수 있는 리듬을 먼저 보라는 신호다.
  forbidden_advice:
    - "질병을 진단하거나 치료를 대신하는 말로 상담 범위를 넘지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 壬 甲 庚 丙 / 지지: 申 午 寅 午"
    - "세운: 병신년 丙申年"
    - "핵심 신호 1: 인신충"
    - "핵심 신호 2: 식상"
    - "판단 영역: 심리와 생활 리듬"
    - "우선 판단축: 오행 과열/과습, 인성의 회복력, 비겁의 압력"
    - "결론 방식: 심리와 생활 리듬을 바로 단정하지 말고 조건을 분리해 판단한다"
    - "보조 신호: 월주"
    - "보조 신호: 월간"
    - "보조 신호: 합"
    - "보조 신호: 충"
    - "보조 신호: 형"
    - "보조 신호: 생"
