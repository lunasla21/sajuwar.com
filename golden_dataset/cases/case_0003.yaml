golden_answer:
  answer: |
    병신년(丙申年): 이사 방향 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 이는 개인의 선택 이전에 이미 흐름이 움직이고 있는 상태다. 월(月)의 인목(寅木)은 일간 갑목(甲木)의 뿌리이자 재산과 건강의 근간인데, 신금(申金)에 충(`/沖)을 당하고 있어, 금(金)을 기운을 제어하는 불(,火)의 방향으로 이동해야 균형이 맞춰지며, 흐름을 안정시키는 중요한 열쇠가 된다 따라서 남쪽을 중심으로 동남 방향은 화(,火)의 기운이 살아 있는 자리이므로, 이사 방향으로 가장 적합하다.
brain:
  decision_rule: |
    이 사례의 결론은 '이사 방향'이다.
    건강과 심리 판단은 특정 질병 단정이 아니라 오행 과열, 고립, 수면과 생활 리듬의 불균형으로 읽는다.
    이 사례의 판단 근거는 인신충, 식상, 월주, 월간, 합, 충, 형, 생, 丙申의 작용이다.
    원문 판단 근거: 그리고 지지는 신금 (申金)이 월(月)의 인목(寅木)과 인신충(寅申)沖)을 하며, 생활 기반이 되는 가정환경에 직접적 변화를 요구한다.
    원문 판단 근거: 이사 방향 시 일 월 년(여) 壬 甲 庚 丙 申 午 寅 午 병신년(丙申年)의 름을 보면, 천간은 식상인 병화(丙火)가 강하게 떠오르며 월간의 경금(庚金)을 뜨겁게 달군다.
    원문 판단 근거: 따라서 남쪽을 중심으로 동남 방향은 화(,火)의 기운이 살아 있는 자리이므로, 이사 방향으로 가장 적합하다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '이사 방향' 결론을 세운다.
