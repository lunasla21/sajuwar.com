reasoning:
  source_interpretation: |
    61. 정유년(丁酉年) . 인사발령 시 일 월 년(남) 丙 己 甲 戊 寅 酉 子 午 추운 겨울날, 얼어붙은 대지가 따스한 햇볕을 기다리는 기토(己土)로 태어났다. 정유년(丁酉年)에 천간은 정화(丁火)라는 등불이 일간의 소중한 문서와 계약을 뜻하는 인성 역할을 한다. 그리고 세운 지지의 。(酉金)은 월(月)의 자수(子水)와 자유파(子酉破)를 하여 맑은 | ^ 卜이 그 샘물 위에 보석 조각이 떨어져 물길을 어지럽힌다. 파(破)의 작용으로 월간의 관성 갑목(甲木)이 이 소동에 놀라 움직이기 시작한다. 이것은 정든 책상을 뒤로하고 새로운 부서나 지점으로 떠나가야 하는 인사이동의 통지서를 받는 것을 의미한다. 그리고 세운 지지의 유금 (酉金)은 일간의 재능이자 업무를 뜻하는 식상인데, 이것이 일지의 유금(酉金)과 유유자형(酉酉自刑)의 불협화음을 만들어낸다. 보석과 보석이 부딪히는 날카로운 소리가 사무실 안팎을 가득 재운다. 새로운 곳에서의 출발은 화려하지만, 그만큼 업무의 무게는 천근만근이다. 인사이동으로 인해 몸이 열 개라도 모자라는 탄식이 절로 나올 만큼 과중한 업무가 그대를 기다리고 있다. 그리고 일지는 배우자 자리인데, 이곳이 자형(自刑)으로 시끄러우니 부부 사이도 묘한 긴장감이 른다. 만약 부인이 전업주부라면, 부부 사이는 구름이 걷히기 힘들다. 하지만 부인이 사회활동을 한다면 이야기는 달라진다. 부인이 자신의 에너지를 밖으로 분출할 때, 비로소 집안의 탁한 기운이 정화(淨化)되고 부부는 다시금 화창한 햇살이 비치며, 관계 회복의 열쇠가 된다. -128
consultation:
  practical_guidance: |
    만약 부인이 전업주부라면, 부부 사이는 구름이 걷히기 힘들다. 하지만 부인이 사회활동을 한다면 이야기는 달라진다. 부인이 자신의 에너지를 밖으로 분출할 때, 비로소 집안의 탁한 기운이 정화(淨化)되고 부부는 다시금 화창한 햇살이 비치며, 관계 회복의 열쇠가 된다.
golden_answer:
  answer: |
    정유년(丁酉年): 인사발령 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 만약 부인이 전업주부라면, 부부 사이는 구름이 걷히기 힘들다. 하지만 부인이 사회활동을 한다면 이야기는 달라진다. 부인이 자신의 에너지를 밖으로 분출할 때, 비로소 집안의 탁한 기운이 정화(淨化)되고 부부는 다시금 화창한 햇살이 비치며, 관계 회복의 열쇠가 된다.
brain:
  decision_rule: |
    이 사례의 결론은 '인사발령'이다.
    직장 판단은 세운이 관성, 식상, 일지와 어떻게 부딪히는지를 먼저 본다. 관성이 식상에 손상되거나 충을 받으면 직장 자리, 승진, 부서 안정성이 흔들린다는 결론을 낸다.
    이 사례의 판단 근거는 관성, 식상, 인성, 일지, 월간, 세운 지지, 형, 丁酉의 작용이다.
    원문 판단 근거: 파(破)의 작용으로 월간의 관성 갑목(甲木)이 이 소동에 놀라 움직이기 시작한다.
    원문 판단 근거: 그리고 세운 지지의 유금 (酉金)은 일간의 재능이자 업무를 뜻하는 식상인데, 이것이 일지의 유금(酉金)과 유유자형(酉酉自刑)의 불협화음을 만들어낸다.
    원문 판단 근거: 정유년(丁酉年)에 천간은 정화(丁火)라는 등불이 일간의 소중한 문서와 계약을 뜻하는 인성 역할을 한다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '인사발령' 결론을 세운다.
  priority_rule:
    - "고객 질문의 표면 주제보다 세운이 실제로 건드린 십성/궁위를 먼저 본다."
    - "가장 먼저 확인할 신호는 관성이다."
    - "그 다음 식상 흐름이 현실 사건을 강화하거나 완화하는지 본다."
