reasoning:
  source_interpretation: |
    61. 정유년(丁酉年) . 인사발령 시 일 월 년(남) 丙 己 甲 戊 寅 酉 子 午 추운 겨울날, 얼어붙은 대지가 따스한 햇볕을 기다리는 기토(己土)로 태어났다. 정유년(丁酉年)에 천간은 정화(丁火)라는 등불이 일간의 소중한 문서와 계약을 뜻하는 인성 역할을 한다. 그리고 세운 지지의 。(酉金)은 월(月)의 자수(子水)와 자유파(子酉破)를 하여 맑은 | ^ 卜이 그 샘물 위에 보석 조각이 떨어져 물길을 어지럽힌다. 파(破)의 작용으로 월간의 관성 갑목(甲木)이 이 소동에 놀라 움직이기 시작한다. 이것은 정든 책상을 뒤로하고 새로운 부서나 지점으로 떠나가야 하는 인사이동의 통지서를 받는 것을 의미한다. 그리고 세운 지지의 유금 (酉金)은 일간의 재능이자 업무를 뜻하는 식상인데, 이것이 일지의 유금(酉金)과 유유자형(酉酉自刑)의 불협화음을 만들어낸다. 보석과 보석이 부딪히는 날카로운 소리가 사무실 안팎을 가득 재운다. 새로운 곳에서의 출발은 화려하지만, 그만큼 업무의 무게는 천근만근이다. 인사이동으로 인해 몸이 열 개라도 모자라는 탄식이 절로 나올 만큼 과중한 업무가 그대를 기다리고 있다. 그리고 일지는 배우자 자리인데, 이곳이 자형(自刑)으로 시끄러우니 부부 사이도 묘한 긴장감이 른다. 만약 부인이 전업주부라면, 부부 사이는 구름이 걷히기 힘들다. 하지만 부인이 사회활동을 한다면 이야기는 달라진다. 부인이 자신의 에너지를 밖으로 분출할 때, 비로소 집안의 탁한 기운이 정화(淨化)되고 부부는 다시금 화창한 햇살이 비치며, 관계 회복의 열쇠가 된다. -128
consultation:
  practical_guidance: |
    만약 부인이 전업주부라면, 부부 사이는 구름이 걷히기 힘들다. 하지만 부인이 사회활동을 한다면 이야기는 달라진다. 부인이 자신의 에너지를 밖으로 분출할 때, 비로소 집안의 탁한 기운이 정화(淨化)되고 부부는 다시금 화창한 햇살이 비치며, 관계 회복의 열쇠가 된다.
golden_answer:
  answer: |
    정유년(丁酉年): 인사발령 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 만약 부인이 전업주부라면, 부부 사이는 구름이 걷히기 힘들다. 하지만 부인이 사회활동을 한다면 이야기는 달라진다. 부인이 자신의 에너지를 밖으로 분출할 때, 비로소 집안의 탁한 기운이 정화(淨化)되고 부부는 다시금 화창한 햇살이 비치며, 관계 회복의 열쇠가 된다.
brain:
  decision_rule: |
    IF 정유년에 관성이 직장 자리와 조직 적응을 직접 건드리고, 식상이 같은 방향으로 압력을 보태면 THEN 결론은 '인사발령' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 직장 자리와 조직 적응 문제로 보이더라도 THEN 관성의 안정성, 식상의 반발, 부서/상사의 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 관성이 실제 사건의 문을 여는지 본다."
    - "2순위: 식상이 관성을 강화하는지, 완화하는지 본다."
    - "3순위: 관성의 안정성, 식상의 반발, 부서/상사의 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 관성과 식상을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 직장 자리와 조직 적응에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '인사발령' 사례지만 숨은 판단 구조는 관성 하나가 아니라 관성과 식상의 결합이다.
    IF 이 결합이 직장 자리와 조직 적응의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 이동 욕구가 강해도 다음 운에서 적응 구조가 약하면 THEN 즉시 결정보다 부서, 사람, 업무량을 분리해 검토하게 한다.
    THEN 퇴사/이직은 감정의 출구가 아니라 다음 자리의 관성 안정성이 확인될 때 실행하게 한다.
    BECAUSE 관성은 자리 변화 자체보다 변화 후 버틸 구조를 먼저 묻는 신호다.
  forbidden_advice:
    - "무조건 퇴사하라, 무조건 버텨라, 반드시 승진한다처럼 조직 선택을 단정하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 丙 己 甲 戊 / 지지: 寅 酉 子 午"
    - "세운: 정유년 丁酉年"
    - "핵심 신호 1: 관성"
    - "핵심 신호 2: 식상"
    - "판단 영역: 직장 자리와 조직 적응"
    - "우선 판단축: 관성의 안정성, 식상의 반발, 부서/상사의 압박"
    - "결론 방식: 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다"
    - "보조 신호: 인성"
    - "보조 신호: 일지"
    - "보조 신호: 월간"
    - "보조 신호: 세운 지지"
    - "보조 신호: 형"
    - "보조 신호: 丁酉"
