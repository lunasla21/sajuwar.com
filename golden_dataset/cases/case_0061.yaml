    - "마지막에 '인사발령' 결론이 무리한 단정인지, 조절 가능한 선택인지 구분한다."
  consultation_strategy:
    - "먼저 고객 질문을 '인사발령' 흐름으로 정리한다."
    - "그 다음 파(破)의 작용으로 월간의 관성 갑목(甲木)이 이 소동에 놀라 움직이기 시작한다. 라는 명리 근거를 설명한다."
    - "이어 그리고 세운 지지의 유금 (酉金)은 일간의 재능이자 업무를 뜻하는 식상인데, 이것이 일지의 유금(酉金)과 유유자형(酉酉自刑)의 불협화음을 만들어낸다. 흐름을 현실 사건으로 번역한다."
    - "왜 결론이 '인사발령' 쪽으로 좁혀지는지 고객이 납득할 수 있게 말한다."
    - "마지막에는 불안을 키우지 않고 조절 가능한 행동을 제시한다."
  hidden_pattern: |
    겉 질문의 표현은 '인사발령'이다. 실제 핵심은 파(破)의 작용으로 월간의 관성 갑목(甲木)이 이 소동에 놀라 움직이기 시작한다. 특히 관성 신호를 표면 사건보다 먼저 읽는다.
  action_guide: |
    만약 부인이 전업주부라면, 부부 사이는 구름이 걷히기 힘들다. 하지만 부인이 사회활동을 한다면 이야기는 달라진다. 부인이 자신의 에너지를 밖으로 분출할 때, 비로소 집안의 탁한 기운이 정화(淨化)되고 부부는 다시금 화창한 햇살이 비치며, 관계 회복의 열쇠가 된다.
  forbidden_advice:
