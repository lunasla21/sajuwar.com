    - "우선 판단축: 재성 보호, 비겁의 분탈, 문서 조건"
    - "결론 방식: 기대 금액보다 빠져나갈 돈과 조건 손실을 먼저 본다"
    - "보조 신호: 월간"
    - "보조 신호: 연간"
    - "보조 신호: 세운 지지"
