reasoning:
  source_interpretation: |
    41. 정유년(丁酉年) : 믿는 도끼에 발등 찍힌다. 시 일 월 년(남) 丁 丙 庚 甲 酉 申 午 寅 한여름의 뜨거운 태양 아래 태어난 정열의 병화(丙火)이다. 정유년 (丁酉年)에 천간에 매혹적인 촛불인 정화(丁火)가 일렁이며 다가온다. 이 정화(丁火)는 주인공인 병화(丙火) 일간의 재물을 나누어 가지려고 한다. 정화(丁火)가 들어오자마자 시간에 있던 정화(丁,火)와 합세하여 월간의 재물인 경금(庚金)을 향해 뜨거운 열기를 내뿜는다. 일간의 소중한 황금(庚金)이 뜨거운 불길에 녹아내리는 형국이다. 게다가 열기에 놀란 경금(庚金)은 도망칠 곳을 찾다가 연간의 인성 갑목(甲木)을 날카롭게 베어버린다. 이는 믿었던 사람(丁,火) 때문에 소중한 재산(庚金)이 녹아내리고, 그 여파로 일간의 정신적 지주이자 문서인 갑목(甲木)마저 상처를 입는다는 의미이다. 겉으로 다가오는 달콤한 목소리가, 금고 열쇠를 노리는 속임수임을 명심하여야 한다 시선을 땅으로 돌려 지지를 보면 상황은 흥미진진해진다. 세운 지지의 재성 유금(酉金)이 들어와 시(時)의 유금(酉金)과 유유자형 (酉酉自刑)을 일으킨다. 보석과 보석이 부딪히며 날카로운 소리를 내는 형국이다. 형(刑)의 작용은 시간의 정화(丁,火)를 움직이게 만든다. 즉, 땅에서 일어난 재물에 대한 욕심(酉金)이 하늘의 정화(丁火)를 자극하여 일간의 주머니를 털어 가려는 움직임을 더욱더 강하게 한다. 결론적으로 정유년(丁酉年)은 냉철한 계산서가 필요한 해다. 감정에 치우치기보다 철저한 손익 계산과 판단으로 움직여야 하는 흐름이다. - 99
consultation:
  practical_guidance: |
    결론적으로 정유년(丁酉年)은 냉철한 계산서가 필요한 해다. 즉, 땅에서 일어난 재물에 대한 욕심(酉金)이 하늘의 정화(丁火)를 자극하여 일간의 주머니를 털어 가려는 움직임을 더욱더 강하게 한다. 철저한 손익 계산과 판단으로 움직여야 하는 흐름이다.
golden_answer:
  answer: |
    정유년(丁酉年): 믿는 도끼에 발등 찍힌다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 결론적으로 정유년(丁酉年)은 냉철한 계산서가 필요한 해다. 즉, 땅에서 일어난 재물에 대한 욕심(酉金)이 하늘의 정화(丁火)를 자극하여 일간의 주머니를 털어 가려는 움직임을 더욱더 강하게 한다. 철저한 손익 계산과 판단으로 움직여야 하는 흐름이다.
brain:
  decision_rule: |
    IF 정유년에 재성이 돈의 유입과 보존을 직접 건드리고, 인성이 같은 방향으로 압력을 보태면 THEN 결론은 '믿는 도끼에 발등 찍힌다' 쪽으로 세운다.
    BECAUSE 현명역학원식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 돈의 유입과 보존 문제로 보이더라도 THEN 재성 보호, 비겁의 분탈, 문서 조건을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 기대 금액보다 빠져나갈 돈과 조건 손실을 먼저 본다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 재성이 실제 사건의 문을 여는지 본다."
    - "2순위: 인성이 재성을 강화하는지, 완화하는지 본다."
    - "3순위: 재성 보호, 비겁의 분탈, 문서 조건 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 재성과 인성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 돈의 유입과 보존에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '믿는 도끼에 발등 찍힌다' 사례지만 숨은 판단 구조는 재성 하나가 아니라 재성과 인성의 결합이다.
    IF 이 결합이 돈의 유입과 보존의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE 현명역학원 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 재성이 충이나 비겁에 노출되면 THEN 받을 돈을 크게 기대하지 말고 지킬 금액과 포기할 금액을 나누게 한다.
    THEN 말 약속보다 계약서, 세금, 분배 조건을 우선 확인하게 한다.
    BECAUSE 재성이 재물 문제에 작동하면 총액보다 보존 구조가 핵심이다.
  forbidden_advice:
    - "투자 수익, 처분 금액, 세금 결과를 보장하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 丁 丙 庚 甲 / 지지: 酉 申 午 寅"
    - "세운: 정유년 丁酉年"
    - "핵심 신호 1: 재성"
    - "핵심 신호 2: 인성"
