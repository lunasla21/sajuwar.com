    재물 판단은 재성이 드러났는지보다 재성이 보호되고 연결되는지를 본다. 식상생재가 있어도 관성, 비겁, 충이 재성을 흔들면 기대 금액과 실제 결과의 차이를 판단한다.
    이 사례의 판단 근거는 축미충, 관성, 식상, 일지, 월간, 연간, 세운 지지, 합, 충, 형, 생, 乙未, 丙申의 작용이다.
