    직장 판단은 세운이 관성, 식상, 일지와 어떻게 부딪히는지를 먼저 본다. 관성이 식상에 손상되거나 충을 받으면 직장 자리, 승진, 부서 안정성이 흔들린다는 결론을 낸다.
    이 사례의 판단 근거는 인사형, 인오합, 관성, 식상, 인성, 일지, 월간, 연간, 세운 지지, 합, 충, 형, 생, 癸巳의 작용이다.
    원문 판단 근거: 그리고 직장을 뜻하는 월(月)의 관성인 인목(寅木)이 세운 사화(巳,火)와 만나 인사형(寅巳刑)의 불협화음을 일으킨다.
    원문 판단 근거: 또한 인오합(寅午合)으로 거대한 불바다(火局)가 형성된다.
    원문 판단 근거: 관성이 형(刑)을 맞으니 직장에 사표를 던지고 야인(野人)으로 돌아 가려는 마음이 굴뚝같다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '퇴사하고 사업하려고 한다' 결론을 세운다.
