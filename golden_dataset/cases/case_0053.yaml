reasoning:
  source_interpretation: |
    )(제2장 생활 명리 세운 분석)4 53. 계사년(癸巳年) : 퇴사하고 사업하려고 한다. 시 일 월 년(남) 壬 戊 戊 庚 戌 子 寅 子 초봄의 기운이 서린 인월(寅月)의 광활한 대지이자, 산맥의 기상을 무토(戊土)로 태어났다. 계사년(癸巳年)에 하늘에서는 달콤한 빗물인 계수(癸水) 재물이 내려온다. 이 비는 월간의 무토(戊土)와 합(合)을 형성한다, 이는 직장에서의 봉급이 중단될 수 있음을 의미한다 그리고 직장을 뜻하는 월(月)의 관성인 인목(寅木)이 세운 사화(巳,火)와 만나 인사형(寅巳刑)의 불협화음을 일으킨다. 관성이 형(刑)을 맞으니 직장에 사표를 던지고 야인(野人)으로 돌아 가려는 마음이 굴뚝같다. 가장 조심해야 할 고비는 갑오년(甲午年) 이다. 천간에 관성인 갑목(甲木)이 일거리를 많게 해주는 연간의 식상 경금(庚金)과 충()沖)을 한다. 이는 손님의 발길은 뚝 끊기고, 거래처와 인연은 박해지는 것을 의미한다. 또한 세운 지지의 인성 오화(午,火)는 연지와 일지의 재물인 자수(子水)와 충(沖)의 싸움이 벌어진다. 계사년(癸巳年)에 사업을 시작했다가는 갑오년(甲午年)에 돈 때문에 밤잠을 설치며 눈물 젖은 빵을 먹게 된다. 또한 인오합(寅午合)으로 거대한 불바다(火局)가 형성된다. 일간의 배우자인 일지 자수(子水)는 거센 불길을 끄기 위해 온몸을 던져 분투하니, 집안은 평온할 날이 없고 배우자의 고생은 필설로 다하기 어렵다. 따라서 지금 당장은 직장생활이 답답하고 벗어나고 싶겠지만, 마음을 다스리며 당분간 직장에 몸을 담고 안정을 취하는 것이, 최상의 선택이 될 것이다.
consultation:
  practical_guidance: |
    가장 조심해야 할 고비는 갑오년(甲午年) 이다. 따라서 지금 당장은 직장생활이 답답하고 벗어나고 싶겠지만, 마음을 다스리며 당분간 직장에 몸을 담고 안정을 취하는 것이, 최상의 선택이 될 것이다.
golden_answer:
  answer: |
    계사년(癸巳年): 퇴사하고 사업하려고 한다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 가장 조심해야 할 고비는 갑오년(甲午年) 이다. 따라서 지금 당장은 직장생활이 답답하고 벗어나고 싶겠지만, 마음을 다스리며 당분간 직장에 몸을 담고 안정을 취하는 것이, 최상의 선택이 될 것이다.
brain:
  decision_rule: |
    IF 계사년에 인사형이 직장 자리와 조직 적응을 직접 건드리고, 인오합이 같은 방향으로 압력을 보태면 THEN 결론은 '퇴사하고 사업하려고 한다' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 직장 자리와 조직 적응 문제로 보이더라도 THEN 관성의 안정성, 식상의 반발, 부서/상사의 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 인사형이 실제 사건의 문을 여는지 본다."
    - "2순위: 인오합이 인사형을 강화하는지, 완화하는지 본다."
    - "3순위: 관성의 안정성, 식상의 반발, 부서/상사의 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 인사형과 인오합을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 직장 자리와 조직 적응에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '퇴사하고 사업하려고 한다' 사례지만 숨은 판단 구조는 인사형 하나가 아니라 인사형과 인오합의 결합이다.
    IF 이 결합이 직장 자리와 조직 적응의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 이동 욕구가 강해도 다음 운에서 적응 구조가 약하면 THEN 즉시 결정보다 부서, 사람, 업무량을 분리해 검토하게 한다.
    THEN 퇴사/이직은 감정의 출구가 아니라 다음 자리의 관성 안정성이 확인될 때 실행하게 한다.
    BECAUSE 인사형은 자리 변화 자체보다 변화 후 버틸 구조를 먼저 묻는 신호다.
  forbidden_advice:
    - "무조건 퇴사하라, 무조건 버텨라, 반드시 승진한다처럼 조직 선택을 단정하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
