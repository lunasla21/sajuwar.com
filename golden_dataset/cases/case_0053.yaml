golden_answer:
  answer: |
    계사년(癸巳年): 퇴사하고 사업하려고 한다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 가장 조심해야 할 고비는 갑오년(甲午年) 이다. 따라서 지금 당장은 직장생활이 답답하고 벗어나고 싶겠지만, 마음을 다스리며 당분간 직장에 몸을 담고 안정을 취하는 것이, 최상의 선택이 될 것이다.
