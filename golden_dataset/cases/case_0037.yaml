golden_answer:
  answer: |
    정유년(丁酉年): 가게 처분 금액은 눈물의 헐값이다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 이 해는 큰 흙의 기운이 덮쳐오는 해인데, 이때는 제대로 된 직장이나 수입이 짭짤한 새로운 가게를 만나기가 하늘의 별 따기 보다 술토(戌土)와 인목(寅木)이 인술합(寅戌合) 화국(火局)을 하여 시간의 재물 경금(庚金)이 극(剋)을 당하므로 일간을 기다리는 것은 메마른 땅일 뿐이다. 즉, 지금의 가게를 성급히 정리하고 나면 한동안 경제적 가뭄을 견뎌야 하는 고단한 방랑자가 될 수 있다
