reasoning:
  source_interpretation: |
    가게 처분 금액은 눈물의 헐값이다. 37. 정유년(丁酉年) 시 일 월 년(여) 庚 丙 壬 丁 寅 辰 寅 未 초봄의 활기찬 기운을 품고 태어난 정열의 병화(丙火)이다. 정유년 (丁酉年)에 하늘의 풍경을 살펴보면, 정화(丁火) 불꽃 하나가 날아와 주인공인 병화(丙火)의 비겁 노릇을 자처한다. 이 정화(丁火)는 일간의 생업이자 가게를 상징하는 월간의 임수(壬水)와 정임합(丁壬合)을 한다. 이 합(合)의 기운에 일간의 마음O 흔들리기 시작한다. 현재의 터전을 정리하고 새로운 길을 모색하려는 충동이 점점 강해진다. 하지만 정화(丁,火)의 활약은 여기서 멈추지 않고 재물 경금(庚金)을 사정없이 녹여버린다. 재물(庚金)이 불(丁,火)에 녹아내리니, 마음 이미 가게 문을 닫는 쪽으로 기울어 있다. 가게를 내놓으면 계약은 성사될 운이다. 하지만 낭만적인 기대와는 달리 일간이 마음속으로 품었던 금액은 연기처럼 사라지고, 기대보다 적은 액수만이 일간의 손에 쥐어질 가능성이 크다. 즉, 눈물의 헐값 처분이 될 수 있다 그렇다면 가게를 처분한 뒤의 다가오는 무술년(戊戌年)도 그리 관대 하지 않다. 이 해는 큰 흙의 기운이 덮쳐오는 해인데, 이때는 제대로 된 직장이나 수입이 짭짤한 새로운 가게를 만나기가 하늘의 별 따기 보다 어렵다. 술토(戌土)와 인목(寅木)이 인술합(寅戌合) 화국(火局)을 하여 시간의 재물 경금(庚金)이 극(剋)을 당하므로 일간을 기다리는 것은 메마른 땅일 뿐이다. 즉, 지금의 가게를 성급히 정리하고 나면 한동안 경제적 가뭄을 견뎌야 하는 고단한 방랑자가 될 수 있다 - 92 _
consultation:
  practical_guidance: |
    이 해는 큰 흙의 기운이 덮쳐오는 해인데, 이때는 제대로 된 직장이나 수입이 짭짤한 새로운 가게를 만나기가 하늘의 별 따기 보다 술토(戌土)와 인목(寅木)이 인술합(寅戌合) 화국(火局)을 하여 시간의 재물 경금(庚金)이 극(剋)을 당하므로 일간을 기다리는 것은 메마른 땅일 뿐이다. 즉, 지금의 가게를 성급히 정리하고 나면 한동안 경제적 가뭄을 견뎌야 하는 고단한 방랑자가 될 수 있다
golden_answer:
  answer: |
    정유년(丁酉年): 가게 처분 금액은 눈물의 헐값이다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 이 해는 큰 흙의 기운이 덮쳐오는 해인데, 이때는 제대로 된 직장이나 수입이 짭짤한 새로운 가게를 만나기가 하늘의 별 따기 보다 술토(戌土)와 인목(寅木)이 인술합(寅戌合) 화국(火局)을 하여 시간의 재물 경금(庚金)이 극(剋)을 당하므로 일간을 기다리는 것은 메마른 땅일 뿐이다. 즉, 지금의 가게를 성급히 정리하고 나면 한동안 경제적 가뭄을 견뎌야 하는 고단한 방랑자가 될 수 있다
brain:
  decision_rule: |
    IF 정유년에 화국이 사업장, 계약, 운영 지속성을 직접 건드리고, 비겁이 같은 방향으로 압력을 보태면 THEN 결론은 '가게 처분 금액은 눈물의 헐값이다' 쪽으로 세운다.
    BECAUSE 현명역학원식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 사업장, 계약, 운영 지속성 문제로 보이더라도 THEN 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 매출 욕심보다 자리, 계약, 비용 누수가 먼저 문제 된다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 화국이 실제 사건의 문을 여는지 본다."
    - "2순위: 비겁이 화국을 강화하는지, 완화하는지 본다."
    - "3순위: 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 화국과 비겁을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 사업장, 계약, 운영 지속성에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '가게 처분 금액은 눈물의 헐값이다' 사례지만 숨은 판단 구조는 화국 하나가 아니라 화국과 비겁의 결합이다.
    IF 이 결합이 사업장, 계약, 운영 지속성의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE 현명역학원 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 재성은 보이나 자리나 계약궁이 흔들리면 THEN 확장보다 고정비, 계약 조건, 회수 가능 금액을 먼저 줄이게 한다.
    THEN 새 투자보다 손실 한도, 철수 기준, 계약 문구를 먼저 정하게 한다.
    BECAUSE 화국이 사업 사건으로 드러날 때는 돈을 버는 힘보다 돈이 새는 통로가 더 먼저 현실화되기 때문이다.
  forbidden_advice:
    - "대박, 무조건 확장, 반드시 계약 성사처럼 욕망을 키우는 표현을 하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 庚 丙 壬 丁 / 지지: 寅 辰 寅 未"
    - "세운: 정유년 丁酉年"
    - "핵심 신호 1: 화국"
    - "핵심 신호 2: 비겁"
    - "판단 영역: 사업장, 계약, 운영 지속성"
    - "우선 판단축: 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합"
    - "결론 방식: 매출 욕심보다 자리, 계약, 비용 누수가 먼저 문제 된다"
    - "보조 신호: 월간"
    - "보조 신호: 합"
    - "보조 신호: 충"
    - "보조 신호: 극"
