golden_answer:
  answer: |
    정유년(丁酉年): 가게 처분 금액은 눈물의 헐값이다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 이 해는 큰 흙의 기운이 덮쳐오는 해인데, 이때는 제대로 된 직장이나 수입이 짭짤한 새로운 가게를 만나기가 하늘의 별 따기 보다 술토(戌土)와 인목(寅木)이 인술합(寅戌合) 화국(火局)을 하여 시간의 재물 경금(庚金)이 극(剋)을 당하므로 일간을 기다리는 것은 메마른 땅일 뿐이다. 즉, 지금의 가게를 성급히 정리하고 나면 한동안 경제적 가뭄을 견뎌야 하는 고단한 방랑자가 될 수 있다
brain:
  decision_rule: |
    이 사례의 결론은 '가게 처분 금액은 눈물의 헐값이다'이다.
    사업 판단은 재성, 식상, 월주와 세운의 충합을 함께 본다. 돈이 생기는 모양보다 돈이 머무는 구조와 가게 자리, 계약 흐름이 살아 있는지를 우선 판단한다.
    이 사례의 판단 근거는 화국, 비겁, 월간, 합, 충, 극, 생, 丁酉, 戊戌의 작용이다.
    원문 판단 근거: 술토(戌土)와 인목(寅木)이 인술합(寅戌合) 화국(火局)을 하여 시간의 재물 경금(庚金)이 극(剋)을 당하므로 일간을 기다리는 것은 메마른 땅일 뿐이다.
    원문 판단 근거: 정유년 (丁酉年)에 하늘의 풍경을 살펴보면, 정화(丁火) 불꽃 하나가 날아와 주인공인 병화(丙火)의 비겁 노릇을 자처한다.
    원문 판단 근거: 이 정화(丁火)는 일간의 생업이자 가게를 상징하는 월간의 임수(壬水)와 정임합(丁壬合)을 한다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '가게 처분 금액은 눈물의 헐값이다' 결론을 세운다.
