reasoning:
  source_interpretation: |
    " 관재구설(官災口舌)과 소송(言斥訟) 54. 정유년(丁酉年) 시 일 월 년(남) 壬 戊 甲 庚 子 寅 申 戌 가을의 결실을 앞둔 신월(申月)의 거대한 산맥, 무토(戊土)의 기운을 가지고 태어났다. 정유년(丁酉年)에 천간에서 정화(丁火)라는 인성인 등불이 날아와 연간의 식상인 경금(庚金)을 뜨거운 열기로 다스린다. 여기까지는 일간의 재능을 정교하게 다듬는 훈육처럼 보인다. 나아가 정화(丁,火)는 시간에 도도하게 흐르는 재물인 임수(壬水)에 합(合)의 손길을 내민다. 일간의 눈에는 이 모습이 대박 투자나 횡재수라는 이름의 화려한 무지개처럼 보였을 것이다. 하지만 운명의 장난은 지지에서 시작된다. 세운 지지의 식상인 유금 (酉金)이 시(時)의 자수(子水)와 파(破)를 하여 불협화음을 만들어낸다. 맑은 샘물(子水)에 날카로운 보석(酉金)이 떨어져 물길을 어지럽히는 형상이다. 이 파(破)의 작용으로 정임합(丁壬合)의 결합은 순식간에 깨져버린다. 겉으로는 합(合)이 되어 재물이 들어올 것처럼 보였으나, 실상은 속 빈 강정이었던 셈이다. 결론적으로 일간은 기꺼이 지갑을 열어 과감한 투자를 감행하지만 (丁壬合), 자유파(子酉破)로 기초가 흔들리니, 새로운 일을 벌이기보다 현재 가지고 있는 것을 지키는 것이 옳다. 누군가 동업이나 투자를 제안한다면 올해는 멋진 핑계로 우아하게 거절해야 한다. 관재구설 (官災口舌)과 소송(訴訟) 비용으로 나갈 돈으로 차라리 일간 자신을 위한 근사한 여행을 떠나는 것이 진정한 낭만이다.
consultation:
  practical_guidance: |
    결론적으로 일간은 기꺼이 지갑을 열어 과감한 투자를 감행하지만 (丁壬合), 자유파(子酉破)로 기초가 흔들리니, 새로운 일을 벌이기보다 누군가 동업이나 투자를 제안한다면 올해는 멋진 핑계로 우아하게 거절해야 한다.
golden_answer:
  answer: |
    정유년(丁酉年): 관재구설과 소송 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 결론적으로 일간은 기꺼이 지갑을 열어 과감한 투자를 감행하지만 (丁壬合), 자유파(子酉破)로 기초가 흔들리니, 새로운 일을 벌이기보다 누군가 동업이나 투자를 제안한다면 올해는 멋진 핑계로 우아하게 거절해야 한다.
brain:
  decision_rule: |
    IF 정유년에 식상이 돈의 유입과 보존을 직접 건드리고, 인성이 같은 방향으로 압력을 보태면 THEN 결론은 '관재구설과 소송' 쪽으로 세운다.
    BECAUSE 현명역학원식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 돈의 유입과 보존 문제로 보이더라도 THEN 재성 보호, 비겁의 분탈, 문서 조건을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 기대 금액보다 빠져나갈 돈과 조건 손실을 먼저 본다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 식상이 실제 사건의 문을 여는지 본다."
    - "2순위: 인성이 식상을 강화하는지, 완화하는지 본다."
    - "3순위: 재성 보호, 비겁의 분탈, 문서 조건 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 식상과 인성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 돈의 유입과 보존에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '관재구설과 소송' 사례지만 숨은 판단 구조는 식상 하나가 아니라 식상과 인성의 결합이다.
    IF 이 결합이 돈의 유입과 보존의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE 현명역학원 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 재성이 충이나 비겁에 노출되면 THEN 받을 돈을 크게 기대하지 말고 지킬 금액과 포기할 금액을 나누게 한다.
    THEN 말 약속보다 계약서, 세금, 분배 조건을 우선 확인하게 한다.
    BECAUSE 식상이 재물 문제에 작동하면 총액보다 보존 구조가 핵심이다.
  forbidden_advice:
    - "투자 수익, 처분 금액, 세금 결과를 보장하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 壬 戊 甲 庚 / 지지: 子 寅 申 戌"
