    정유년(丁酉年): 관재구설과 소송 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 결론적으로 일간은 기꺼이 지갑을 열어 과감한 투자를 감행하지만 (丁壬合), 자유파(子酉破)로 기초가 흔들리니, 새로운 일을 벌이기보다 누군가 동업이나 투자를 제안한다면 올해는 멋진 핑계로 우아하게 거절해야 한다.
