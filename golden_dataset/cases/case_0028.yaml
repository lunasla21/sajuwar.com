reasoning:
  source_interpretation: |
    28. 임진년(壬辰年) : 회사를 퇴사한 이유 시 일 월 년(남) 丙 甲 壬 壬 寅 申 子 戌 이 사주의 주인공은 갑목(甲木) 일간으로, 한겨울인 자월(子月)에 태어났다. 연간과 월간에 임수(壬水)가 나란히 있어 마치 거대한 호수 위에 서 있는 외로운 나무의 형상이다. 다행히 시주의 병인(丙寅)이 따뜻한 햇볕과 뿌리가 되어주어 조후(調候)를 맞추고 있지만, 수(水) 기운이 0H우 강해 늘 떠남과 변화에 대한 잠재적 에너지를 품고 있다. 평온하던 삶에 큰 균열이 생긴 것은 임진년(壬辰年)이었다. 천간으로 임수(壬水)가 들어오며 수국(水局)의 기세가 정점에 달했고, 지지는 재물인 진토(辰土)가 연지의 술토(戌土)와 진술충(辰戌)沖)을 한다. 지지의 충(i中)은 파괴만을 의미하지는 않는다. 그것은 잠자고 있던 기운을 깨우는 것(動)이기도 하다. 연지의 술토(戌土)는 재물을 뜻하는 공간이다. 진토(辰土)라는 새로우 톩이 들어와 이를 충격하자, 재물의 터전이 요동치기 시작했다. 이는 현실적인 보상 체계나 직업적 환경에 대한 회의감으로 발현된다. 더 결정적인 것은 진술충(辰戌沖)의 여파로 술중 신금(戌中 辛金)이 튀어나오며, 견고했던 조직과 인연이 뿌리째 흔들리는 결과를 초래 했다. 결국 임진년(壬辰年)은 재물의 변화로 마음이 떠나고, 관성의 요동으로 인해 내가 몸담았던 자리가 위태로워 회사를 떠나게 된다 이는 사주에 가득한 수(水)의 기운이 진토(辰土)라는 댐을 만나 새로운 물길을 틀기 위해 거쳐야만 했던 필연적인 진통이었다. - 76
consultation:
  practical_guidance: |
    결국 임진년(壬辰年)은 재물의 변화로 마음이 떠나고, 관성의 요동으로 인해 내가 몸담았던 자리가 위태로워 회사를 떠나게 된다 더 결정적인 것은 진술충(辰戌沖)의 여파로 술중 신금(戌中 辛金)이 튀어나오며, 견고했던 조직과 인연이 뿌리째 흔들리는 결과를 초래 했다. 이는 사주에 가득한 수(水)의 기운이 진토(辰土)라는 댐을 만나 새로운 물길을 틀기 위해 거쳐야만 했던 필연적인 진통이었다.
golden_answer:
  answer: |
    임진년(壬辰年): 회사를 퇴사한 이유 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 결국 임진년(壬辰年)은 재물의 변화로 마음이 떠나고, 관성의 요동으로 인해 내가 몸담았던 자리가 위태로워 회사를 떠나게 된다 더 결정적인 것은 진술충(辰戌沖)의 여파로 술중 신금(戌中 辛金)이 튀어나오며, 견고했던 조직과 인연이 뿌리째 흔들리는 결과를 초래 했다. 이는 사주에 가득한 수(水)의 기운이 진토(辰土)라는 댐을 만나 새로운 물길을 틀기 위해 거쳐야만 했던 필연적인 진통이었다.
brain:
  decision_rule: |
    IF 임진년에 진술충이 직장 자리와 조직 적응을 직접 건드리고, 수국이 같은 방향으로 압력을 보태면 THEN 결론은 '회사를 퇴사한 이유' 쪽으로 세운다.
    BECAUSE 현명역학원식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 직장 자리와 조직 적응 문제로 보이더라도 THEN 관성의 안정성, 식상의 반발, 부서/상사의 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 진술충이 실제 사건의 문을 여는지 본다."
    - "2순위: 수국이 진술충을 강화하는지, 완화하는지 본다."
    - "3순위: 관성의 안정성, 식상의 반발, 부서/상사의 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 진술충과 수국을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 직장 자리와 조직 적응에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '회사를 퇴사한 이유' 사례지만 숨은 판단 구조는 진술충 하나가 아니라 진술충과 수국의 결합이다.
    IF 이 결합이 직장 자리와 조직 적응의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE 현명역학원 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 이동 욕구가 강해도 다음 운에서 적응 구조가 약하면 THEN 즉시 결정보다 부서, 사람, 업무량을 분리해 검토하게 한다.
    THEN 퇴사/이직은 감정의 출구가 아니라 다음 자리의 관성 안정성이 확인될 때 실행하게 한다.
    BECAUSE 진술충은 자리 변화 자체보다 변화 후 버틸 구조를 먼저 묻는 신호다.
  forbidden_advice:
    - "무조건 퇴사하라, 무조건 버텨라, 반드시 승진한다처럼 조직 선택을 단정하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 丙 甲 壬 壬 / 지지: 寅 申 子 戌"
    - "세운: 임진년 壬辰年"
    - "핵심 신호 1: 진술충"
    - "핵심 신호 2: 수국"
    - "판단 영역: 직장 자리와 조직 적응"
    - "우선 판단축: 관성의 안정성, 식상의 반발, 부서/상사의 압박"
    - "결론 방식: 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다"
    - "보조 신호: 관성"
    - "보조 신호: 월간"
    - "보조 신호: 연간"
    - "보조 신호: 충"
    - "보조 신호: 형"
    - "보조 신호: 생"
