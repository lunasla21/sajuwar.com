golden_answer:
  answer: |
    임진년(壬辰年): 회사를 퇴사한 이유 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 결국 임진년(壬辰年)은 재물의 변화로 마음이 떠나고, 관성의 요동으로 인해 내가 몸담았던 자리가 위태로워 회사를 떠나게 된다 더 결정적인 것은 진술충(辰戌沖)의 여파로 술중 신금(戌中 辛金)이 튀어나오며, 견고했던 조직과 인연이 뿌리째 흔들리는 결과를 초래 했다. 이는 사주에 가득한 수(水)의 기운이 진토(辰土)라는 댐을 만나 새로운 물길을 틀기 위해 거쳐야만 했던 필연적인 진통이었다.
brain:
  decision_rule: |
    이 사례의 결론은 '회사를 퇴사한 이유'이다.
    직장 판단은 세운이 관성, 식상, 일지와 어떻게 부딪히는지를 먼저 본다. 관성이 식상에 손상되거나 충을 받으면 직장 자리, 승진, 부서 안정성이 흔들린다는 결론을 낸다.
    이 사례의 판단 근거는 진술충, 수국, 관성, 월간, 연간, 충, 형, 생, 壬辰, 丙寅의 작용이다.
    원문 판단 근거: 천간으로 임수(壬水)가 들어오며 수국(水局)의 기세가 정점에 달했고, 지지는 재물인 진토(辰土)가 연지의 술토(戌土)와 진술충(辰戌)沖)을 한다.
    원문 판단 근거: 결국 임진년(壬辰年)은 재물의 변화로 마음이 떠나고, 관성의 요동으로 인해 내가 몸담았던 자리가 위태로워 회사를 떠나게 된다
    원문 판단 근거: 연간과 월간에 임수(壬水)가 나란히 있어 마치 거대한 호수 위에 서 있는 외로운 나무의 형상이다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '회사를 퇴사한 이유' 결론을 세운다.
