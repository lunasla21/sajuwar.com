    이 사례의 판단 근거는 관성, 재성, 식상, 일지, 월간, 합, 형, 극, 생, 丁酉의 작용이다.
    원문 판단 근거: 또한 유금(酉金)은 관성이지만, 사주 내의 지지들과 만나 강력한 인연의 끈을 형성한다.
