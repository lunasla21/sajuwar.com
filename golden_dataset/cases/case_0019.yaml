golden_answer:
  answer: |
    정유년(丁酉年): 여자 친구 만났다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 결론적으로 정유년(丁酉年)에 여자 친구를 만난 이유는 식상인 정화 (丁火)의 기문을 받아 이성에게 어필하는 매력이 최고조에 달했으며, 또한 진유합(辰酉合)을 통해 진토(辰土)에 담긴 인연이 유금(酉金)의 인도를 받아 일간의 삶 속으로 깊숙이 들어왔기 때문이며, 그리고 식상생재(食傷生財)의 흐름으로 마음속에만 두지 않고 능동적으로 이성에게 다가갔기 때문에 인연이 현실로 구체화한 시기라 볼 수 있다. 하지만 이 시기의 만남은 단순히 스쳐 지나가는 인연이 아님을 명심 해야 한다. 정유년(丁酉年)의 로맨스가 축제로 끝나지 않고, 삶의 든든한 안식처가 되기 위해서는 냉철한 안목이 필요하다. 따라서 정이 깊어지기 전, 상대 사주에 담긴 남편 글자가 온전한지 확인해야 한다. 진정한 재테크는 재물을 불리는 것보다, 그 재물을 함께 지키고 가꾸는 사람을 선택하는 것이다.
brain:
  decision_rule: |
    IF 정유년에 관성이 연애와 외부 관계의 실제 지속성을 직접 건드리고, 재성이 같은 방향으로 압력을 보태면 THEN 결론은 '여자 친구 만났다' 쪽으로 세운다.
    BECAUSE 현명역학원식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 연애와 외부 관계의 실제 지속성 문제로 보이더라도 THEN 일지, 관성/재성, 충합으로 생기는 끌림과 균열을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 끌림이 현실 책임으로 이어질 구조가 있다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 관성이 실제 사건의 문을 여는지 본다."
    - "2순위: 재성이 관성을 강화하는지, 완화하는지 본다."
    - "3순위: 일지, 관성/재성, 충합으로 생기는 끌림과 균열 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 관성과 재성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 연애와 외부 관계의 실제 지속성에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '여자 친구 만났다' 사례지만 숨은 판단 구조는 관성 하나가 아니라 관성과 재성의 결합이다.
    IF 이 결합이 연애와 외부 관계의 실제 지속성의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE 현명역학원 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 끌림은 강하지만 일지나 관성이 흔들리면 THEN 관계 결론을 서두르지 말고 반복될 갈등 패턴을 먼저 보게 한다.
    THEN 상대를 바꾸려 하기보다 거리, 책임, 생활 리듬의 조정 가능성을 확인하게 한다.
    BECAUSE 관성은 감정보다 관계를 담는 구조가 약해질 때 사건으로 나타나기 때문이다.
  forbidden_advice:
    - "헤어져라, 합쳐라, 결혼하라처럼 관계 결정을 대신 내려주지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 戊 甲 甲 丙 / 지지: 辰 午 午 寅"
    - "세운: 정유년 丁酉年"
    - "핵심 신호 1: 관성"
    - "핵심 신호 2: 재성"
    - "판단 영역: 연애와 외부 관계의 실제 지속성"
    - "우선 판단축: 일지, 관성/재성, 충합으로 생기는 끌림과 균열"
    - "결론 방식: 끌림이 현실 책임으로 이어질 구조가 있다"
    - "보조 신호: 식상"
    - "보조 신호: 일지"
    - "보조 신호: 월간"
    - "보조 신호: 합"
    - "보조 신호: 형"
    - "보조 신호: 극"
