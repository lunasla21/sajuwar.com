reasoning:
  source_interpretation: |
    )(제2장 생활 명리 세운 분석)4 56. 경오년(庚午年) . 유부녀와 가출 시 일 월 년(남) 甲 己 壬 丙 子 卯 辰 戌 만물이 소생하는 봄날, 비옥한 진토(辰土)의 기운을 머금고 태어난 기토(己土)이다. 이 사주는 평온해야 할 논밭에 비바람이 몰아치고 강물이 역류하는 격정적인 이미지가 그려진다. 월간에 흐르는 소중한 재물인 임수(壬水) 강물이 지지에서 일어나는 진술충(辰戌)沖)의 거대한 지각 변동에 휘말려 흔들리고 있다. 이는 부모님의 덕(德)이 안개처럼 흩어짐을 의미하니, 자수성가의 아이콘이 되었다. 극적인 순간은 경오년(庚午年)에 찾아왔다. 천간은 경금(庚金) 식상이 직장을 상징하는 관성 갑목(甲木)을 사정없이 극(剋)을 한다. 직업의 변동을 알리는 종소리가 울려 퍼지는 순간이다. 동시에 경금(庚金)은 강물인 임수(壬水)를 금생수(金生水) 한다. 생(生)을 받은 임수(壬水)는 집의 기운을 요동치게 하고, 연간의 문서인 병화(丙火)가 임수(壬水)에 극(剋)을 당하므로, 주거지와 신분에 커다란 변화가 일어난다 정묘년(丁卯年)부터 시작된 로맨스는 경오년(庚午年)에 이르러서는 꽃이 되었다. 결국 일간은 경오년(庚午年) 갑신월 (甲申月), 사표를 던지고 그녀의 손을 잡은 채 가출(家出)을 감행한다. 이 사주는 월간의 재성(財星) 임수(壬水)가 지지의 진술충(辰戌沖)으로 상처를 입고 있으며, 동시에 배우자 자리인 일지의 묘목(卯木)이 자수 (子水)와 형(刑)을 하기에, 여자가 들어오면 가정이 흔들리고, 마음은 안주하지 못해 방황하니 이는 결혼의 실패를 예고하는 전주곡과 같다.
consultation:
  practical_guidance: |
    이 사주는 평온해야 할 논밭에 비바람이 몰아치고 강물이 역류하는 격정적인 이미지가 그려진다. 결국 일간은 경오년(庚午年) 갑신월 (甲申月), 사표를 던지고 그녀의 손을 잡은 채 가출(家出)을 감행한다.
golden_answer:
  answer: |
    경오년(庚午年): 유부녀와 가출 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 이 사주는 평온해야 할 논밭에 비바람이 몰아치고 강물이 역류하는 격정적인 이미지가 그려진다. 결국 일간은 경오년(庚午年) 갑신월 (甲申月), 사표를 던지고 그녀의 손을 잡은 채 가출(家出)을 감행한다.
brain:
  decision_rule: |
    IF 경오년에 진술충이 연애와 외부 관계의 실제 지속성을 직접 건드리고, 관성이 같은 방향으로 압력을 보태면 THEN 결론은 '유부녀와 가출' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 연애와 외부 관계의 실제 지속성 문제로 보이더라도 THEN 일지, 관성/재성, 충합으로 생기는 끌림과 균열을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 감정의 강도보다 책임 구조의 불안정성이 먼저 드러난다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 진술충이 실제 사건의 문을 여는지 본다."
    - "2순위: 관성이 진술충을 강화하는지, 완화하는지 본다."
    - "3순위: 일지, 관성/재성, 충합으로 생기는 끌림과 균열 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 진술충과 관성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 연애와 외부 관계의 실제 지속성에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '유부녀와 가출' 사례지만 숨은 판단 구조는 진술충 하나가 아니라 진술충과 관성의 결합이다.
    IF 이 결합이 연애와 외부 관계의 실제 지속성의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 끌림은 강하지만 일지나 관성이 흔들리면 THEN 관계 결론을 서두르지 말고 반복될 갈등 패턴을 먼저 보게 한다.
    THEN 상대를 바꾸려 하기보다 거리, 책임, 생활 리듬의 조정 가능성을 확인하게 한다.
    BECAUSE 진술충은 감정보다 관계를 담는 구조가 약해질 때 사건으로 나타나기 때문이다.
  forbidden_advice:
    - "헤어져라, 합쳐라, 결혼하라처럼 관계 결정을 대신 내려주지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
