golden_answer:
  answer: |
    정유년(丁酉年): 승진이 되지 않는다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 그러나 승진이 아니라고 서운해할 필요는 없다. 결국 술토(戌土)와 유금(酉金)이 합(合)을 하지 않으니 재물이 크게 불어나는 시기는 아니나, 갑목(甲木) 특유의 끈기로 버티다
brain:
  decision_rule: |
    이 사례의 결론은 '승진이 되지 않는다'이다.
    직장 판단은 세운이 관성, 식상, 일지와 어떻게 부딪히는지를 먼저 본다. 관성이 식상에 손상되거나 충을 받으면 직장 자리, 승진, 부서 안정성이 흔들린다는 결론을 낸다.
    이 사례의 판단 근거는 관성, 재성, 식상, 월간, 세운 천간, 합, 극, 丁酉의 작용이다.
    원문 판단 근거: 이 불꽃은 열정이자 새로운 계획인데, 이 정화(丁,火)가 월간에 있는 관성인 경금 (庚金)을 건드리며 달구기 시작한다.
    원문 판단 근거: 운세의 지지에서 들어온 새로운 근무부서를 뜻하는 관성인 유금(酉金)은 재성인 시(時)의 술토(戌土)와 합(合)을 이루지 못한다.
    원문 판단 근거: 정유년(丁酉年)에 세운 천간에 식상인 정화(丁,火)라는 은은한 등불이 내려온다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '승진이 되지 않는다' 결론을 세운다.
  priority_rule:
    - "고객 질문의 표면 주제보다 세운이 실제로 건드린 십성/궁위를 먼저 본다."
    - "가장 먼저 확인할 신호는 관성이다."
    - "그 다음 재성 흐름이 현실 사건을 강화하거나 완화하는지 본다."
    - "관성의 안정성"
    - "식상견관 여부"
    - "세운 지지의 충합"
    - "마지막에 '승진이 되지 않는다' 결론이 무리한 단정인지, 조절 가능한 선택인지 구분한다."
  consultation_strategy:
    - "먼저 고객 질문을 '승진이 되지 않는다' 흐름으로 정리한다."
    - "그 다음 이 불꽃은 열정이자 새로운 계획인데, 이 정화(丁,火)가 월간에 있는 관성인 경금 (庚金)을 건드리며 달구기 시작한다. 라는 명리 근거를 설명한다."
    - "이어 운세의 지지에서 들어온 새로운 근무부서를 뜻하는 관성인 유금(酉金)은 재성인 시(時)의 술토(戌土)와 합(合)을 이루지 못한다. 흐름을 현실 사건으로 번역한다."
    - "왜 결론이 '승진이 되지 않는다' 쪽으로 좁혀지는지 고객이 납득할 수 있게 말한다."
    - "마지막에는 불안을 키우지 않고 조절 가능한 행동을 제시한다."
  hidden_pattern: |
    겉 질문의 표현은 '승진이 되지 않는다'이다. 실제 핵심은 이 불꽃은 열정이자 새로운 계획인데, 이 정화(丁,火)가 월간에 있는 관성인 경금 (庚金)을 건드리며 달구기 시작한다. 특히 관성 신호를 표면 사건보다 먼저 읽는다.
  action_guide: |
    그러나 승진이 아니라고 서운해할 필요는 없다. 결국 술토(戌土)와 유금(酉金)이 합(合)을 하지 않으니 재물이 크게 불어나는 시기는 아니나, 갑목(甲木) 특유의 끈기로 버티다
  forbidden_advice:
    - "무조건 이직하라, 무조건 버텨라, 반드시 승진한다처럼 단정하지 않는다. 회사 사람을 적으로 규정하거나 불안을 키우는 표현을 쓰지 않는다."
    - "'승진이 되지 않는다'라는 결론을 운명처럼 확정하거나 고객의 선택권을 빼앗는 표현을 쓰지 않는다."
    - "사례 원문을 고객에게 그대로 복사하지 않는다."
    - "불안과 공포를 이용해 결정을 압박하지 않는다."
  evidence:
