    - "재성: 운세의 지지에서 들어온 새로운 근무부서를 뜻하는 관성인 유금(酉金)은 재성인 시(時)의 술토(戌土)와 합(合)을 이루지 못한다."
    - "식상: 정유년(丁酉年)에 세운 천간에 식상인 정화(丁,火)라는 은은한 등불이 내려온다."
    - "월간: 이 불꽃은 열정이자 새로운 계획인데, 이 정화(丁,火)가 월간에 있는 관성인 경금 (庚金)을 건드리며 달구기 시작한다."
    - "세운 천간: 정유년(丁酉年)에 세운 천간에 식상인 정화(丁,火)라는 은은한 등불이 내려온다."
    - "합: 운세의 지지에서 들어온 새로운 근무부서를 뜻하는 관성인 유금(酉金)은 재성인 시(時)의 술토(戌土)와 합(合)을 이루지 못한다."
    - "극"
    - "丁酉: 정유년(丁酉年)에 세운 천간에 식상인 정화(丁,火)라는 은은한 등불이 내려온다."
