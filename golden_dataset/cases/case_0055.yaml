golden_answer:
  answer: |
    정유년(丁酉年): 퇴사하고 사업한 이유 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 결국 일간인 무토(戊土)는 정미월(丁未月)에 정든 동료들과 작별을 고하며 당당히 사표를 던졌다. 이때의 선택은 두려움보다는 확신이 앞선 결단으로서, 자신의 길을 개척하려는 의지가 강하게 드러난 흐름이라 볼 수 있다.
brain:
  decision_rule: |
    이 사례의 결론은 '퇴사하고 사업한 이유'이다.
    직장 판단은 세운이 관성, 식상, 일지와 어떻게 부딪히는지를 먼저 본다. 관성이 식상에 손상되거나 충을 받으면 직장 자리, 승진, 부서 안정성이 흔들린다는 결론을 낸다.
    이 사례의 판단 근거는 사유합, 금국, 식상, 인성, 비겁, 세운 지지, 합, 생, 丁酉, 丁未의 작용이다.
    원문 판단 근거: 이 유금(酉金)이 일간의 있는 인성인 사화(巳火)와 사유합(巳酉合)의 하모니를 이루어 연지에 강력한 금국(金局)의 기운으로 변모한다.
    원문 판단 근거: 세운 지지의 식상 유금(酉金)은 재능이자 직업에 대한 구체적인 계획이다.
    원문 판단 근거: 정유년 (丁酉年)에 하늘의 기운을 살펴보면, 천간에 정화(丁火)라는 안정적인 자격과 문서의 기문인 인성이 날아와 현재 직장의 자리를 의미하는 재물인 임수(壬水)와 정임합(丁壬合)을 이룬다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '퇴사하고 사업한 이유' 결론을 세운다.
  priority_rule:
