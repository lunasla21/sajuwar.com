    - "먼저 고객 질문을 '퇴사하고 사업한 이유' 흐름으로 정리한다."
    - "그 다음 이 유금(酉金)이 일간의 있는 인성인 사화(巳火)와 사유합(巳酉合)의 하모니를 이루어 연지에 강력한 금국(金局)의 기운으로 변모한다. 라는 명리 근거를 설명한다."
    - "이어 세운 지지의 식상 유금(酉金)은 재능이자 직업에 대한 구체적인 계획이다. 흐름을 현실 사건으로 번역한다."
    - "왜 결론이 '퇴사하고 사업한 이유' 쪽으로 좁혀지는지 고객이 납득할 수 있게 말한다."
    - "마지막에는 불안을 키우지 않고 조절 가능한 행동을 제시한다."
  hidden_pattern: |
    겉 질문의 표현은 '퇴사하고 사업한 이유'이다. 실제 핵심은 이 유금(酉金)이 일간의 있는 인성인 사화(巳火)와 사유합(巳酉合)의 하모니를 이루어 연지에 강력한 금국(金局)의 기운으로 변모한다. 특히 사유합 신호를 표면 사건보다 먼저 읽는다.
