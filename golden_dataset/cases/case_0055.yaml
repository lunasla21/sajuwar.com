reasoning:
  source_interpretation: |
    55. 정유년(丁酉年) : 퇴사하고 사업한 이유 시 일 월 년(여) 壬 戊 甲 己 戌 申 戌 巳 풍요로운 가을의 넓은 들판과도 같은 무토(戊土)로 태어났다. 정유년 (丁酉年)에 하늘의 기운을 살펴보면, 천간에 정화(丁火)라는 안정적인 자격과 문서의 기문인 인성이 날아와 현재 직장의 자리를 의미하는 재물인 임수(壬水)와 정임합(丁壬合)을 이룬다. 월급(壬水)도 시간의 좋지만, 이제는 내 사업을 해보고 싶다는 반란이 소용돌이치기 시작한 것이다. 이미 나만의 가게, 브랜드를 꿈꾸는 지도로 가득 차게 된다. 지지를 보면 결심은 더욱 굳건해진다. 세운 지지의 식상 유금(酉金)은 재능이자 직업에 대한 구체적인 계획이다. 이 유금(酉金)이 일간의 있는 인성인 사화(巳火)와 사유합(巳酉合)의 하모니를 이루어 연지에 강력한 금국(金局)의 기운으로 변모한다. 이는 곧 오랫동안 하나의 몸담았던 조직의 경험(巳,火)을 밑거름 삼아, 새로운 사업(酉金)으로 승화하겠다는 강력한 의지의 표명이다. 이렇게 식상의 운이 들어올 때는 현재 일을 하면서 새로운 일을 하려 하거나 현재 일을 그만두고 새로운 일을 하려는 마음의 변화가 생기거나 환경과 계기가 발생한다. 결국 일간인 무토(戊土)는 정미월(丁未月)에 정든 동료들과 작별을 고하며 당당히 사표를 던졌다. 정미월(丁未月)에 비겁 미토(未土)의 힘이 더해지니, 홀로 서려는 배짱이 강한 순간이다 이때의 선택은 두려움보다는 확신이 앞선 결단으로서, 자신의 길을 개척하려는 의지가 강하게 드러난 흐름이라 볼 수 있다.
consultation:
  practical_guidance: |
    결국 일간인 무토(戊土)는 정미월(丁未月)에 정든 동료들과 작별을 고하며 당당히 사표를 던졌다. 이때의 선택은 두려움보다는 확신이 앞선 결단으로서, 자신의 길을 개척하려는 의지가 강하게 드러난 흐름이라 볼 수 있다.
golden_answer:
  answer: |
    정유년(丁酉年): 퇴사하고 사업한 이유 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 결국 일간인 무토(戊土)는 정미월(丁未月)에 정든 동료들과 작별을 고하며 당당히 사표를 던졌다. 이때의 선택은 두려움보다는 확신이 앞선 결단으로서, 자신의 길을 개척하려는 의지가 강하게 드러난 흐름이라 볼 수 있다.
brain:
  decision_rule: |
    IF 정유년에 사유합이 직장 자리와 조직 적응을 직접 건드리고, 금국이 같은 방향으로 압력을 보태면 THEN 결론은 '퇴사하고 사업한 이유' 쪽으로 세운다.
    BECAUSE 현명역학원식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 직장 자리와 조직 적응 문제로 보이더라도 THEN 관성의 안정성, 식상의 반발, 부서/상사의 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 사유합이 실제 사건의 문을 여는지 본다."
    - "2순위: 금국이 사유합을 강화하는지, 완화하는지 본다."
    - "3순위: 관성의 안정성, 식상의 반발, 부서/상사의 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 사유합과 금국을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 직장 자리와 조직 적응에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '퇴사하고 사업한 이유' 사례지만 숨은 판단 구조는 사유합 하나가 아니라 사유합과 금국의 결합이다.
    IF 이 결합이 직장 자리와 조직 적응의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE 현명역학원 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 이동 욕구가 강해도 다음 운에서 적응 구조가 약하면 THEN 즉시 결정보다 부서, 사람, 업무량을 분리해 검토하게 한다.
    THEN 퇴사/이직은 감정의 출구가 아니라 다음 자리의 관성 안정성이 확인될 때 실행하게 한다.
    BECAUSE 사유합은 자리 변화 자체보다 변화 후 버틸 구조를 먼저 묻는 신호다.
  forbidden_advice:
    - "무조건 퇴사하라, 무조건 버텨라, 반드시 승진한다처럼 조직 선택을 단정하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 壬 戊 甲 己 / 지지: 戌 申 戌 巳"
    - "세운: 정유년 丁酉年"
