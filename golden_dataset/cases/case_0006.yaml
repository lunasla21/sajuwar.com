reasoning:
  source_interpretation: |
    )(제2장 생활 명리 세운 분석)4 6. 임진년(壬辰年) 시 일 월 년(남) 甲 甲 丁 甲 戌 寅 卯 子 생동하는 봄기운이 완연한 묘월(卯月)의 대지 위에서, 하늘을 찌를 듯한 기개를 품고 태어난 갑목(甲木)이다. 임진년(壬辰年)에 천간에 지혜와 학문을 상징하는 커다란 강물, 인성인 임수(壬水)가 들어온다 이 강물은 일간의 안식처이자 따스한 촛불인 월간의 정화(丁火)와 만나 정임합(丁壬合)을 나눈다. 마음속에는 더 넓은 세상에서 고 曰 하고 싶다는 유학의 열망이 불꽃처럼 타오른다. 동시에 집을 팔아 여비를 마련하려는 현실적인 계획이 도장(壬水)과 집(丁,火)의 결합으로 나타난다. 결국 정미월(丁未月)에 이르러 계약의 소식이 들려온다. 하지만 땅 밑에서는 세운 지지의 재성 진토(辰土)가 시(時)의 재성인 술토(戌土)와 진술충(辰戌)沖)을 한다. 이는 흙더미가 부딪치니 값이 깎이는 것은 당연하다. 시세보다 조금 낮은 금액에 도장을 찍었겠지만, 더 큰 꿈을 향해 바다를 건넌다. 임진년(壬辰年)에 유학의 꿈은 뜨거웠으나, 계사년(癸巳年)의 운명은 조금 얄궂게 흘러간다. 하늘에서 내리는 빗줄기인 계수(癸水) 인성이 일간의 등불이었던 정화(丁,火)를 정면으로 적신다. 공부를 상징하는 글자가 집을 상징하는 글자를 쳐버리니, 타국에서의 배움은 중단되고 머물던 거처를 떠나야 하는 상황이 벌어진다. 계획했던 마침표는 찍지 못했어도, 낯선 땅에서의 기억은 갑목(甲木)의 가지에 새로운 나이테 하나를 더해주고, 다시 고국의 품으로 돌아오게 된다.
consultation:
  practical_guidance: |
    결국 정미월(丁未月)에 이르러 계약의 소식이 들려온다. 하늘에서 내리는 빗줄기인 계수(癸水) 인성이 일간의 등불이었던 정화(丁,火)를 정면으로 적신다. 공부를 상징하는 글자가 집을 상징하는 글자를 쳐버리니, 타국에서의 배움은 중단되고 머물던 거처를 떠나야 하는 상황이 벌어진다. 계획했던 마침표는 찍지 못했어도, 낯선 땅에서의 기억은 갑목(甲木)의 가지에 새로운 나이테 하나를 더해주고, 다시 고국의 품으로 돌아오게 된다.
golden_answer:
  answer: |
    임진년(壬辰年): 유학 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 결국 정미월(丁未月)에 이르러 계약의 소식이 들려온다. 하늘에서 내리는 빗줄기인 계수(癸水) 인성이 일간의 등불이었던 정화(丁,火)를 정면으로 적신다. 공부를 상징하는 글자가 집을 상징하는 글자를 쳐버리니, 타국에서의 배움은 중단되고 머물던 거처를 떠나야 하는 상황이 벌어진다. 계획했던 마침표는 찍지 못했어도, 낯선 땅에서의 기억은 갑목(甲木)의 가지에 새로운 나이테 하나를 더해주고, 다시 고국의 품으로 돌아오게 된다.
brain:
  decision_rule: |
    IF 임진년에 진술충이 학업 지속력과 시험/진로 선택을 직접 건드리고, 재성이 같은 방향으로 압력을 보태면 THEN 결론은 '유학' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 학업 지속력과 시험/진로 선택 문제로 보이더라도 THEN 인성의 보호, 식상의 산만함, 관성의 규칙성을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 능력 부족보다 리듬 붕괴와 방향 혼선이 먼저 문제 된다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 진술충이 실제 사건의 문을 여는지 본다."
    - "2순위: 재성이 진술충을 강화하는지, 완화하는지 본다."
    - "3순위: 인성의 보호, 식상의 산만함, 관성의 규칙성 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 진술충과 재성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 학업 지속력과 시험/진로 선택에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '유학' 사례지만 숨은 판단 구조는 진술충 하나가 아니라 진술충과 재성의 결합이다.
    IF 이 결합이 학업 지속력과 시험/진로 선택의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 인성의 보호보다 식상/충의 산만함이 강하면 THEN 목표를 키우기보다 공부 장소, 시간표, 시험 전략을 좁히게 한다.
    THEN 진로 결정은 감정 상태가 아니라 유지 가능한 루틴을 기준으로 판단하게 한다.
    BECAUSE 진술충이 학업에 작동하면 재능보다 지속 리듬이 성패를 가른다.
  forbidden_advice:
    - "합격/불합격을 단정하거나 학생의 가능성을 꺾는 표현을 하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 甲 甲 丁 甲 / 지지: 戌 寅 卯 子"
    - "세운: 임진년 壬辰年"
    - "핵심 신호 1: 진술충"
    - "핵심 신호 2: 재성"
    - "판단 영역: 학업 지속력과 시험/진로 선택"
    - "우선 판단축: 인성의 보호, 식상의 산만함, 관성의 규칙성"
    - "결론 방식: 능력 부족보다 리듬 붕괴와 방향 혼선이 먼저 문제 된다"
    - "보조 신호: 인성"
    - "보조 신호: 월간"
    - "보조 신호: 세운 지지"
    - "보조 신호: 합"
    - "보조 신호: 충"
    - "보조 신호: 생"
