    원문 판단 근거: 임진년(壬辰年)에 천간에 지혜와 학문을 상징하는 커다란 강물, 인성인 임수(壬水)가 들어온다
    원문 판단 근거: 이 강물은 일간의 안식처이자 따스한 촛불인 월간의 정화(丁火)와 만나 정임합(丁壬合)을 나눈다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '유학' 결론을 세운다.
