reasoning:
  source_interpretation: |
    " 우울증 75. 계사년(癸巳年) 시 일 월 년(남) 辛 癸 庚 癸 酉 亥 申 酉 초가을에 시원한 금수(金水) 기운을 온몸에 두르고 옹달샘의 맑은 영혼을 지니고 태어난 계수(癸水)다. 계사년(癸巳年)에 사화(巳,火)가 들어와 집을 뜻하는 월(月)의 신금(申金)을 건드리며 사신형(巳申刑)의 불꽃을 튀긴다. 이때 사화(巳,火) 속에 숨어 있던 관성 무토(戊土)가 잠에서 깨어나 연간의 비겁 계수(癸水)와 합(合)을 한다. 이는 정든 캠퍼스를 뒤로하고, 휴학이라는 작별 인사를 의미한다. 그리고 집을 떠나 늠름하게 군(軍)의 문턱을 넘었다. 하지만 군대의 딱딱한 생활은 맑은 일간의 영혼에 예상치 못한 상처를 남겼다. 세운 지지의 사화(巳,火)는 멈추지 않고 넓은 바다인 일지의 해수(亥水)를 향해 사해충(巳亥)沖)의 격랑을 일으킨다. 이 충돌로 사화(巳,火) 속의 경금(庚金)과 해수(亥水) 속에 간직하던 푸른 새싹 갑목(甲木)이 밖으로 나오면서 경금(庚金)이 갑목(甲木)을 사정없이 내리친다. 갑목(甲木)은 인체에서 가냘픈 신경(神經)과 생동하는 기운을 담당 하는데, 이 싹이 상처를 입으니 내면에는 짙은 안개가 끼기 시작한다. 철학적인 고뇌가 깊어지며 예민함은 극(極)에 달한다. 옹달샘의 맑은 물이 횱탕물로 변하듯, 口卜음속에는 우울증이라는 불청객이 찾아온다. 사해충(巳亥)沖)으로 예민해진 신경(甲木)을 달래려면 차가운 금(金) 기운을 녹여줄 따스한 햇볕과 부드러운 음악이 필수다. 안개가 걷히면 계수(癸水)는 영롱하게 빛날 것이며, 회복의 핵심이 된다.
consultation:
  practical_guidance: |
    안개가 걷히면 계수(癸水)는 영롱하게 빛날 것이며, 회복의 핵심이 된다. 옹달샘의 맑은 물이 횱탕물로 변하듯, 口卜음속에는 우울증이라는 불청객이 찾아온다. 사해충(巳亥)沖)으로 예민해진 신경(甲木)을 달래려면 차가운 금(金) 기운을 녹여줄 따스한 햇볕과 부드러운 음악이 필수다.
golden_answer:
  answer: |
    계사년(癸巳年): 우울증 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 안개가 걷히면 계수(癸水)는 영롱하게 빛날 것이며, 회복의 핵심이 된다. 옹달샘의 맑은 물이 횱탕물로 변하듯, 口卜음속에는 우울증이라는 불청객이 찾아온다. 사해충(巳亥)沖)으로 예민해진 신경(甲木)을 달래려면 차가운 금(金) 기운을 녹여줄 따스한 햇볕과 부드러운 음악이 필수다.
brain:
  decision_rule: |
    IF 계사년에 사해충이 심리와 생활 리듬을 직접 건드리고, 관성이 같은 방향으로 압력을 보태면 THEN 결론은 '우울증' 쪽으로 세운다.
    BECAUSE 현명역학원식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 심리와 생활 리듬 문제로 보이더라도 THEN 오행 과열/과습, 인성의 회복력, 비겁의 압력을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 증상을 단정하기보다 과열된 리듬과 고립감을 먼저 본다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 사해충이 실제 사건의 문을 여는지 본다."
    - "2순위: 관성이 사해충을 강화하는지, 완화하는지 본다."
    - "3순위: 오행 과열/과습, 인성의 회복력, 비겁의 압력 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 사해충과 관성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 심리와 생활 리듬에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '우울증' 사례지만 숨은 판단 구조는 사해충 하나가 아니라 사해충과 관성의 결합이다.
    IF 이 결합이 심리와 생활 리듬의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE 현명역학원 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 오행이 한쪽으로 과열되거나 막히면 THEN 병명 단정보다 수면, 수분, 활동량, 관계 자극을 먼저 낮추게 한다.
    THEN 전문 진단이 필요한 영역은 상담 범위를 넘기지 않고 생활 관리와 보호자 관찰로 연결한다.
    BECAUSE 사해충은 몸과 마음이 감당할 수 있는 리듬을 먼저 보라는 신호다.
  forbidden_advice:
    - "질병을 진단하거나 치료를 대신하는 말로 상담 범위를 넘지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 辛 癸 庚 癸 / 지지: 酉 亥 申 酉"
    - "세운: 계사년 癸巳年"
    - "핵심 신호 1: 사해충"
    - "핵심 신호 2: 관성"
    - "판단 영역: 심리와 생활 리듬"
    - "우선 판단축: 오행 과열/과습, 인성의 회복력, 비겁의 압력"
    - "결론 방식: 증상을 단정하기보다 과열된 리듬과 고립감을 먼저 본다"
    - "보조 신호: 비겁"
    - "보조 신호: 일지"
    - "보조 신호: 연간"
    - "보조 신호: 세운 지지"
    - "보조 신호: 합"
    - "보조 신호: 충"
