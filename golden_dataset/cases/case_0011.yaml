    - "대박, 무조건 성공, 곧 큰돈처럼 과장하지 않는다. 손실 가능성을 숨기거나 고객의 욕망을 부추기는 상담을 하지 않는다."
    - "'사업 확장'라는 결론을 운명처럼 확정하거나 고객의 선택권을 빼앗는 표현을 쓰지 않는다."
