    병신년(丙申年): 사업 확장 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 결국 병신년(丙申年)은 성공의 여세를 몰아 자신의 영토를 확장하는 해였다. 결론적으로 병신년(丙申年)의 확장은 장기적 관점에서는 명예를 높이는 필연적인 선택이다. 그리고 무술년(戊戌年)에 진술충(辰戌)沖)의 파도를 대비해 자금을 묶어두는 지혜가 필요하다.
brain:
  decision_rule: |
    이 사례의 결론은 '사업 확장'이다.
    사업 판단은 재성, 식상, 월주와 세운의 충합을 함께 본다. 돈이 생기는 모양보다 돈이 머무는 구조와 가게 자리, 계약 흐름이 살아 있는지를 우선 판단한다.
    이 사례의 판단 근거는 진술충, 인오합, 화국, 관성, 재성, 식상, 인성, 비겁, 일지, 월간, 연간, 세운 지지, 합, 충의 작용이다.
    원문 판단 근거: 그리고 무술년(戊戌年)에 진술충(辰戌)沖)의 파도를 대비해 자금을 묶어두는 지혜가 필요하다.
    원문 판단 근거: 사업확장 시 일 월 년(남) 丙 甲 庚 乙 寅 午 辰 巳 꽃들이 만개하는 봄날, 비옥한 진토(辰土)의 기운을 머금고 태어나 하늘을 향해 뻗은 갑목(甲木)이 지지에 인오합(寅午合) 화국(,火局)을 이루고 천간에 병화(丙火)를 띄워, 자신의 재능을 화려하게 펼치는 식상생재(食傷生財)의 기문이 매우 강한 구조다.
    원문 판단 근거: 신금(申金) 원석이 인오합(寅午合) 화국(火局)의 단련을 받아 나무를 다듬어주니, 거칠었던 사업 체계가 시스템화되면서 규모를 키우고 싶어 하는 욕구가 극에 달하게 된다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '사업 확장' 결론을 세운다.
  priority_rule:
    - "고객 질문의 표면 주제보다 세운이 실제로 건드린 십성/궁위를 먼저 본다."
