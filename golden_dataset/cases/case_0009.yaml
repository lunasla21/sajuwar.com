    - "이어 이 뜨거운 열기는 일간의 명예인 관성 유금 (酉金)을 사정없이 녹여버린다. 흐름을 현실 사건으로 번역한다."
    - "왜 결론이 '구설수와 권고사직' 쪽으로 좁혀지는지 고객이 납득할 수 있게 말한다."
    - "마지막에는 불안을 키우지 않고 조절 가능한 행동을 제시한다."
