    직장 판단은 세운이 관성, 식상, 일지와 어떻게 부딪히는지를 먼저 본다. 관성이 식상에 손상되거나 충을 받으면 직장 자리, 승진, 부서 안정성이 흔들린다는 결론을 낸다.
    이 사례의 판단 근거는 화국, 관성, 비겁, 일지, 연간, 세운 천간, 세운 지지, 합, 형, 甲午의 작용이다.
    원문 판단 근거: 그리고 세운 지지의 오화(午,火)가 일지의 술토(戌土)와 오술합(午戌合) 화국(,火局)을 형성한다.
    원문 판단 근거: 이 뜨거운 열기는 일간의 명예인 관성 유금 (酉金)을 사정없이 녹여버린다.
    원문 판단 근거: 갑오년 (甲午年), 세운 천간에서 일간과 같은 기운 가진 비겁 갑목(甲木)이 등장한다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '구설수와 권고사직' 결론을 세운다.
  priority_rule:
