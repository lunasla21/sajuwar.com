reasoning:
  source_interpretation: |
    구설수와 권고사직 9. 갑오년(甲午年) 시 일 월 년(남) 癸 甲 己 乙 酉 戌 卯 巳 만물이 푸르게 깨어나는 묘월(卯月)에 태어나, 메마른 술토(戌土) 위에서도 꿋꿋하게 가지를 뻗은 기개 높은 갑목(甲木)이다. 갑오년 (甲午年), 세운 천간에서 일간과 같은 기운 가진 비겁 갑목(甲木)이 등장한다. 이 나무는 든든한 동료인 듯 보이지만, 실상은 일간의 재물 기토(己土)와 합(合)을 함과 동시에 연간의 을목(乙木) 넝쿨에 일간 갑목 (甲木)은 휘감기는 형국이며, 주도권이 흐려지는 상황이 펼쳐진다. 직장인이라면 동료들 사이에서 입방아에 오르내리는 구설(口舌)의 바람이 불고, 내 것인 줄 알았던 몫이 타인의 손에 좌우되는 서글픈 광경이 눈 앞에 펼쳐진다. 기가 막힌 것은 갑기합(甲己合)의 영향으로 내가 받아야 할 봉급을 타인이 가져가는 수입의 중단을 의미한다 실제로 일간은 회사 내 동료와의 불화로 인해 가슴에 사직서를 품고 계속 다녀야 하나, 그만두어야 하나를 고민하고 있다. 그리고 세운 지지의 오화(午,火)가 일지의 술토(戌土)와 오술합(午戌合) 화국(,火局)을 형성한다. 이 뜨거운 열기는 일간의 명예인 관성 유금 (酉金)을 사정없이 녹여버린다. 회사에서 지위와 체면이 뜨거운 불길에 녹아내리니, 버틸 재간이 없다. 결국 권고사직이라는 0H서운 칼바람 앞에 야인(野人)으로 돌아가야 하는 퇴사의 길이 완성된다. 갑오년 (甲午年) 퇴사는 운명의 계절이 바뀌었음을 알리는 신호이다. 억지로 불길 속에 머물기보다, 잠시 열기를 식히는 것이 상책이다.
consultation:
  practical_guidance: |
    결국 권고사직이라는 0H서운 칼바람 앞에 야인(野人)으로 돌아가야 하는 퇴사의 길이 완성된다. 억지로 불길 속에 머물기보다, 잠시 열기를 식히는 것이 상책이다.
golden_answer:
  answer: |
    갑오년(甲午年): 구설수와 권고사직 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 결국 권고사직이라는 0H서운 칼바람 앞에 야인(野人)으로 돌아가야 하는 퇴사의 길이 완성된다. 억지로 불길 속에 머물기보다, 잠시 열기를 식히는 것이 상책이다.
brain:
  decision_rule: |
    IF 갑오년에 화국이 직장 자리와 조직 적응을 직접 건드리고, 관성이 같은 방향으로 압력을 보태면 THEN 결론은 '구설수와 권고사직' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 직장 자리와 조직 적응 문제로 보이더라도 THEN 관성의 안정성, 식상의 반발, 부서/상사의 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 화국이 실제 사건의 문을 여는지 본다."
    - "2순위: 관성이 화국을 강화하는지, 완화하는지 본다."
    - "3순위: 관성의 안정성, 식상의 반발, 부서/상사의 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 화국과 관성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 직장 자리와 조직 적응에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '구설수와 권고사직' 사례지만 숨은 판단 구조는 화국 하나가 아니라 화국과 관성의 결합이다.
    IF 이 결합이 직장 자리와 조직 적응의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 이동 욕구가 강해도 다음 운에서 적응 구조가 약하면 THEN 즉시 결정보다 부서, 사람, 업무량을 분리해 검토하게 한다.
    THEN 퇴사/이직은 감정의 출구가 아니라 다음 자리의 관성 안정성이 확인될 때 실행하게 한다.
    BECAUSE 화국은 자리 변화 자체보다 변화 후 버틸 구조를 먼저 묻는 신호다.
  forbidden_advice:
    - "무조건 퇴사하라, 무조건 버텨라, 반드시 승진한다처럼 조직 선택을 단정하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 癸 甲 己 乙 / 지지: 酉 戌 卯 巳"
    - "세운: 갑오년 甲午年"
