    이 사례의 결론은 '이혼하려는 마음'이다.
    결혼과 부부 판단은 배우자궁, 관성, 식상, 충합을 함께 본다. 관계가 이어질 수 있는 구조인지, 압박과 반발이 커지는 구조인지 먼저 판단한다.
    이 사례의 판단 근거는 인신충, 진술충, 관성, 일지, 월간, 세운 지지, 합, 충, 형, 극, 생, 丙申의 작용이다.
