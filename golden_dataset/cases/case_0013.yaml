  answer: |
    병신년(丙申年): 이혼하려는 마음 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 이혼하고 싶은 마음은 굴뚝같으나, 묘하게 얽힌 현실의 끈이 일간을 붙잡아 결국 활용 사는 길을 선택하게 만든다. 진자합(辰子合)으로 당장 이별은 어려우니, 차라리 남편과 적당한 거리 두기가 좋다. 감정이 극단으로 치닫는 순간에는 선택 또한 왜곡되기 쉽기 때문이다. 지금의 답답함은 영원하지 않으며, 결국 지나가는 하나의 과정일 뿐이다. 결국 이 시기는 관계를 끊는 시기가 아니라, 자신을 지키는 법을 배우는 시간이다
brain:
  decision_rule: |
    IF 병신년에 인신충이 배우자궁과 관계 지속성을 직접 건드리고, 진술충이 같은 방향으로 압력을 보태면 THEN 결론은 '이혼하려는 마음' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 배우자궁과 관계 지속성 문제로 보이더라도 THEN 일지 안정성, 관성의 상태, 식상으로 인한 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 감정의 재결합보다 반복될 생활 압박이 더 크다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 인신충이 실제 사건의 문을 여는지 본다."
    - "2순위: 진술충이 인신충을 강화하는지, 완화하는지 본다."
    - "3순위: 일지 안정성, 관성의 상태, 식상으로 인한 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 인신충과 진술충을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 배우자궁과 관계 지속성에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '이혼하려는 마음' 사례지만 숨은 판단 구조는 인신충 하나가 아니라 인신충과 진술충의 결합이다.
    IF 이 결합이 배우자궁과 관계 지속성의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 끌림은 강하지만 일지나 관성이 흔들리면 THEN 관계 결론을 서두르지 말고 반복될 갈등 패턴을 먼저 보게 한다.
    THEN 상대를 바꾸려 하기보다 거리, 책임, 생활 리듬의 조정 가능성을 확인하게 한다.
    BECAUSE 인신충은 감정보다 관계를 담는 구조가 약해질 때 사건으로 나타나기 때문이다.
  forbidden_advice:
    - "헤어져라, 합쳐라, 결혼하라처럼 관계 결정을 대신 내려주지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 丙 甲 甲 壬 / 지지: 寅 戌 辰 子"
    - "세운: 병신년 丙申年"
