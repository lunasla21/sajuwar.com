golden_answer:
  answer: |
    계사년(癸巳年): 승진이 되지 않는다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 하지만 이 비가 야속하게도 그대에게 꼭 필요한 태양, 병화(丙,火)의 빛을 가려버린다. 수분을 섭취하고, 뜨거운 업무의 열기를 식혀술 자신만의 마음의 옹달샘을 찾아 잠시나마 휴식을 취해야 한다. 조직은 결과도 보지만 안정성 또한 중요하게 여기기에, 이 시기에는 보류 판단이 내려지기 쉽다. 현재 위치에서 기반을 다지는 것이 중요하다. 결국 이번 보류는 실패가 아니라, 더 안정된 자리로 가기 위한 준비 과정이다.
brain:
  decision_rule: |
    IF 계사년에 사오미가 직장 자리와 조직 적응을 직접 건드리고, 관성이 같은 방향으로 압력을 보태면 THEN 결론은 '승진이 되지 않는다' 쪽으로 세운다.
    BECAUSE 현명역학원식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 직장 자리와 조직 적응 문제로 보이더라도 THEN 관성의 안정성, 식상의 반발, 부서/상사의 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 사오미가 실제 사건의 문을 여는지 본다."
    - "2순위: 관성이 사오미를 강화하는지, 완화하는지 본다."
    - "3순위: 관성의 안정성, 식상의 반발, 부서/상사의 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 사오미와 관성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 직장 자리와 조직 적응에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '승진이 되지 않는다' 사례지만 숨은 판단 구조는 사오미 하나가 아니라 사오미와 관성의 결합이다.
    IF 이 결합이 직장 자리와 조직 적응의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE 현명역학원 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 관성이 손상되어 승진 명분이 약하면 THEN 승진 요구보다 현재 역할의 안정성과 평가 자료를 먼저 쌓게 한다.
    IF 식상이 강해 조직과 부딪치면 THEN 말로 설득하기보다 결과물, 보고 체계, 상사 요구사항을 문서화하게 한다.
    BECAUSE 사오미 신호가 강할수록 능력보다 조직 수용성이 먼저 평가되기 때문이다.
  forbidden_advice:
    - "무조건 퇴사하라, 무조건 버텨라, 반드시 승진한다처럼 조직 선택을 단정하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 丁 乙 癸 丙 / 지지: 丑 未 巳 午"
