    이 사례의 판단 근거는 합, 형, 생, 庚午의 작용이다.
    원문 판단 근거: 지지의 신금(申金)과 사화(巳,火)가 신사합형(申巳合刑)을 이루고 있어, 기가 막힌 상황이 연출된다.
