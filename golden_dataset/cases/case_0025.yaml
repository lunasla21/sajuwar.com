reasoning:
  source_interpretation: |
    )(제2장 생활 명리 세운 분석)4 25. 경오년(庚午年) . 미혼 . 결혼이 늦어진다. 시 일 월 년(남) 己 甲 壬 甲 巳 辰 申 午 초가을의 결실을 준비하는 신월(申月)의 기운을 머금고, 하늘을 향해 곧게 뻗은 갑목(甲木)으로 태어났다. 이 사주를 가만히 들여다보니, 화려한 꽃들이 만발한 정원을 거니는 고고한 선비의 모습이 그려진다 하지만 그 화려한 정원 속에서 유독 한 꽃에 마음을 정착하지 못하고 방황하는 얄궂은 운명이다. 하늘의 기운을 보니 시간에 여자를 상징 하는 기토(己土)가 당당하게 솟아 있다. 문제는 땅 밑에서 일어나는 은밀한 소동이다. 지지의 신금(申金)과 사화(巳,火)가 신사합형(申巳合刑)을 이루고 있어, 기가 막힌 상황이 연출된다. 처음 여자를 볼 때는 금방이라도 심장을 내어줄 듯 열정이 뜨겁게 타오르지만(合), 이내 그 마음이 칼날처럼 날카로워지며 깎아 내리기 시작한다(刑). 한마디로 여인의 장점보다 단점이 먼저 보이기에 연애는 단편 소설처럼 짧고 강렬하게 끝이 나곤 한다. 이러한 성정 탓에 친구들이 하나둘 가정을 꾸리고 정착할 때, 여전히 홀로 숲을 지키게 된다. 결혼이 상대적으로 늦어지는 것은 그대에게 인연이 없어서가 아니다. 일간의 까다로운 취향과 금방 식어버리는 마음을 온전하게 받아줄 운명적인 대지를 아직 찾지 못했기 때문이다. 경오년(庚午年), 여전히 미혼(未婚)인 것은 나무가 아무 땅에나 뿌리를 내리고 싶지 않다는 무언의 시위와 같다. 하지만 갑목(甲木)의 묵직한 기운은 결국 자신을 감싸 안아줄 따뜻한 흙을 찾아내기 마련이다. - 71
consultation:
  practical_guidance: |
    하지만 갑목(甲木)의 묵직한 기운은 결국 자신을 감싸 안아줄 따뜻한 흙을 찾아내기 마련이다. 일간의 까다로운 취향과 금방 식어버리는 마음을 온전하게 받아줄 운명적인 대지를 아직 찾지 못했기 때문이다. 경오년(庚午年), 여전히 미혼(未婚)인 것은 나무가 아무 땅에나 뿌리를 내리고 싶지 않다는 무언의 시위와 같다.
golden_answer:
  answer: |
    경오년(庚午年): 미혼, 결혼이 늦어진다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 하지만 갑목(甲木)의 묵직한 기운은 결국 자신을 감싸 안아줄 따뜻한 흙을 찾아내기 마련이다. 일간의 까다로운 취향과 금방 식어버리는 마음을 온전하게 받아줄 운명적인 대지를 아직 찾지 못했기 때문이다. 경오년(庚午年), 여전히 미혼(未婚)인 것은 나무가 아무 땅에나 뿌리를 내리고 싶지 않다는 무언의 시위와 같다.
brain:
  decision_rule: |
    IF 경오년에 합이 배우자궁과 관계 지속성을 직접 건드리고, 형이 같은 방향으로 압력을 보태면 THEN 결론은 '미혼, 결혼이 늦어진다' 쪽으로 세운다.
    BECAUSE 현명역학원식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 배우자궁과 관계 지속성 문제로 보이더라도 THEN 일지 안정성, 관성의 상태, 식상으로 인한 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 감정의 재결합보다 반복될 생활 압박이 더 크다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 합이 실제 사건의 문을 여는지 본다."
    - "2순위: 형이 합을 강화하는지, 완화하는지 본다."
    - "3순위: 일지 안정성, 관성의 상태, 식상으로 인한 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 합과 형을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 배우자궁과 관계 지속성에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '미혼, 결혼이 늦어진다' 사례지만 숨은 판단 구조는 합 하나가 아니라 합과 형의 결합이다.
    IF 이 결합이 배우자궁과 관계 지속성의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE 현명역학원 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 끌림은 강하지만 일지나 관성이 흔들리면 THEN 관계 결론을 서두르지 말고 반복될 갈등 패턴을 먼저 보게 한다.
    THEN 상대를 바꾸려 하기보다 거리, 책임, 생활 리듬의 조정 가능성을 확인하게 한다.
    BECAUSE 합은 감정보다 관계를 담는 구조가 약해질 때 사건으로 나타나기 때문이다.
  forbidden_advice:
    - "헤어져라, 합쳐라, 결혼하라처럼 관계 결정을 대신 내려주지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 己 甲 壬 甲 / 지지: 巳 辰 申 午"
    - "세운: 경오년 庚午年"
    - "핵심 신호 1: 합"
    - "핵심 신호 2: 형"
    - "판단 영역: 배우자궁과 관계 지속성"
    - "우선 판단축: 일지 안정성, 관성의 상태, 식상으로 인한 압박"
    - "결론 방식: 감정의 재결합보다 반복될 생활 압박이 더 크다"
    - "보조 신호: 생"
    - "보조 신호: 庚午"
