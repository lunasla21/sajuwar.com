    원문 판단 근거: 이것이 바로 사신합형(巳申合刑)이다.
    원문 판단 근거: 사화(巳火)와 신금(申金)의 만남은 처음에는 끌어당기는 합(合)으로 시작하지만, 결국에는 서로를 깎아내는 형(刑)으로 끝을 맺는다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '부부 재결합하면 고생한다' 결론을 세운다.
