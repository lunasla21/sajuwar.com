brain:
  decision_rule: |
    이 사례의 결론은 '사업 운을 좋게 하는 방법'이다.
    사업 판단은 재성, 식상, 월주와 세운의 충합을 함께 본다. 돈이 생기는 모양보다 돈이 머무는 구조와 가게 자리, 계약 흐름이 살아 있는지를 우선 판단한다.
    이 사례의 판단 근거는 묘유충, 관성, 재성, 식상, 인성, 일지, 월간, 연간, 합, 충, 형, 극, 생, 丁酉의 작용이다.
    원문 판단 근거: 세운의 관성 유금(酉金)은 가게 자리를 뜻하는 시의 묘목(卯木)과 묘유충(卯酉)沖)을 일으키는 동시에, 일지의 유금 (酉金)과 자형(自刑)을 한다.
    원문 판단 근거: 재성(돈)인 토(土)들이 관성(金)으로 변하는 형상이다.
    원문 판단 근거: 결론적으로 정유년(丁酉年)에 사업이 어려운 이유는 사업체 자리를 뜻하는 시(時)의 묘목(卯木)이 세운의 관성 유금(酉金)에 충()沖)을 당해 사업적 기반이 상실되었으며, 또한 합(合)으로 재성(土)이 관성(金)으로 변하면서, 수익이 발생하는 족족 부채 상환이나 운영비로 집행되었다.
    따라서 단순 길흉이 아니라, 위 근거가 고객의 현실 질문과 어떻게 연결되는지를 보고 '사업 운을 좋게 하는 방법' 결론을 세운다.
