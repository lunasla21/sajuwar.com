    - "우선 판단축: 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합"
    - "결론 방식: 사업장, 계약, 운영 지속성을 바로 단정하지 말고 조건을 분리해 판단한다"
    - "보조 신호: 재성"
