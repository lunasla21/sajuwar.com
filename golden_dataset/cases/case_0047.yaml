golden_answer:
  answer: |
    정유년(丁酉年): 가게 운영이 어려운 이유 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 따라서 이를 해석하면, 손님인 비겁 정화(丁火)가 돈(酉金)을 가지고 내 가게를 찾아오지만, 가게 (卯木)가 손님(丁火)과 묘유충(卯酉)沖)을 일으킨다. 비겁(경생자)과 마찰로 인해 가게 평판에 흠집이 나거나, 까다로운 손님과의 시비로 인해 정신적인 스트레스가 심한 흐름이다. 그리고 인성 묘목(卯木)은 가게의 임대 계약서나 운영권, 혹은 자금줄을 의미한다. 이 문서가 충(沖)을 당한 것은 자리 문제로 인한 갈등, 혹은 계약상의 불리한 조건에 가게 운영의 근간이 드 려 으 으 CC 한다.
brain:
  decision_rule: |
    IF 정유년에 묘유충이 사업장, 계약, 운영 지속성을 직접 건드리고, 관성이 같은 방향으로 압력을 보태면 THEN 결론은 '가게 운영이 어려운 이유' 쪽으로 세운다.
    BECAUSE 현명역학원식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 사업장, 계약, 운영 지속성 문제로 보이더라도 THEN 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 매출 욕심보다 자리, 계약, 비용 누수가 먼저 문제 된다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 묘유충이 실제 사건의 문을 여는지 본다."
    - "2순위: 관성이 묘유충을 강화하는지, 완화하는지 본다."
    - "3순위: 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 묘유충과 관성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 사업장, 계약, 운영 지속성에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '가게 운영이 어려운 이유' 사례지만 숨은 판단 구조는 묘유충 하나가 아니라 묘유충과 관성의 결합이다.
    IF 이 결합이 사업장, 계약, 운영 지속성의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE 현명역학원 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 재성은 보이나 자리나 계약궁이 흔들리면 THEN 확장보다 고정비, 계약 조건, 회수 가능 금액을 먼저 줄이게 한다.
    THEN 새 투자보다 손실 한도, 철수 기준, 계약 문구를 먼저 정하게 한다.
    BECAUSE 묘유충이 사업 사건으로 드러날 때는 돈을 버는 힘보다 돈이 새는 통로가 더 먼저 현실화되기 때문이다.
  forbidden_advice:
    - "대박, 무조건 확장, 반드시 계약 성사처럼 욕망을 키우는 표현을 하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 癸 丁 庚 己 / 지지: 卯 未 午 未"
    - "세운: 정유년 丁酉年"
    - "핵심 신호 1: 묘유충"
    - "핵심 신호 2: 관성"
    - "판단 영역: 사업장, 계약, 운영 지속성"
    - "우선 판단축: 재성의 보존력, 식상생재의 지속성, 월주/자리의 충합"
    - "결론 방식: 매출 욕심보다 자리, 계약, 비용 누수가 먼저 문제 된다"
    - "보조 신호: 인성"
    - "보조 신호: 비겁"
    - "보조 신호: 충"
    - "보조 신호: 생"
    - "보조 신호: 丁酉"
