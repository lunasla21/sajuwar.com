reasoning:
  source_interpretation: |
    30. 정유년(丁酉年) . 승진했다. 시 일 월 년(남) 乙 乙 乙 戊 酉 酉 卯 申 정유년(丁酉年)에 천간으로 들어온 식상인 정화(丁火)는 강력한 목(木) 기운들의 에너지를 빼내어 연간의 재물인 무토(戊土)에 힘을 실어주는 식상생재(食傷生財)의 역할을 자처한다. 따라서 상사나 경영진(재성)의 눈에 일간의 기여도가 가장 선명하게 각인되는 시기다. 이 사주의 가장 큰 아킬레스건은 월(月)의 뿌리인 묘목(卯木)과 일지와 시(時)의 관성인 유금(酉金)이 충(沖)을 하여 인정받는 성과와 내부의 불안정이 공존한다. 관성이 내 뿌리를 사정없이 내리지는 형국이므로, 평소 조직 내에서 구설이 많거나 자리가 늘 불안정한 위태로움을 안고 살아간다. 하지만 운세의 지지로 또 하나의 관성인 유금(酉金)이 들어오면서 전세가 역전 된다. 세운의 관성 유금(酉金)이 일지와 시(時)의 유금(酉金)과 유유자형 (酉酉自刑)을 통해 자신의 내부 결속을 다지느라, 오히려 묘목(卯木)을 감정적으로 타격하던 묘유충(卯酉)沖)이 일시적으로 정지된다. 관성끼리의 자형(自刑)은 조직 내부의 인사이동, 부서 개편, 혹은 기존 권력 구도의 재편을 의미한다. 천간에서 식상생재(食傷生財)가 원활히 이루어지고 있으므로, 이 보직 변경은 나에게 더 많은 보상과 권력을 쥐여주는 통로가 된다. 즉, 돈과 명예를 거머쥐고 웃을 수 있는 승진 운이다. 실제로 일간은 식상생재(食傷生財)의 기운이 극대화되는 계묘월 (癸卯月)에 당당히 승진했다. 사주의 치열한 묘유충(卯酉)沖)의 갈등이 운세의 조율을 거쳐 승진이라는 화려한 결실로 귀결된 것이다.
consultation:
  practical_guidance: |
    따라서 상사나 경영진(재성)의 눈에 일간의 기여도가 가장 선명하게 각인되는 시기다. 즉, 돈과 명예를 거머쥐고 웃을 수 있는 승진 운이다. 실제로 일간은 식상생재(食傷生財)의 기운이 극대화되는 계묘월 (癸卯月)에 당당히 승진했다. 사주의 치열한 묘유충(卯酉)沖)의 갈등이 운세의 조율을 거쳐 승진이라는 화려한 결실로 귀결된 것이다.
golden_answer:
  answer: |
    정유년(丁酉年): 승진했다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 따라서 상사나 경영진(재성)의 눈에 일간의 기여도가 가장 선명하게 각인되는 시기다. 즉, 돈과 명예를 거머쥐고 웃을 수 있는 승진 운이다. 실제로 일간은 식상생재(食傷生財)의 기운이 극대화되는 계묘월 (癸卯月)에 당당히 승진했다. 사주의 치열한 묘유충(卯酉)沖)의 갈등이 운세의 조율을 거쳐 승진이라는 화려한 결실로 귀결된 것이다.
brain:
  decision_rule: |
    IF 정유년에 묘유충이 직장 자리와 조직 적응을 직접 건드리고, 관성이 같은 방향으로 압력을 보태면 THEN 결론은 '승진했다' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 직장 자리와 조직 적응 문제로 보이더라도 THEN 관성의 안정성, 식상의 반발, 부서/상사의 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 조직이 요구하는 규칙 안에서 역할이 살아난다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 묘유충이 실제 사건의 문을 여는지 본다."
    - "2순위: 관성이 묘유충을 강화하는지, 완화하는지 본다."
    - "3순위: 관성의 안정성, 식상의 반발, 부서/상사의 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 묘유충과 관성을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 직장 자리와 조직 적응에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '승진했다' 사례지만 숨은 판단 구조는 묘유충 하나가 아니라 묘유충과 관성의 결합이다.
    IF 이 결합이 직장 자리와 조직 적응의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 세운 자극이 강해도 현실 조건이 받쳐주지 않으면 THEN 바로 움직이지 말고 사건이 어느 궁위에서 나타나는지 확인하게 한다.
    THEN 선택지는 실행, 보류, 축소, 정리로 나누어 말한다.
    BECAUSE 묘유충은 길흉보다 사용 순서를 정하라는 신호다.
  forbidden_advice:
    - "무조건 퇴사하라, 무조건 버텨라, 반드시 승진한다처럼 조직 선택을 단정하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 乙 乙 乙 戊 / 지지: 酉 酉 卯 申"
    - "세운: 정유년 丁酉年"
