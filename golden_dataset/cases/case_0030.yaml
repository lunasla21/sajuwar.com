    - "우선 판단축: 관성의 안정성, 식상의 반발, 부서/상사의 압박"
    - "결론 방식: 조직이 요구하는 규칙 안에서 역할이 살아난다"
    - "보조 신호: 재성"
    - "보조 신호: 식상"
