    이 사례의 결론은 '승진했다'이다.
    직장 판단은 세운이 관성, 식상, 일지와 어떻게 부딪히는지를 먼저 본다. 관성이 식상에 손상되거나 충을 받으면 직장 자리, 승진, 부서 안정성이 흔들린다는 결론을 낸다.
    이 사례의 판단 근거는 묘유충, 관성, 재성, 식상, 일지, 연간, 충, 형, 극, 생, 丁酉, 癸卯의 작용이다.
    원문 판단 근거: 세운의 관성 유금(酉金)이 일지와 시(時)의 유금(酉金)과 유유자형 (酉酉自刑)을 통해 자신의 내부 결속을 다지느라, 오히려 묘목(卯木)을 감정적으로 타격하던 묘유충(卯酉)沖)이 일시적으로 정지된다.
    원문 판단 근거: 이 사주의 가장 큰 아킬레스건은 월(月)의 뿌리인 묘목(卯木)과 일지와 시(時)의 관성인 유금(酉金)이 충(沖)을 하여 인정받는 성과와 내부의 불안정이 공존한다.
