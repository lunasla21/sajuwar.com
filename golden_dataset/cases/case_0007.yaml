reasoning:
  source_interpretation: |
    ,(제2장 생활 명리 세운 분석), 7. 병신년(丙申年) : 퇴사하고 사업하려고 한다. 시 일 월 년(남) 乙 甲 癸 丁 丑 申 卯 未 병신년(丙申年)에 세운 천간은 식상인 병화(丙,火) 태양이 솟아오른다. 이 화려한 빛은 연간에 잠자고 있던 업무 에너지, 식상 정화(丁,火)를 건드려 깨우고, 깨어난 정화(丁火)가 월간의 문서이자 계약인 인성 계수(癸水)와 정계충(丁癸沖)을 하며, 이제 이 지겨운 서류 뭉치와는 작별이다. 외치며 가슴속에 품어왔던 사직서를 책상 위에 던지게 되며, 동시에 세운 지지의 관성 신금(申金)이 새로운 일터를 제안한다. 자영업의 꿈이 환상처럼 피어오른다. 하지만 환상은 현실적인 토양 위에서 피어날 때 가장 아름다운 법이다. 사업이란 모름지기 3년에서 5년 정도는 재물의 순풍이 불어와야 하는데, 안타깝게도 기상도를 살펴보면, 병신년(丙申年)에 돛을 올리는 순간 곧바로 암초를 만나며, 이어지는 정유년(丁酉年)에는 이르면 재물의 가뭄이 찾아와 숨이 턱 밑까지 자을라 버티기가 더 어려운 시간이 이어지게 된다. 무술년(戊戌年)은 눈물을 머금고 사업장을 정리해야 하는 시나리오가 기다리고 있다. 병신년(丙申年)의 병화(丙,火)는 달콤한 유혹의 노래를 부르겠지만, 지금은 노래에 취해 성벽 밖으로 나갈 시기가 아니다 사표를 내고 싶은 마음은 굴뚝같겠지만, 사표를 다시 호주머니 깊숙이 집어넣는 것이 진정한 지혜다. 회사는 차가운 바위산일지라도 폭풍우를 막는 든든한 요새(要塞)이기도 하다. 병신년(丙申年)의 에너지는 밖으로 분출하기보다, 조직 안에서 능력을 인정받는 자양분으로 삼아야 한다.
consultation:
  practical_guidance: |
    무술년(戊戌年)은 눈물을 머금고 사업장을 정리해야 하는 시나리오가 기다리고 있다. 사표를 내고 싶은 마음은 굴뚝같겠지만, 사표를 다시 호주머니 깊숙이 집어넣는 것이 진정한 지혜다. 회사는 차가운 바위산일지라도 폭풍우를 막는 든든한 요새(要塞)이기도 하다. 병신년(丙申年)의 에너지는 밖으로 분출하기보다, 조직 안에서 능력을 인정받는 자양분으로 삼아야 한다.
golden_answer:
  answer: |
    병신년(丙申年): 퇴사하고 사업하려고 한다 사례의 핵심 답변은 세운이 원국의 어떤 글자를 건드리는지 먼저 보고, 그 흐름이 현실 사건으로 어떻게 드러나는지 연결하는 것이다. 무술년(戊戌年)은 눈물을 머금고 사업장을 정리해야 하는 시나리오가 기다리고 있다. 사표를 내고 싶은 마음은 굴뚝같겠지만, 사표를 다시 호주머니 깊숙이 집어넣는 것이 진정한 지혜다. 회사는 차가운 바위산일지라도 폭풍우를 막는 든든한 요새(要塞)이기도 하다. 병신년(丙申年)의 에너지는 밖으로 분출하기보다, 조직 안에서 능력을 인정받는 자양분으로 삼아야 한다.
brain:
  decision_rule: |
    IF 병신년에 관성이 직장 자리와 조직 적응을 직접 건드리고, 식상이 같은 방향으로 압력을 보태면 THEN 결론은 '퇴사하고 사업하려고 한다' 쪽으로 세운다.
    BECAUSE SAJUWAR식 판단은 사건명보다 세운이 원국의 어느 십성/궁위에 압력을 넣는지를 먼저 보기 때문이다.
    IF 표면 사건이 직장 자리와 조직 적응 문제로 보이더라도 THEN 관성의 안정성, 식상의 반발, 부서/상사의 압박을 먼저 분해한다.
    BECAUSE 이 case의 핵심은 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다는 구조를 읽는 데 있다.
  priority_rule:
    - "1순위: 관성이 실제 사건의 문을 여는지 본다."
    - "2순위: 식상이 관성을 강화하는지, 완화하는지 본다."
    - "3순위: 관성의 안정성, 식상의 반발, 부서/상사의 압박 중 무엇이 현실 선택을 막거나 열어주는지 본다."
    - "4순위: 좋은 신호와 나쁜 신호가 함께 있으면 결과보다 지속 가능성을 먼저 본다."
    - "5순위: 마지막 결론은 길흉이 아니라 실행, 보류, 축소, 정리 중 어느 선택이 안전한지로 좁힌다."
  consultation_strategy:
    - "1단계: 고객의 질문을 사건명이 아니라 운이 건드린 생활 영역으로 다시 정의한다."
    - "2단계: 관성과 식상을 핵심 신호로 제시하되 원문 표현을 반복하지 않고 쉬운 말로 번역한다."
    - "3단계: 그 신호가 왜 직장 자리와 조직 적응에서 문제 또는 기회로 나타나는지 IF/THEN 구조로 설명한다."
    - "4단계: 고객이 잘못해서 생긴 일이 아니라 운의 압력이 특정 선택지를 좁히는 과정임을 설명한다."
    - "5단계: 결론 뒤에는 반드시 실행 가능한 행동, 보류 기준, 피해야 할 행동을 함께 준다."
  hidden_pattern: |
    겉으로는 '퇴사하고 사업하려고 한다' 사례지만 숨은 판단 구조는 관성 하나가 아니라 관성과 식상의 결합이다.
    IF 이 결합이 직장 자리와 조직 적응의 그릇을 약하게 만들면 THEN 좋은 의도나 능력이 있어도 결과는 늦어지거나 축소된다.
    BECAUSE SAJUWAR 판단은 좋은 글자/나쁜 글자를 따로 보지 않고, 그 글자가 현실에서 버틸 자리를 만들었는지까지 본다.
  action_guide: |
    IF 이동 욕구가 강해도 다음 운에서 적응 구조가 약하면 THEN 즉시 결정보다 부서, 사람, 업무량을 분리해 검토하게 한다.
    THEN 퇴사/이직은 감정의 출구가 아니라 다음 자리의 관성 안정성이 확인될 때 실행하게 한다.
    BECAUSE 관성은 자리 변화 자체보다 변화 후 버틸 구조를 먼저 묻는 신호다.
  forbidden_advice:
    - "무조건 퇴사하라, 무조건 버텨라, 반드시 승진한다처럼 조직 선택을 단정하지 않는다."
    - "OCR 원문이나 기존 사례 문장을 고객 답변에 그대로 붙이지 않는다."
    - "한 해의 세운만으로 평생 운명처럼 단정하지 않는다."
    - "불안, 공포, 죄책감으로 결정을 압박하지 않는다."
  evidence:
    - "원국: 시일월년 천간: 乙 甲 癸 丁 / 지지: 丑 申 卯 未"
    - "세운: 병신년 丙申年"
    - "핵심 신호 1: 관성"
    - "핵심 신호 2: 식상"
    - "판단 영역: 직장 자리와 조직 적응"
    - "우선 판단축: 관성의 안정성, 식상의 반발, 부서/상사의 압박"
    - "결론 방식: 내 능력보다 조직 구조와 관계 압박이 먼저 흔들린다"
    - "보조 신호: 인성"
    - "보조 신호: 일지"
    - "보조 신호: 월간"
    - "보조 신호: 연간"
    - "보조 신호: 세운 천간"
    - "보조 신호: 세운 지지"
