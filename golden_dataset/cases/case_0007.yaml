    이 사례의 판단 근거는 관성, 식상, 인성, 일지, 월간, 연간, 세운 천간, 세운 지지, 충, 생, 丙申, 丁酉, 戊戌의 작용이다.
    원문 판단 근거: 외치며 가슴속에 품어왔던 사직서를 책상 위에 던지게 되며, 동시에 세운 지지의 관성 신금(申金)이 새로운 일터를 제안한다.
