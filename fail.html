<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>결제 실패 | 사주전쟁</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      color: #f6efdd;
      background: #080807;
      font-family: "Apple SD Gothic Neo", "Malgun Gothic", system-ui, sans-serif;
      text-align: center;
    }
    .panel {
      width: min(480px, calc(100% - 32px));
      padding: 34px;
      border: 1px solid rgba(242, 219, 141, 0.28);
      background: rgba(18, 17, 14, 0.86);
    }
    h1 { color: #f2db8d; }
    p { color: #c8bfa9; }
    a { color: #f2db8d; font-weight: 900; }
  </style>
</head>
<body>
  <main class="panel">
    <h1>결제가 완료되지 않았습니다</h1>
    <p>다시 시도하거나 메인으로 돌아가 리포트를 확인해주세요.</p>
    <a href="/">메인으로 돌아가기</a>
  </main>
</body>
</html>
